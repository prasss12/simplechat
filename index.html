<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PinkChat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5eef2;
            height: 100vh;
            overflow: hidden;
        }

        /* LAYOUT */
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        /* HEADER */
        .top-bar {
            background: white;
            padding: 14px 16px;
            border-bottom: 1px solid #f0e0e6;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-avatar {
            width: 44px;
            height: 44px;
            background: #ff6b9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .top-info {
            flex: 1;
        }

        .top-info h3 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .top-info p {
            font-size: 11px;
            color: #ff6b9d;
            margin-top: 3px;
        }

        .btn-logout {
            background: #ffe4ec;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 16px;
            cursor: pointer;
        }

        /* LIST KONTAK */
        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .contact-item:active {
            background: #fff0f5;
        }

        .contact-circle {
            width: 48px;
            height: 48px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .contact-text {
            flex: 1;
        }

        .contact-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 15px;
        }

        .contact-nohp {
            font-size: 11px;
            color: #aa8a96;
            margin-top: 3px;
        }

        /* TOMBOL AKSI */
        .action-row {
            background: white;
            padding: 10px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #f0e0e6;
        }

        .action-row button {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* CHAT PANEL */
        .chat-panel {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #fefafb;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 20;
        }

        .chat-panel.show {
            display: flex;
        }

        .chat-header {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #f0e0e6;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-back {
            background: none;
            border: none;
            font-size: 22px;
            color: #ff6b9d;
            cursor: pointer;
        }

        .chat-avatar {
            width: 42px;
            height: 42px;
            background: #ff6b9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .chat-name {
            flex: 1;
            font-weight: 600;
            color: #2d2d2d;
        }

        /* AREA PESAN */
        .message-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-bubble {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message-bubble.sent {
            align-self: flex-end;
        }

        .message-bubble.received {
            align-self: flex-start;
        }

        .bubble-text {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble-text {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble-text {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message-time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        /* INPUT PESAN - PASTI ADA */
        .input-row {
            background: white;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #f0e0e6;
        }

        .input-row input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 14px;
            outline: none;
        }

        .input-row button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .icon-circle {
            width: 44px;
            height: 44px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ff6b9d;
        }

        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        /* MODAL LOGIN */
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 330px;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
        }

        .login-card h3 {
            margin-bottom: 5px;
        }

        .login-card p {
            color: #aa8a96;
            font-size: 12px;
            margin-bottom: 18px;
        }

        .login-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 14px;
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 200;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895",
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let USER = null;
    let CHAT_WITH = null;
    let CHAT_NAME = null;
    let unsub = null;
    
    function toast(msg) {
        let t = document.querySelector('.toast-msg');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast-msg';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function escape(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function getUser(uid) {
        const d = await getDoc(doc(db, 'users', uid));
        if (d.exists()) return { uid, ...d.data() };
        return null;
    }
    
    // TAMPILAN UTAMA
    async function renderHome() {
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="main-container">
                <div class="top-bar">
                    <div class="top-avatar">${USER?.fullName?.charAt(0) || 'U'}</div>
                    <div class="top-info">
                        <h3>${escape(USER?.fullName || 'User')}</h3>
                        <p>${USER?.phone || ''}</p>
                    </div>
                    <button class="btn-logout" id="logoutHome"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="contact-list" id="contactList">Loading...</div>
                <div class="action-row">
                    <button id="addContactHome"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                    <button id="groupHome"><i class="fas fa-users"></i> Grup</button>
                </div>
            </div>
            <div class="chat-panel" id="chatPanel">
                <div class="chat-header">
                    <button class="btn-back" id="backHome"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-avatar" id="chatAvatar">P</div>
                    <div class="chat-name" id="chatName">Chat</div>
                </div>
                <div class="message-area" id="msgArea"></div>
                <div class="input-row">
                    <div class="icon-circle" id="emojiHome"><i class="far fa-smile-wink"></i></div>
                    <div class="icon-circle" id="imageHome"><i class="fas fa-paperclip"></i></div>
                    <input type="text" id="msgInput" placeholder="Ketik pesan...">
                    <button id="sendHome"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <input type="file" id="fileHome" accept="image/*" style="display:none">
        `;
        
        await loadContactsList();
        
        document.getElementById('logoutHome').onclick = async () => {
            if (confirm('Keluar?')) await signOut(auth);
        };
        
        document.getElementById('addContactHome').onclick = () => {
            const hp = prompt('Masukkan nomor HP teman:', '');
            if (hp) addContactByPhone(hp);
        };
        
        document.getElementById('groupHome').onclick = () => toast('🚀 Fitur grup segera hadir');
        
        document.getElementById('backHome').onclick = () => {
            if (unsub) unsub();
            document.getElementById('chatPanel').classList.remove('show');
            CHAT_WITH = null;
        };
        
        document.getElementById('sendHome').onclick = sendMsg;
        document.getElementById('msgInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMsg();
        });
        
        document.getElementById('emojiHome').onclick = () => {
            const inp = document.getElementById('msgInput');
            inp.value += '🌸';
            inp.focus();
        };
        
        document.getElementById('imageHome').onclick = () => {
            if (!CHAT_WITH) { toast('Pilih chat dulu'); return; }
            document.getElementById('fileHome').click();
        };
        
        document.getElementById('fileHome').onchange = async (e) => {
            const f = e.target.files[0];
            if (f && f.type.startsWith('image/') && CHAT_WITH) {
                const rd = new FileReader();
                rd.onload = async (ev) => {
                    const chatId = [USER.uid, CHAT_WITH].sort().join('_');
                    await addDoc(collection(db, 'chats', chatId, 'messages'), {
                        senderId: USER.uid,
                        text: 'Gambar',
                        type: 'image',
                        imageUrl: ev.target.result,
                        timestamp: serverTimestamp()
                    });
                    toast('Gambar terkirim');
                };
                rd.readAsDataURL(f);
            }
            e.target.value = '';
        };
    }
    
    async function loadContactsList() {
        const container = document.getElementById('contactList');
        const kontak = USER?.contacts || [];
        if (kontak.length === 0) {
            container.innerHTML = '<div class="empty-chat">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        container.innerHTML = '';
        for (let kid of kontak) {
            const userSnap = await getDoc(doc(db, 'users', kid));
            if (userSnap.exists()) {
                const d = userSnap.data();
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `
                    <div class="contact-circle">${d.fullName?.charAt(0) || '?'}</div>
                    <div class="contact-text">
                        <div class="contact-name">${escape(d.fullName)}</div>
                        <div class="contact-nohp">${d.phone}</div>
                    </div>
                `;
                div.onclick = () => openChatWindow(kid, d.fullName);
                container.appendChild(div);
            }
        }
    }
    
    async function openChatWindow(uid, name) {
        if (unsub) unsub();
        CHAT_WITH = uid;
        CHAT_NAME = name;
        
        document.getElementById('chatName').innerHTML = escape(name);
        document.getElementById('chatAvatar').innerHTML = name.charAt(0).toUpperCase();
        
        const msgDiv = document.getElementById('msgArea');
        msgDiv.innerHTML = '<div class="empty-chat">Loading...</div>';
        
        const chatId = [USER.uid, uid].sort().join('_');
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        
        unsub = onSnapshot(q, (snap) => {
            msgDiv.innerHTML = '';
            if (snap.empty) {
                msgDiv.innerHTML = '<div class="empty-chat">Belum ada pesan. Kirim pertama!</div>';
            }
            snap.forEach(docSnap => {
                const m = docSnap.data();
                const isMe = m.senderId === USER.uid;
                const el = document.createElement('div');
                el.className = `message-bubble ${isMe ? 'sent' : 'received'}`;
                let body = '';
                if (m.type === 'image' && m.imageUrl) {
                    body = `<div class="bubble-text"><img src="${m.imageUrl}" style="max-width:160px; border-radius:16px;"></div>`;
                } else {
                    body = `<div class="bubble-text">${escape(m.text)}</div>`;
                }
                const tm = m.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                el.innerHTML = body + `<div class="message-time">${tm}</div>`;
                msgDiv.appendChild(el);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
        
        document.getElementById('chatPanel').classList.add('show');
    }
    
    async function sendMsg() {
        if (!CHAT_WITH) { toast('Pilih chat dulu'); return; }
        const inp = document.getElementById('msgInput');
        const txt = inp.value.trim();
        if (!txt) return;
        const chatId = [USER.uid, CHAT_WITH].sort().join('_');
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
            senderId: USER.uid,
            text: txt,
            type: 'text',
            timestamp: serverTimestamp()
        });
        inp.value = '';
    }
    
    async function addContactByPhone(phone) {
        try {
            const q = query(collection(db, 'users'), where('phone', '==', phone));
            const snap = await getDocs(q);
            if (snap.empty) throw new Error('Nomor tidak terdaftar');
            const target = snap.docs[0];
            if (target.id === USER.uid) throw new Error('Tidak bisa tambah sendiri');
            
            // TWO-WAY
            await updateDoc(doc(db, 'users', USER.uid), { contacts: arrayUnion(target.id) });
            await updateDoc(doc(db, 'users', target.id), { contacts: arrayUnion(USER.uid) });
            
            toast('✅ Kontak berhasil ditambahkan');
            USER = await getUser(USER.uid);
            await loadContactsList();
        } catch(e) {
            alert(e.message);
        }
    }
    
    // LOGIN / REGISTER
    function renderAuth() {
        let isLogin = false;
        const root = document.getElementById('root');
        root.innerHTML = `
            <div class="login-modal" id="authModal">
                <div class="login-card">
                    <h3 id="authTitle">Daftar Akun</h3>
                    <p>Buat akun dengan nomor HP</p>
                    <input type="text" id="nameField" placeholder="Nama lengkap">
                    <input type="tel" id="phoneField" placeholder="Nomor HP (812345678)">
                    <input type="password" id="passField" placeholder="Password">
                    <button id="authSubmit">Daftar</button>
                    <button id="authSwitch" style="background:#ffe4ec;color:#ff6b9d">Sudah punya akun? Masuk</button>
                    <div id="authErr" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                </div>
            </div>
        `;
        
        const nameInp = document.getElementById('nameField');
        const switchBtn = document.getElementById('authSwitch');
        const title = document.getElementById('authTitle');
        const submitBtn = document.getElementById('authSubmit');
        const errDiv = document.getElementById('authErr');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                title.innerText = 'Masuk Akun';
                submitBtn.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInp.style.display = 'none';
            } else {
                title.innerText = 'Daftar Akun';
                submitBtn.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInp.style.display = 'block';
            }
        };
        
        submitBtn.onclick = async () => {
            const phone = document.getElementById('phoneField').value.trim();
            const pass = document.getElementById('passField').value;
            try {
                if (isLogin) {
                    const email = `${phone}@pinkchat.local`;
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const name = document.getElementById('nameField').value.trim();
                    if (!name) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const cek = query(collection(db, 'users'), where('phone', '==', phone));
                    const cekSnap = await getDocs(cek);
                    if (!cekSnap.empty) throw new Error('Nomor HP sudah terdaftar');
                    
                    const email = `${phone}@pinkchat.local`;
                    const uc = await createUserWithEmailAndPassword(auth, email, pass);
                    await setDoc(doc(db, 'users', uc.user.uid), {
                        fullName: name,
                        phone: phone,
                        contacts: [],
                        createdAt: serverTimestamp()
                    });
                }
                errDiv.innerText = '';
            } catch(e) {
                errDiv.innerText = e.message;
            }
        };
    }
    
    // AUTH STATE
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            USER = await getUser(user.uid);
            if (USER) {
                renderHome();
            } else {
                setTimeout(async () => {
                    USER = await getUser(user.uid);
                    if (USER) renderHome();
                    else renderAuth();
                }, 1000);
            }
        } else {
            USER = null;
            renderAuth();
        }
    });
    
    renderAuth();
</script>
</body>
</html>
