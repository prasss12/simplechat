<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Consolas,monospace;
background:#f5f5f5;
color:#222;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
font-size:32px;
margin-bottom:5px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
margin-bottom:20px;
font-family:inherit;
}

.file{
background:#fff;
border:1px solid #ddd;
padding:12px;
margin-bottom:8px;
cursor:pointer;
transition:.2s;
}

.file:hover{
background:#fafafa;
}

.status{
font-size:12px;
color:#666;
margin-top:4px;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.75);
justify-content:center;
align-items:center;
padding:20px;
}

.modal-content{
background:#fff;
width:100%;
max-width:800px;
max-height:90vh;
overflow:auto;
padding:20px;
}

.modal img{
width:100%;
margin:15px 0;
border:1px solid #ddd;
}

.close{
float:right;
cursor:pointer;
font-size:24px;
}

pre{
white-space:pre-wrap;
line-height:1.6;
}

.footer{
margin-top:30px;
font-size:12px;
color:#666;
}

</style>
</head>

},

id:"VTB-014",

type:"missing",

FILE REMOVED FROM DATABASE`
}

];

const filesContainer =
document.getElementById("files");

function render(search=""){

filesContainer.innerHTML="";

files
.filter(file =>
(file.id + file.name)
.toLowerCase()
.includes(search.toLowerCase())
)
.forEach(file => {

let icon = "📄";

if(file.type==="corrupted")
icon = "⚠";

if(file.type==="restricted")
icon = "🔒";

if(file.type==="missing")
icon = "❌";

filesContainer.innerHTML += `

<div
class="file"
onclick="openFile('${file.id}')"
>

<b>${icon} ${file.id}.${file.type}</b>

<div class="status">
${file.name}
</div>

</div>

`;

});

}

render();

document
.getElementById("search")
.addEventListener("input", e => {

render(e.target.value);

});

function openFile(id){

const file =
files.find(f => f.id === id);

document
.getElementById("modal")
.style.display = "flex";

document
.getElementById("title")
.innerText =
file.id + " - " + file.name;

document
.getElementById("description")
.innerText =
file.description;

if(file.image){

document
.getElementById("image")
.style.display = "block";

document
.getElementById("image")
.src = file.image;

document
.getElementById("threat")
.innerHTML =
"<b>Threat Level:</b> " +
file.threat;

}else{

document
.getElementById("image")
.style.display = "none";

document
.getElementById("threat")
.innerHTML = "";

}

}

function closeModal(){

document
.getElementById("modal")
.style.display = "none";

}

window.onclick = function(event){

const modal =
document.getElementById("modal");

if(event.target === modal){

closeModal();

}

}

</script>
