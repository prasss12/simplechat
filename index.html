<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PinkChat - Complete Chat App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f8f0f4;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: white;
        }

        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #ffe0e8;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fefafb;
            height: 100%;
        }

        .header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        .info {
            flex: 1;
            cursor: pointer;
        }

        .info h3 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .info p {
            font-size: 12px;
            color: #ff6b9d;
            margin-top: 3px;
        }

        .btn-icon {
            background: #ffe4ec;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 16px;
            cursor: pointer;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #fff5f8;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .chat-details {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 15px;
        }

        .chat-sub {
            font-size: 11px;
            color: #aa8a96;
            margin-top: 3px;
        }

        .group-badge {
            background: #ff99c8;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }

        .actions {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ffe0e8;
            background: white;
        }

        .actions button {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        .sent .time {
            text-align: right;
            margin-right: 10px;
        }

        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ffe0e8;
        }

        .input-area input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .input-area .circle {
            width: 44px;
            height: 44px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ff6b9d;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            width: 90%;
            max-width: 380px;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-box h3 {
            margin-bottom: 5px;
        }

        .modal-box p {
            color: #aa8a96;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .modal-box input, .modal-box textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 14px;
        }

        .modal-box textarea {
            border-radius: 20px;
            resize: none;
        }

        .modal-box button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .modal-box button.danger {
            background: #ff4444;
        }

        .modal-box button.secondary {
            background: #ffe4ec;
            color: #ff6b9d;
        }

        .contact-check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .contact-check-item:hover {
            background: #fff0f5;
        }

        .contact-check-item input {
            width: 20px;
            margin: 0;
        }

        .contact-check-item label {
            flex: 1;
            text-align: left;
            cursor: pointer;
        }

        .profile-row {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            border-bottom: 1px solid #f0eef0;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                width: 280px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .sidebar.show {
                display: flex;
            }
            .menu-btn {
                display: flex !important;
            }
            .mobile-back {
                display: flex !important;
            }
        }

        @media (min-width: 769px) {
            .menu-btn, .mobile-back {
                display: none !important;
            }
        }

        .menu-btn, .mobile-back {
            background: none;
            border: none;
            font-size: 20px;
            color: #ff6b9d;
            cursor: pointer;
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, arrayRemove, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895",
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let currentUser = null;
    let selectedChatId = null;
    let selectedChatType = null;
    let selectedChatName = null;
    let selectedChatData = null;
    let unsubscribeMsg = null;
    let unsubscribeChats = null;
    
    function showToast(msg) {
        let t = document.querySelector('.toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function getUserData(uid) {
        const snap = await getDoc(doc(db, 'users', uid));
        if (snap.exists()) return { uid, ...snap.data() };
        return null;
    }
    
    // ========== PROFILE ==========
    async function updateProfileUser(fullName, bio) {
        const userRef = doc(db, 'users', currentUser.uid);
        await updateDoc(userRef, { fullName: fullName, bio: bio });
        currentUser = await getUserData(currentUser.uid);
        showToast('✅ Profil berhasil diperbarui');
        renderMainApp();
    }
    
    // ========== KONTAK ==========
    async function addContact(phone) {
        const usersRef = collection(db, 'users');
        const q = query(usersRef, where('phone', '==', phone));
        const snap = await getDocs(q);
        if (snap.empty) throw new Error('Nomor HP tidak terdaftar');
        const target = snap.docs[0];
        if (target.id === currentUser.uid) throw new Error('Tidak bisa menambah diri sendiri');
        
        await updateDoc(doc(db, 'users', currentUser.uid), {
            contacts: arrayUnion(target.id)
        });
        await updateDoc(doc(db, 'users', target.id), {
            contacts: arrayUnion(currentUser.uid)
        });
        
        return true;
    }
    
    async function removeContact(contactId) {
        await updateDoc(doc(db, 'users', currentUser.uid), {
            contacts: arrayRemove(contactId)
        });
        showToast('✅ Kontak berhasil dihapus');
        await renderChatList();
    }
    
    // ========== GRUP ==========
    async function createGroup(groupName, memberIds) {
        if (memberIds.length === 0) throw new Error('Pilih minimal 1 anggota');
        
        const allMembers = [currentUser.uid, ...memberIds];
        const groupData = {
            type: 'group',
            name: groupName,
            bio: '',
            participants: allMembers,
            createdBy: currentUser.uid,
            createdAt: serverTimestamp(),
            lastMessage: '',
            lastMessageTime: serverTimestamp()
        };
        
        const groupRef = await addDoc(collection(db, 'chats'), groupData);
        
        for (let uid of allMembers) {
            await updateDoc(doc(db, 'users', uid), {
                groups: arrayUnion(groupRef.id)
            });
        }
        
        return { id: groupRef.id, ...groupData };
    }
    
    async function updateGroup(groupId, name, bio) {
        await updateDoc(doc(db, 'chats', groupId), { name: name, bio: bio });
        showToast('✅ Informasi grup diperbarui');
        await renderChatList();
        if (selectedChatId === groupId) {
            document.getElementById('chatTitle').innerHTML = escapeHtml(name);
            document.getElementById('chatStatus').innerHTML = bio || 'Grup';
        }
    }
    
    async function addMemberToGroup(groupId, newMemberId) {
        await updateDoc(doc(db, 'chats', groupId), {
            participants: arrayUnion(newMemberId)
        });
        await updateDoc(doc(db, 'users', newMemberId), {
            groups: arrayUnion(groupId)
        });
        return true;
    }
    
    async function removeMemberFromGroup(groupId, memberId) {
        const groupRef = doc(db, 'chats', groupId);
        await updateDoc(groupRef, {
            participants: arrayRemove(memberId)
        });
        await updateDoc(doc(db, 'users', memberId), {
            groups: arrayRemove(groupId)
        });
        return true;
    }
    
    async function leaveGroup(groupId) {
        await updateDoc(doc(db, 'chats', groupId), {
            participants: arrayRemove(currentUser.uid)
        });
        await updateDoc(doc(db, 'users', currentUser.uid), {
            groups: arrayRemove(groupId)
        });
        if (selectedChatId === groupId) {
            selectedChatId = null;
            document.getElementById('chatTitle').innerHTML = 'PinkChat';
            document.getElementById('chatStatus').innerHTML = 'Pilih percakapan';
            document.getElementById('messagesList').innerHTML = '<div class="empty">Pilih chat untuk mulai mengobrol</div>';
        }
        showToast('👋 Anda telah keluar dari grup');
        await renderChatList();
    }
    
    async function deleteGroup(groupId) {
        const participants = selectedChatData?.participants || [];
        for (let uid of participants) {
            await updateDoc(doc(db, 'users', uid), {
                groups: arrayRemove(groupId)
            });
        }
        await deleteDoc(doc(db, 'chats', groupId));
        
        if (selectedChatId === groupId) {
            selectedChatId = null;
            document.getElementById('chatTitle').innerHTML = 'PinkChat';
            document.getElementById('chatStatus').innerHTML = 'Pilih percakapan';
        }
        showToast('🗑️ Grup telah dihapus');
        await renderChatList();
    }
    
    async function getOrCreatePrivateChat(uid1, uid2) {
        const chatsRef = collection(db, 'chats');
        const q1 = query(chatsRef, where('participants', '==', [uid1, uid2]));
        const q2 = query(chatsRef, where('participants', '==', [uid2, uid1]));
        let snap = await getDocs(q1);
        if (snap.empty) snap = await getDocs(q2);
        if (!snap.empty) return { id: snap.docs[0].id, ...snap.docs[0].data() };
        
        const newChat = {
            type: 'private',
            participants: [uid1, uid2],
            createdAt: serverTimestamp(),
            lastMessage: '',
            lastMessageTime: serverTimestamp()
        };
        const ref = await addDoc(chatsRef, newChat);
        return { id: ref.id, ...newChat };
    }
    
    // ========== SEND MESSAGE - FIXED ==========
    async function sendMessage(chatId, text, type = 'text', imageUrl = null) {
        if (!chatId) {
            showToast('Error: Chat ID tidak ditemukan');
            return;
        }
        
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        await addDoc(messagesRef, {
            senderId: currentUser.uid,
            text: text,
            type: type,
            imageUrl: imageUrl || null,
            timestamp: serverTimestamp()
        });
        
        const chatRef = doc(db, 'chats', chatId);
        await updateDoc(chatRef, {
            lastMessage: text.length > 50 ? text.substring(0, 50) + '...' : text,
            lastMessageTime: serverTimestamp()
        });
    }
    
    // ========== RENDER CHAT LIST ==========
    function startRealtimeChatList() {
        if (unsubscribeChats) unsubscribeChats();
        const userRef = doc(db, 'users', currentUser.uid);
        unsubscribeChats = onSnapshot(userRef, async () => {
            await renderChatList();
        });
    }
    
    async function renderChatList() {
        const container = document.getElementById('chatList');
        if (!container) return;
        
        const userData = await getUserData(currentUser.uid);
        const contacts = userData?.contacts || [];
        const groups = userData?.groups || [];
        
        let chatItems = [];
        
        for (let contactId of contacts) {
            const chat = await getOrCreatePrivateChat(currentUser.uid, contactId);
            const partnerSnap = await getDoc(doc(db, 'users', contactId));
            if (partnerSnap.exists()) {
                chatItems.push({
                    id: chat.id,
                    type: 'private',
                    name: partnerSnap.data().fullName,
                    subtitle: partnerSnap.data().phone,
                    bio: partnerSnap.data().bio || '',
                    lastMessage: chat.lastMessage || '',
                    data: partnerSnap.data()
                });
            }
        }
        
        for (let groupId of groups) {
            const groupSnap = await getDoc(doc(db, 'chats', groupId));
            if (groupSnap.exists()) {
                const group = groupSnap.data();
                chatItems.push({
                    id: groupId,
                    type: 'group',
                    name: group.name,
                    subtitle: `${group.participants?.length || 0} anggota`,
                    bio: group.bio || '',
                    lastMessage: group.lastMessage || '',
                    data: group
                });
            }
        }
        
        container.innerHTML = '';
        if (chatItems.length === 0) {
            container.innerHTML = '<div class="empty">Belum ada chat<br>Tekan ➕ Tambah Kontak atau Buat Grup</div>';
            return;
        }
        
        for (let chat of chatItems) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            if (selectedChatId === chat.id) div.style.background = '#ffeef3';
            div.innerHTML = `
                <div class="chat-avatar">${chat.name.charAt(0).toUpperCase()}</div>
                <div class="chat-details">
                    <div class="chat-name">${escapeHtml(chat.name)} ${chat.type === 'group' ? '<span class="group-badge"><i class="fas fa-users"></i> Grup</span>' : ''}</div>
                    <div class="chat-sub">${escapeHtml(chat.subtitle)}</div>
                </div>
            `;
            div.onclick = () => openChat(chat.id, chat.type, chat.name, chat.data);
            container.appendChild(div);
        }
    }
    
    // ========== PROFILE VIEW ==========
    async function showProfile(uid, type, data) {
        if (type === 'private') {
            const user = await getUserData(uid);
            const isContact = currentUser.contacts?.includes(uid) || false;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-box">
                    <div class="avatar" style="margin: 0 auto 15px auto; width: 80px; height: 80px; font-size: 32px;">${user.fullName?.charAt(0) || '?'}</div>
                    <h3>${escapeHtml(user.fullName)}</h3>
                    <p style="color: #ff6b9d;">${user.phone}</p>
                    <p style="color: #aa8a96; margin: 10px 0;">${escapeHtml(user.bio || 'Halo! Saya menggunakan PinkChat')}</p>
                    ${isContact ? `<button id="removeContactBtn" class="danger" style="background:#ff4444;">Hapus Kontak</button>` : ''}
                    <button id="closeProfile" class="secondary">Tutup</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            if (isContact) {
                document.getElementById('removeContactBtn').onclick = async () => {
                    if (confirm('Hapus kontak ini?')) {
                        await removeContact(uid);
                        modal.remove();
                        await renderChatList();
                    }
                };
            }
            document.getElementById('closeProfile').onclick = () => modal.remove();
        } else if (type === 'group') {
            const group = data;
            const isAdmin = group.createdBy === currentUser.uid;
            
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-box">
                    <div class="avatar" style="margin: 0 auto 15px auto; width: 80px; height: 80px; font-size: 32px;">${group.name?.charAt(0) || 'G'}</div>
                    <h3>${escapeHtml(group.name)}</h3>
                    <p style="color: #ff6b9d;">${group.participants?.length || 0} anggota</p>
                    <p style="color: #aa8a96; margin: 10px 0;">${escapeHtml(group.bio || 'Grup PinkChat')}</p>
                    ${isAdmin ? `<button id="editGroupBtn">Edit Grup</button>` : ''}
                    <button id="viewMembersBtn">Lihat Anggota</button>
                    <button id="leaveGroupBtn" class="danger" style="background:#ff4444;">Keluar dari Grup</button>
                    ${isAdmin ? `<button id="deleteGroupBtn" class="danger" style="background:#ff4444; margin-top:5px;">Hapus Grup</button>` : ''}
                    <button id="closeProfile" class="secondary">Tutup</button>
                </div>
            `;
            document.body.appendChild(modal);
            
            if (isAdmin) {
                document.getElementById('editGroupBtn').onclick = () => {
                    modal.remove();
                    showEditGroupModal(selectedChatId, group.name, group.bio);
                };
                document.getElementById('deleteGroupBtn').onclick = async () => {
                    if (confirm('Yakin hapus grup ini? Semua pesan akan hilang')) {
                        await deleteGroup(selectedChatId);
                        modal.remove();
                    }
                };
            }
            
            document.getElementById('viewMembersBtn').onclick = () => {
                modal.remove();
                showGroupMembers(selectedChatId);
            };
            
            document.getElementById('leaveGroupBtn').onclick = async () => {
                if (confirm('Yakin keluar dari grup ini?')) {
                    await leaveGroup(selectedChatId);
                    modal.remove();
                }
            };
            
            document.getElementById('closeProfile').onclick = () => modal.remove();
        }
    }
    
    async function showGroupMembers(groupId) {
        const groupSnap = await getDoc(doc(db, 'chats', groupId));
        const members = groupSnap.data().participants || [];
        const isAdmin = groupSnap.data().createdBy === currentUser.uid;
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Anggota Grup</h3>
                <div id="membersList" style="max-height: 300px; overflow-y: auto;"></div>
                ${isAdmin ? `<button id="addMemberToGroupBtn">Tambah Anggota</button>` : ''}
                <button id="closeMembers" class="secondary">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const container = document.getElementById('membersList');
        for (let uid of members) {
            const user = await getUserData(uid);
            if (user) {
                const div = document.createElement('div');
                div.className = 'profile-row';
                div.innerHTML = `
                    <div class="avatar" style="width: 40px; height: 40px; font-size: 16px;">${user.fullName?.charAt(0) || '?'}</div>
                    <div style="flex:1">
                        <div><strong>${escapeHtml(user.fullName)}</strong> ${uid === currentUser.uid ? '(Anda)' : ''} ${groupSnap.data().createdBy === uid ? '<span style="color:#ff6b9d; font-size:11px;">Admin</span>' : ''}</div>
                        <div style="font-size:11px; color:#aa8a96;">${user.phone}</div>
                    </div>
                    ${isAdmin && uid !== currentUser.uid ? `<button id="remove_${uid}" style="background:#ff4444; color:white; border:none; padding:5px 12px; border-radius:20px;">Hapus</button>` : ''}
                `;
                container.appendChild(div);
                
                if (isAdmin && uid !== currentUser.uid) {
                    document.getElementById(`remove_${uid}`).onclick = async () => {
                        if (confirm(`Hapus ${user.fullName} dari grup?`)) {
                            await removeMemberFromGroup(groupId, uid);
                            modal.remove();
                            showToast(`✅ ${user.fullName} telah dikeluarkan`);
                            showGroupMembers(groupId);
                        }
                    };
                }
            }
        }
        
        if (isAdmin) {
            document.getElementById('addMemberToGroupBtn').onclick = () => {
                modal.remove();
                showAddMemberModal(groupId);
            };
        }
        
        document.getElementById('closeMembers').onclick = () => modal.remove();
    }
    
    async function showEditGroupModal(groupId, currentName, currentBio) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Edit Grup</h3>
                <input type="text" id="editGroupName" placeholder="Nama Grup" value="${escapeHtml(currentName)}">
                <textarea id="editGroupBio" placeholder="Deskripsi grup" rows="3">${escapeHtml(currentBio || '')}</textarea>
                <button id="saveGroupEdit">Simpan</button>
                <button id="cancelEdit" class="secondary">Batal</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('saveGroupEdit').onclick = async () => {
            const newName = document.getElementById('editGroupName').value.trim();
            const newBio = document.getElementById('editGroupBio').value.trim();
            if (newName) {
                await updateGroup(groupId, newName, newBio);
                modal.remove();
                await renderChatList();
                if (selectedChatId === groupId) {
                    document.getElementById('chatTitle').innerHTML = escapeHtml(newName);
                }
            }
        };
        document.getElementById('cancelEdit').onclick = () => modal.remove();
    }
    
    async function showAddMemberModal(groupId) {
        const userData = await getUserData(currentUser.uid);
        const contacts = userData?.contacts || [];
        const groupSnap = await getDoc(doc(db, 'chats', groupId));
        const currentMembers = groupSnap.data()?.participants || [];
        const availableContacts = contacts.filter(c => !currentMembers.includes(c));
        
        if (availableContacts.length === 0) {
            showToast('Semua kontak sudah menjadi anggota');
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Tambah Anggota</h3>
                <div id="contactsList" style="max-height:300px; overflow-y:auto;"></div>
                <button id="confirmAdd">Tambah</button>
                <button id="cancelAdd" class="secondary">Batal</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const container = document.getElementById('contactsList');
        const selected = [];
        
        for (let cid of availableContacts) {
            const user = await getUserData(cid);
            if (user) {
                const div = document.createElement('div');
                div.className = 'contact-check-item';
                div.innerHTML = `<input type="checkbox" value="${cid}" id="chk_${cid}"><label for="chk_${cid}">${escapeHtml(user.fullName)} (${user.phone})</label>`;
                const chk = div.querySelector('input');
                chk.onchange = () => {
                    if (chk.checked) selected.push(cid);
                    else selected.splice(selected.indexOf(cid), 1);
                };
                container.appendChild(div);
            }
        }
        
        document.getElementById('confirmAdd').onclick = async () => {
            for (let mid of selected) {
                await addMemberToGroup(groupId, mid);
            }
            showToast('✅ Anggota ditambahkan');
            modal.remove();
        };
        document.getElementById('cancelAdd').onclick = () => modal.remove();
    }
    
    // ========== PROFILE USER ==========
    function showMyProfile() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <div class="avatar" style="margin: 0 auto 15px auto; width: 80px; height: 80px; font-size: 32px;">${currentUser.fullName?.charAt(0) || 'U'}</div>
                <h3>Profil Saya</h3>
                <input type="text" id="editName" placeholder="Nama" value="${escapeHtml(currentUser.fullName || '')}">
                <textarea id="editBio" placeholder="Bio" rows="3">${escapeHtml(currentUser.bio || '')}</textarea>
                <button id="saveProfile">Simpan</button>
                <button id="closeProfile" class="secondary">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('saveProfile').onclick = async () => {
            const newName = document.getElementById('editName').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            if (newName) {
                await updateProfileUser(newName, newBio);
                modal.remove();
            }
        };
        document.getElementById('closeProfile').onclick = () => modal.remove();
    }
    
    // ========== OPEN CHAT ==========
    async function openChat(chatId, type, name, data) {
        if (unsubscribeMsg) unsubscribeMsg();
        selectedChatId = chatId;
        selectedChatType = type;
        selectedChatName = name;
        selectedChatData = data;
        
        document.getElementById('chatTitle').innerHTML = escapeHtml(name);
        document.getElementById('chatStatus').innerHTML = type === 'group' ? (data?.bio || 'Grup') : 'Online';
        document.getElementById('chatAvatar').innerHTML = name.charAt(0).toUpperCase();
        
        const addMemberBtn = document.getElementById('addMemberBtn');
        if (type === 'group') {
            addMemberBtn.style.display = 'flex';
            addMemberBtn.onclick = () => showAddMemberModal(chatId);
        } else {
            addMemberBtn.style.display = 'none';
        }
        
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('show');
        }
        
        const messagesDiv = document.getElementById('messagesList');
        messagesDiv.innerHTML = '<div class="empty">Memuat pesan...</div>';
        
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        
        unsubscribeMsg = onSnapshot(q, async (snap) => {
            messagesDiv.innerHTML = '';
            if (snap.empty) {
                messagesDiv.innerHTML = '<div class="empty">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            for (const docMsg of snap.docs) {
                const msg = docMsg.data();
                const isSent = msg.senderId === currentUser.uid;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
                
                let senderName = '';
                if (type === 'group' && !isSent) {
                    const senderData = await getUserData(msg.senderId);
                    senderName = `<div style="font-size: 10px; color: #ff99c8; margin-bottom: 3px;">${escapeHtml(senderData?.fullName || 'Anggota')}</div>`;
                }
                
                let content = '';
                if (msg.type === 'image' && msg.imageUrl) {
                    content = `<div class="bubble"><img src="${msg.imageUrl}" style="max-width:180px; border-radius:16px;"></div>`;
                } else {
                    content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
                }
                
                const time = msg.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                msgDiv.innerHTML = senderName + content + `<div class="time">${time}</div>`;
                messagesDiv.appendChild(msgDiv);
            }
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
        
        await renderChatList();
    }
    
    // ========== SEND CURRENT MESSAGE - FIXED ==========
    async function sendCurrentMessage() {
        if (!selectedChatId) {
            showToast('Pilih chat terlebih dahulu');
            return;
        }
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        try {
            await sendMessage(selectedChatId, text);
            input.value = '';
        } catch(e) {
            console.error('Send message error:', e);
            showToast('Gagal mengirim pesan: ' + e.message);
        }
    }
    
    // ========== MAIN APP ==========
    async function renderMainApp() {
        const root = document.getElementById('app');
        
        root.innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="header">
                        <div class="avatar" id="profileBtn" style="cursor:pointer;">${currentUser?.fullName?.charAt(0) || 'U'}</div>
                        <div class="info" id="profileInfoBtn" style="cursor:pointer;">
                            <h3>${escapeHtml(currentUser?.fullName || 'User')}</h3>
                            <p>${currentUser?.phone || ''}</p>
                        </div>
                        <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                    <div class="chat-list" id="chatList"></div>
                    <div class="actions">
                        <button id="addContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                        <button id="createGroupBtn"><i class="fas fa-users"></i> Grup Baru</button>
                    </div>
                </div>
                
                <div class="chat-area">
                    <div class="header">
                        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                        <button class="mobile-back" id="mobileBackBtn"><i class="fas fa-arrow-left"></i></button>
                        <div class="avatar" id="chatAvatarBtn" style="cursor:pointer;">P</div>
                        <div class="info" id="chatInfoBtn" style="cursor:pointer;">
                            <h3 id="chatTitle">PinkChat</h3>
                            <p id="chatStatus">Pilih percakapan</p>
                        </div>
                        <button class="btn-icon" id="addMemberBtn" style="display: none;"><i class="fas fa-user-plus"></i></button>
                        <button class="btn-icon" id="infoBtn"><i class="fas fa-info-circle"></i></button>
                    </div>
                    <div class="messages" id="messagesList">
                        <div class="empty">Pilih chat untuk mulai mengobrol</div>
                    </div>
                    <div class="input-area">
                        <div class="circle" id="emojiBtn"><i class="far fa-smile-wink"></i></div>
                        <div class="circle" id="imageBtn"><i class="fas fa-paperclip"></i></div>
                        <input type="text" id="messageInput" placeholder="Ketik pesan...">
                        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        `;
        
        startRealtimeChatList();
        await renderChatList();
        
        document.getElementById('profileBtn').onclick = () => showMyProfile();
        document.getElementById('profileInfoBtn').onclick = () => showMyProfile();
        
        document.getElementById('chatAvatarBtn').onclick = () => {
            if (selectedChatId) {
                showProfile(selectedChatId, selectedChatType, selectedChatData);
            }
        };
        document.getElementById('chatInfoBtn').onclick = () => {
            if (selectedChatId) {
                showProfile(selectedChatId, selectedChatType, selectedChatData);
            }
        };
        document.getElementById('infoBtn').onclick = () => {
            if (selectedChatId) {
                showProfile(selectedChatId, selectedChatType, selectedChatData);
            }
        };
        
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) await signOut(auth);
        };
        
        document.getElementById('addContactBtn').onclick = () => {
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.innerHTML = `
                <div class="modal-box">
                    <h3>Tambah Kontak</h3>
                    <input type="tel" id="contactPhone" placeholder="Nomor HP">
                    <button id="confirmAdd">Tambah</button>
                    <button id="cancelAdd" class="secondary">Batal</button>
                    <div id="errMsg" style="color:#ff6b9d; font-size:12px;"></div>
                </div>
            `;
            document.body.appendChild(modal);
            document.getElementById('confirmAdd').onclick = async () => {
                const phone = document.getElementById('contactPhone').value.trim();
                try {
                    await addContact(phone);
                    showToast('✅ Kontak ditambahkan');
                    modal.remove();
                    await renderChatList();
                } catch(e) {
                    document.getElementById('errMsg').innerText = e.message;
                }
            };
            document.getElementById('cancelAdd').onclick = () => modal.remove();
        };
        
        document.getElementById('createGroupBtn').onclick = () => showCreateGroupModal();
        document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.add('show');
        document.getElementById('mobileBackBtn').onclick = () => {
            if (selectedChatId) {
                if (unsubscribeMsg) unsubscribeMsg();
                selectedChatId = null;
                document.getElementById('chatTitle').innerHTML = 'PinkChat';
                document.getElementById('chatStatus').innerHTML = 'Pilih percakapan';
                document.getElementById('messagesList').innerHTML = '<div class="empty">Pilih chat untuk mulai mengobrol</div>';
                document.getElementById('addMemberBtn').style.display = 'none';
            }
        };
        document.getElementById('sendBtn').onclick = sendCurrentMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCurrentMessage();
        });
        document.getElementById('emojiBtn').onclick = () => {
            const inp = document.getElementById('messageInput');
            inp.value += '🌸';
            inp.focus();
        };
        document.getElementById('imageBtn').onclick = () => {
            if (!selectedChatId) { showToast('Pilih chat dulu'); return; }
            document.getElementById('fileInput').click();
        };
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/') && selectedChatId) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await sendMessage(selectedChatId, 'Gambar', 'image', ev.target.result);
                    showToast('📷 Gambar terkirim');
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        };
        
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuBtn');
            if (window.innerWidth <= 768 && sidebar.classList.contains('show')) {
                if (!sidebar.contains(e.target) && e.target !== menuBtn && !menuBtn.contains(e.target)) {
                    sidebar.classList.remove('show');
                }
            }
        });
    }
    
    async function showCreateGroupModal() {
        const userData = await getUserData(currentUser.uid);
        const contacts = userData?.contacts || [];
        if (contacts.length === 0) {
            showToast('Tambahkan kontak terlebih dahulu');
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Buat Grup Baru</h3>
                <input type="text" id="groupName" placeholder="Nama Grup">
                <p style="text-align:left;">Pilih anggota:</p>
                <div id="contactsList" style="max-height:200px; overflow-y:auto;"></div>
                <button id="createBtn">Buat Grup</button>
                <button id="cancelBtn" class="secondary">Batal</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const container = document.getElementById('contactsList');
        const selected = [];
        
        for (let cid of contacts) {
            const user = await getUserData(cid);
            if (user) {
                const div = document.createElement('div');
                div.className = 'contact-check-item';
                div.innerHTML = `<input type="checkbox" value="${cid}"><label>${escapeHtml(user.fullName)} (${user.phone})</label>`;
                const chk = div.querySelector('input');
                chk.onchange = () => {
                    if (chk.checked) selected.push(cid);
                    else selected.splice(selected.indexOf(cid), 1);
                };
                container.appendChild(div);
            }
        }
        
        document.getElementById('createBtn').onclick = async () => {
            const name = document.getElementById('groupName').value.trim();
            if (!name) { showToast('Masukkan nama grup'); return; }
            if (selected.length === 0) { showToast('Pilih minimal 1 anggota'); return; }
            await createGroup(name, selected);
            showToast('🎉 Grup berhasil dibuat');
            modal.remove();
            await renderChatList();
        };
        document.getElementById('cancelBtn').onclick = () => modal.remove();
    }
    
    // ========== LOGIN ==========
    function renderLogin() {
        let isLogin = false;
        const root = document.getElementById('app');
        
        root.innerHTML = `
            <div class="modal" id="loginModal">
                <div class="modal-box">
                    <h3 id="modalTitle">Daftar Akun</h3>
                    <p>Buat akun dengan nomor HP</p>
                    <input type="text" id="nameInput" placeholder="Nama lengkap">
                    <input type="tel" id="phoneInput" placeholder="Nomor HP (812345678)">
                    <input type="password" id="passInput" placeholder="Password">
                    <button id="submitAuth">Daftar</button>
                    <button id="switchAuth" style="background:#ffe4ec;color:#ff6b9d">Sudah punya akun? Masuk</button>
                    <div id="errorMsg" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                </div>
            </div>
        `;
        
        const nameInput = document.getElementById('nameInput');
        const switchBtn = document.getElementById('switchAuth');
        const modalTitle = document.getElementById('modalTitle');
        const submitBtn = document.getElementById('submitAuth');
        const errorDiv = document.getElementById('errorMsg');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                modalTitle.innerText = 'Masuk Akun';
                submitBtn.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInput.style.display = 'none';
            } else {
                modalTitle.innerText = 'Daftar Akun';
                submitBtn.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInput.style.display = 'block';
            }
        };
        
        submitBtn.onclick = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('passInput').value;
            
            try {
                if (isLogin) {
                    const email = `${phone}@pinkchat.local`;
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const fullName = document.getElementById('nameInput').value.trim();
                    if (!fullName) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const q = query(collection(db, 'users'), where('phone', '==', phone));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw new Error('Nomor HP sudah terdaftar');
                    
                    const email = `${phone}@pinkchat.local`;
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, 'users', userCred.user.uid), {
                        fullName: fullName,
                        phone: phone,
                        bio: 'Halo! Saya menggunakan PinkChat',
                        contacts: [],
                        groups: [],
                        createdAt: serverTimestamp()
                    });
                }
                errorDiv.innerText = '';
            } catch(e) {
                errorDiv.innerText = e.message;
            }
        };
    }
    
    // ========== AUTH STATE ==========
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = await getUserData(user.uid);
            if (currentUser) {
                renderMainApp();
            } else {
                setTimeout(async () => {
                    currentUser = await getUserData(user.uid);
                    if (currentUser) renderMainApp();
                    else renderLogin();
                }, 1000);
            }
        } else {
            currentUser = null;
            renderLogin();
        }
    });
    
    renderLogin();
</script>
</body>
</html>
