<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PinkChat - Lengkap</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f8f0f4;
            height: 100vh;
            overflow: hidden;
        }

        /* HALAMAN UTAMA */
        .screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: white;
        }

        .header {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        .info {
            flex: 1;
            cursor: pointer;
        }

        .info h3 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .info p {
            font-size: 12px;
            color: #ff6b9d;
            margin-top: 2px;
        }

        .btn-icon {
            background: #ffe4ec;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 16px;
            cursor: pointer;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .chat-item:active {
            background: #fff5f8;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            background: #ffe4ec;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .chat-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 15px;
        }

        .chat-phone {
            font-size: 11px;
            color: #aa8a96;
            margin-top: 3px;
        }

        .actions {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ffe0e8;
            background: white;
        }

        .actions button {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        /* HALAMAN CHAT */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #fefafb;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #ff6b9d;
            cursor: pointer;
            width: 36px;
            height: 36px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        .input-area {
            background: white;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ffe0e8;
        }

        .input-area input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        /* HALAMAN PROFIL */
        .profile-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        .profile-header {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .profile-photo {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
        }

        .big-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: bold;
            cursor: pointer;
        }

        .camera-icon {
            position: absolute;
            bottom: 5px;
            right: calc(50% - 60px);
            background: #ff6b9d;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            cursor: pointer;
            border: 3px solid white;
        }

        .profile-field {
            background: #fef0f4;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .profile-field label {
            font-size: 12px;
            color: #ff6b9d;
            display: block;
            margin-bottom: 5px;
        }

        .profile-field .value {
            font-size: 16px;
            color: #2d2d2d;
            font-weight: 500;
        }

        .profile-field input {
            width: 100%;
            padding: 8px 0;
            background: none;
            border: none;
            font-size: 16px;
            outline: none;
        }

        .edit-btn {
            background: #ffe4ec;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: #ff6b9d;
            cursor: pointer;
            margin-top: 8px;
        }

        .save-btn {
            background: #ff6b9d;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            width: 85%;
            max-width: 320px;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
        }

        .modal-box button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    
    let USER = null;
    let CHAT_ID = null;
    let CHAT_NAME = null;
    let CHAT_PHOTO = null;
    let UNSUB = null;
    
    function toast(msg) {
        let t = document.querySelector('.toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function escape(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function getUser(uid) {
        const s = await getDoc(doc(db, 'users', uid));
        return s.exists() ? { uid, ...s.data() } : null;
    }
    
    // UPDATE PROFIL
    async function updateProfile(data) {
        const updates = {};
        if (data.fullName) updates.fullName = data.fullName;
        if (data.bio) updates.bio = data.bio;
        if (data.photoURL) updates.photoURL = data.photoURL;
        await updateDoc(doc(db, 'users', USER.uid), updates);
        USER = await getUser(USER.uid);
        toast('✅ Profil diperbarui');
        renderMainScreen();
    }
    
    async function uploadPhoto(base64) {
        const storageRef = ref(storage, `profile_photos/${USER.uid}`);
        await uploadString(storageRef, base64, 'data_url');
        const url = await getDownloadURL(storageRef);
        await updateProfile({ photoURL: url });
    }
    
    // GET CHAT ID
    async function getChatId(uid1, uid2) {
        const chats = collection(db, 'chats');
        const q1 = query(chats, where('participants', '==', [uid1, uid2]));
        const q2 = query(chats, where('participants', '==', [uid2, uid1]));
        let s = await getDocs(q1);
        if (s.empty) s = await getDocs(q2);
        if (!s.empty) return s.docs[0].id;
        
        const ref = await addDoc(chats, {
            participants: [uid1, uid2],
            createdAt: serverTimestamp()
        });
        return ref.id;
    }
    
    async function sendMsg(chatId, text) {
        if (!chatId || !text) return;
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
            senderId: USER.uid,
            text: text,
            timestamp: serverTimestamp()
        });
    }
    
    async function addContact(phone) {
        const q = query(collection(db, 'users'), where('phone', '==', phone));
        const s = await getDocs(q);
        if (s.empty) throw new Error('Nomor tidak terdaftar');
        const target = s.docs[0];
        if (target.id === USER.uid) throw new Error('Tidak bisa tambah sendiri');
        
        await updateDoc(doc(db, 'users', USER.uid), { contacts: arrayUnion(target.id) });
        await updateDoc(doc(db, 'users', target.id), { contacts: arrayUnion(USER.uid) });
        return true;
    }
    
    // RENDER KONTAK
    async function renderContacts() {
        const container = document.getElementById('chatList');
        if (!container) return;
        
        const u = await getUser(USER.uid);
        const kontak = u?.contacts || [];
        const items = [];
        
        for (let id of kontak) {
            const p = await getUser(id);
            if (p) items.push({ uid: id, name: p.fullName, phone: p.phone, photo: p.photoURL });
        }
        
        container.innerHTML = '';
        if (items.length === 0) {
            container.innerHTML = '<div class="empty">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        
        for (let item of items) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                ${item.photo ? `<img src="${item.photo}" class="chat-avatar" style="object-fit:cover">` : `<div class="chat-avatar">${escape(item.name.charAt(0).toUpperCase())}</div>`}
                <div>
                    <div class="chat-name">${escape(item.name)}</div>
                    <div class="chat-phone">${escape(item.phone)}</div>
                </div>
            `;
            div.onclick = () => openChat(item.uid, item.name, item.photo);
            container.appendChild(div);
        }
    }
    
    // OPEN CHAT
    async function openChat(uid, name, photo) {
        if (UNSUB) UNSUB();
        
        const chatId = await getChatId(USER.uid, uid);
        CHAT_ID = chatId;
        CHAT_NAME = name;
        CHAT_PHOTO = photo;
        
        document.getElementById('chatName').innerHTML = escape(name);
        if (photo) {
            document.getElementById('chatAvatar').innerHTML = `<img src="${photo}" style="width:45px;height:45px;border-radius:50%;object-fit:cover">`;
        } else {
            document.getElementById('chatAvatar').innerHTML = name.charAt(0).toUpperCase();
        }
        
        const msgDiv = document.getElementById('messagesDiv');
        msgDiv.innerHTML = '<div class="empty">Loading...</div>';
        
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        UNSUB = onSnapshot(q, (snap) => {
            msgDiv.innerHTML = '';
            if (snap.empty) {
                msgDiv.innerHTML = '<div class="empty">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.senderId === USER.uid;
                const el = document.createElement('div');
                el.className = `message ${isMe ? 'sent' : 'received'}`;
                const t = m.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                el.innerHTML = `<div class="bubble">${escape(m.text)}</div><div class="time">${t}</div>`;
                msgDiv.appendChild(el);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
        
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
    }
    
    async function sendNow() {
        if (!CHAT_ID) return;
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        await sendMsg(CHAT_ID, text);
        input.value = '';
    }
    
    function closeChat() {
        if (UNSUB) UNSUB();
        CHAT_ID = null;
        document.getElementById('mainScreen').style.display = 'flex';
        document.getElementById('chatView').style.display = 'none';
        renderContacts();
    }
    
    // HALAMAN PROFIL PRIBADI
    function showMyProfile() {
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('profileScreen').style.display = 'flex';
        document.getElementById('profileTitle').innerHTML = 'Profil Saya';
        document.getElementById('isOtherProfile').value = 'false';
        
        renderMyProfile();
    }
    
    async function renderMyProfile() {
        document.getElementById('profileNameValue').innerHTML = escape(USER.fullName);
        document.getElementById('profilePhoneValue').innerHTML = USER.phone;
        document.getElementById('profileBioValue').innerHTML = escape(USER.bio || 'Halo! Saya menggunakan PinkChat');
        
        const avatarDiv = document.getElementById('profileAvatar');
        if (USER.photoURL) {
            avatarDiv.innerHTML = `<img src="${USER.photoURL}" style="width:120px;height:120px;border-radius:50%;object-fit:cover">`;
        } else {
            avatarDiv.innerHTML = USER.fullName?.charAt(0).toUpperCase() || 'U';
        }
    }
    
    function editMode() {
        document.getElementById('profileNameValue').innerHTML = `<input type="text" id="editName" value="${escape(USER.fullName)}" style="width:100%;padding:8px;border-radius:12px;border:1px solid #ffe0e8">`;
        document.getElementById('profileBioValue').innerHTML = `<textarea id="editBio" rows="3" style="width:100%;padding:8px;border-radius:12px;border:1px solid #ffe0e8">${escape(USER.bio || '')}</textarea>`;
        document.getElementById('editProfileBtn').style.display = 'none';
        document.getElementById('saveProfileBtn').style.display = 'block';
    }
    
    async function saveProfileEdit() {
        const newName = document.getElementById('editName')?.value.trim();
        const newBio = document.getElementById('editBio')?.value.trim();
        if (newName) {
            await updateProfile({ fullName: newName, bio: newBio });
        }
        document.getElementById('editProfileBtn').style.display = 'block';
        document.getElementById('saveProfileBtn').style.display = 'none';
        renderMyProfile();
    }
    
    function changePhoto() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await uploadPhoto(ev.target.result);
                    renderMyProfile();
                    renderContacts();
                    toast('✅ Foto profil diperbarui');
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    // LIHAT PROFIL ORANG LAIN
    async function showOtherProfile(userId) {
        const other = await getUser(userId);
        if (!other) return;
        
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('profileScreen').style.display = 'flex';
        document.getElementById('profileTitle').innerHTML = 'Info Kontak';
        document.getElementById('isOtherProfile').value = 'true';
        document.getElementById('editProfileBtn').style.display = 'none';
        document.getElementById('saveProfileBtn').style.display = 'none';
        
        const avatarDiv = document.getElementById('profileAvatar');
        if (other.photoURL) {
            avatarDiv.innerHTML = `<img src="${other.photoURL}" style="width:120px;height:120px;border-radius:50%;object-fit:cover">`;
        } else {
            avatarDiv.innerHTML = other.fullName?.charAt(0).toUpperCase() || '?';
        }
        
        document.getElementById('profileNameValue').innerHTML = escape(other.fullName);
        document.getElementById('profilePhoneValue').innerHTML = other.phone;
        document.getElementById('profileBioValue').innerHTML = escape(other.bio || 'Halo! Saya menggunakan PinkChat');
    }
    
    function closeProfile() {
        document.getElementById('profileScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'flex';
        renderContacts();
    }
    
    // MODAL ADD CONTACT
    function showAddModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Tambah Kontak</h3>
                <input type="tel" id="phone" placeholder="Nomor HP">
                <button id="add">Tambah</button>
                <button id="cancel" style="background:#ffe4ec;color:#ff6b9d">Batal</button>
                <div id="err" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('add').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            try {
                await addContact(phone);
                toast('✅ Kontak ditambahkan');
                modal.remove();
                renderContacts();
            } catch(e) {
                document.getElementById('err').innerText = e.message;
            }
        };
        document.getElementById('cancel').onclick = () => modal.remove();
    }
    
    // MAIN SCREEN
    async function renderMainScreen() {
        const root = document.getElementById('root');
        
        root.innerHTML = `
            <!-- HALAMAN UTAMA -->
            <div id="mainScreen" class="screen">
                <div class="header">
                    <div class="avatar-img" id="profileBtn">
                        ${USER?.photoURL ? `<img src="${USER.photoURL}" style="width:45px;height:45px;border-radius:50%;object-fit:cover">` : (USER?.fullName?.charAt(0) || 'U')}
                    </div>
                    <div class="info" id="profileInfo">
                        <h3>${escape(USER?.fullName || 'User')}</h3>
                        <p>${USER?.phone || ''}</p>
                    </div>
                    <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="chat-list" id="chatList"></div>
                <div class="actions">
                    <button id="addContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                    <button id="groupBtn" disabled style="opacity:0.5"><i class="fas fa-users"></i> Grup</button>
                </div>
            </div>
            
            <!-- HALAMAN CHAT -->
            <div id="chatView" class="chat-view">
                <div class="header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="avatar-img" id="chatAvatar" style="cursor:pointer">P</div>
                    <div class="info" id="chatInfo" style="cursor:pointer">
                        <h3 id="chatName">Chat</h3>
                        <p>Online</p>
                    </div>
                </div>
                <div class="messages" id="messagesDiv"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Ketik pesan...">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            
            <!-- HALAMAN PROFIL -->
            <div id="profileScreen" class="profile-screen">
                <div class="profile-header">
                    <button class="back-btn" id="closeProfileBtn"><i class="fas fa-arrow-left"></i></button>
                    <h3 id="profileTitle">Profil Saya</h3>
                </div>
                <div class="profile-content">
                    <div class="profile-photo">
                        <div class="big-avatar" id="profileAvatar"></div>
                        <div class="camera-icon" id="cameraBtn"><i class="fas fa-camera"></i></div>
                    </div>
                    <div class="profile-field">
                        <label>Nama</label>
                        <div class="value" id="profileNameValue"></div>
                    </div>
                    <div class="profile-field">
                        <label>Nomor HP</label>
                        <div class="value" id="profilePhoneValue"></div>
                    </div>
                    <div class="profile-field">
                        <label>Tentang</label>
                        <div class="value" id="profileBioValue"></div>
                    </div>
                    <button class="edit-btn" id="editProfileBtn"><i class="fas fa-pen"></i> Edit Profil</button>
                    <button class="save-btn" id="saveProfileBtn" style="display:none"><i class="fas fa-save"></i> Simpan</button>
                </div>
            </div>
            <input type="hidden" id="isOtherProfile" value="false">
        `;
        
        await renderContacts();
        
        document.getElementById('profileBtn').onclick = showMyProfile;
        document.getElementById('profileInfo').onclick = showMyProfile;
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) await signOut(auth);
        };
        document.getElementById('addContactBtn').onclick = showAddModal;
        document.getElementById('backBtn').onclick = closeChat;
        document.getElementById('sendBtn').onclick = sendNow;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendNow();
        });
        document.getElementById('closeProfileBtn').onclick = closeProfile;
        document.getElementById('editProfileBtn').onclick = editMode;
        document.getElementById('saveProfileBtn').onclick = saveProfileEdit;
        document.getElementById('cameraBtn').onclick = () => {
            if (document.getElementById('isOtherProfile').value === 'false') {
                changePhoto();
            }
        };
        
        // Chat header click untuk lihat profil kontak
        const showChatProfile = async () => {
            if (CHAT_ID) {
                const chatDoc = await getDoc(doc(db, 'chats', CHAT_ID));
                if (chatDoc.exists()) {
                    const otherId = chatDoc.data().participants.find(p => p !== USER.uid);
                    showOtherProfile(otherId);
                }
            }
        };
        document.getElementById('chatAvatar').onclick = showChatProfile;
        document.getElementById('chatInfo').onclick = showChatProfile;
    }
    
    // LOGIN
    function loginPage() {
        let isLogin = false;
        const root = document.getElementById('root');
        
        root.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:white;padding:20px">
                <div style="width:100%;max-width:320px;text-align:center">
                    <h2 style="color:#ff6b9d;margin-bottom:10px">PinkChat</h2>
                    <p style="color:#aa8a96;margin-bottom:30px">Chat real-time dengan teman</p>
                    <input type="text" id="name" placeholder="Nama lengkap" style="width:100%;padding:14px;margin:8px 0;background:#fef0f4;border:none;border-radius:30px">
                    <input type="tel" id="phone" placeholder="Nomor HP (812345678)" style="width:100%;padding:14px;margin:8px 0;background:#fef0f4;border:none;border-radius:30px">
                    <input type="password" id="pass" placeholder="Password" style="width:100%;padding:14px;margin:8px 0;background:#fef0f4;border:none;border-radius:30px">
                    <button id="submit" style="width:100%;padding:14px;background:#ff6b9d;border:none;border-radius:30px;color:white;font-weight:bold;margin-top:15px">Daftar</button>
                    <button id="switch" style="width:100%;padding:14px;background:#ffe4ec;border:none;border-radius:30px;color:#ff6b9d;font-weight:bold;margin-top:10px">Sudah punya akun? Masuk</button>
                    <div id="error" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                </div>
            </div>
        `;
        
        const nameInput = document.getElementById('name');
        const submit = document.getElementById('submit');
        const switchBtn = document.getElementById('switch');
        const errorDiv = document.getElementById('error');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                submit.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInput.style.display = 'none';
            } else {
                submit.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInput.style.display = 'block';
            }
        };
        
        submit.onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('pass').value;
            
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                } else {
                    const name = document.getElementById('name').value.trim();
                    if (!name) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const q = query(collection(db, 'users'), where('phone', '==', phone));
                    const s = await getDocs(q);
                    if (!s.empty) throw new Error('Nomor sudah terdaftar');
                    
                    const uc = await createUserWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                    await setDoc(doc(db, 'users', uc.user.uid), {
                        fullName: name,
                        phone: phone,
                        bio: 'Halo! Saya menggunakan PinkChat',
                        contacts: [],
                        createdAt: serverTimestamp()
                    });
                }
                errorDiv.innerText = '';
            } catch(e) {
                errorDiv.innerText = e.message;
            }
        };
    }
    
    // AUTH
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            USER = await getUser(u.uid);
            if (USER) {
                renderMainScreen();
            } else {
                setTimeout(async () => {
                    USER = await getUser(u.uid);
                    if (USER) renderMainScreen();
                    else loginPage();
                }, 1000);
            }
        } else {
            USER = null;
            loginPage();
        }
    });
    
    loginPage();
</script>
</body>
</html>
