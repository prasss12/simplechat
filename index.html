<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketHub | Marketplace Modern</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --dark: #0f172a;
            --gray: #64748b;
            --light: #f8fafc;
            --border: #e2e8f0;
            --yellow: #fbbf24;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: var(--dark); }

        .navbar {
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo { font-size: 1.5rem; font-weight: 700; color: var(--dark); cursor: pointer; }
        .logo span { color: var(--primary); }

        .nav-links { display: flex; gap: 1.5rem; align-items: center; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: var(--gray); font-weight: 500; cursor: pointer; font-size: 0.9rem; }
        .nav-links a:hover { color: var(--primary); }

        .search-container {
            background: white;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--border);
            flex: 1;
            max-width: 400px;
        }
        .search-container input { flex: 1; border: none; outline: none; font-size: 0.875rem; }

        .btn {
            padding: 0.5rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
            border: none;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--gray); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.75rem; }
        .btn-block { width: 100%; }

        .container { max-width: 1280px; margin: 0 auto; padding: 2rem; }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .product-card {
            background: white;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.2s;
            border: 1px solid var(--border);
            cursor: pointer;
        }
        .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -12px rgba(0,0,0,0.15); }
        .product-image { width: 100%; height: 200px; object-fit: cover; background: var(--light); }
        .product-info { padding: 1rem; }
        .product-title { font-weight: 600; font-size: 0.9rem; margin-bottom: 0.25rem; }
        .product-price { font-weight: 700; font-size: 1rem; color: var(--primary); margin: 0.5rem 0; }
        .rating { display: flex; align-items: center; gap: 0.25rem; margin-bottom: 0.5rem; }
        .rating i { color: var(--yellow); font-size: 0.7rem; }
        .rating span { font-size: 0.7rem; color: var(--gray); }

        /* Product Detail */
        .product-detail { background: white; border-radius: 1rem; border: 1px solid var(--border); overflow: hidden; }
        .detail-main { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; padding: 2rem; }
        .detail-image img { width: 100%; border-radius: 1rem; }
        .detail-info h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .detail-price { font-size: 1.8rem; font-weight: 700; color: var(--primary); margin: 1rem 0; }
        .variant-section { margin: 1.5rem 0; padding: 1rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .variant-options { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .variant-option { padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 2rem; cursor: pointer; font-size: 0.875rem; }
        .variant-option.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .quantity-selector { display: flex; align-items: center; gap: 1rem; margin: 1rem 0; }
        .quantity-btn { width: 36px; height: 36px; border: 1px solid var(--border); background: white; border-radius: 0.5rem; cursor: pointer; }
        .quantity-input { width: 60px; text-align: center; padding: 0.5rem; border: 1px solid var(--border); border-radius: 0.5rem; }
        .reviews-section { padding: 2rem; border-top: 1px solid var(--border); }
        .review-card { padding: 1rem 0; border-bottom: 1px solid var(--border); }

        /* Cart */
        .cart-item {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: white;
            border-radius: 0.75rem;
            border: 1px solid var(--border);
            margin-bottom: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .cart-item-image { width: 70px; height: 70px; object-fit: cover; border-radius: 0.5rem; }
        .cart-quantity { display: flex; align-items: center; gap: 0.5rem; }
        .cart-quantity button { width: 28px; height: 28px; border: 1px solid var(--border); background: white; border-radius: 0.375rem; cursor: pointer; }
        .cart-total { background: white; padding: 1rem; border-radius: 0.75rem; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; flex-wrap: wrap; gap: 1rem; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            border-radius: 1rem;
            width: 90%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-header { padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-close { cursor: pointer; font-size: 1.25rem; color: var(--gray); }
        .modal-body { padding: 1.5rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid var(--border); border-radius: 0.5rem; font-size: 0.875rem; font-family: 'Inter', sans-serif; }

        .checkout-item { display: flex; gap: 1rem; padding: 1rem; background: var(--light); border-radius: 0.75rem; margin-bottom: 1rem; }
        .checkout-item-image { width: 80px; height: 80px; object-fit: cover; border-radius: 0.5rem; }
        .price-breakdown { background: var(--light); padding: 1rem; border-radius: 0.75rem; margin: 1rem 0; }
        .price-row { display: flex; justify-content: space-between; padding: 0.5rem 0; }
        .total-row { font-weight: 700; border-top: 1px solid var(--border); margin-top: 0.5rem; padding-top: 0.5rem; }

        .alert {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 0.75rem 1.25rem;
            border-radius: 0.5rem;
            color: white;
            font-size: 0.875rem;
            z-index: 1000;
            animation: slideIn 0.2s ease;
        }
        .alert-success { background: var(--success); }
        .alert-error { background: var(--danger); }
        .alert-info { background: var(--primary); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .badge { display: inline-block; padding: 0.25rem 0.5rem; border-radius: 0.375rem; font-size: 0.7rem; font-weight: 600; }
        .badge-admin { background: #ef4444; color: white; }
        .badge-business { background: #f59e0b; color: white; }
        .badge-user { background: #10b981; color: white; }

        .empty-state { text-align: center; padding: 3rem; background: white; border-radius: 1rem; border: 1px solid var(--border); }
        .loading { text-align: center; padding: 3rem; color: var(--gray); }
        .divider { text-align: center; padding: 1rem 0; color: var(--gray); font-size: 0.75rem; }

        @media (max-width: 768px) {
            .detail-main { grid-template-columns: 1fr; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="showProducts()">Market<span>Hub</span></div>
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Cari produk..." onkeyup="searchProducts()">
            </div>
            <div class="nav-links" id="navLinks"></div>
        </div>
    </nav>

    <div class="container" id="mainContent">
        <div class="loading">Memuat...</div>
    </div>

    <!-- Modals -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Masuk</h3><span class="modal-close" onclick="closeModal('loginModal')">&times;</span></div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="form-group"><label>Email</label><input type="email" id="loginEmail" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="loginPassword" required></div>
                    <button type="submit" class="btn btn-primary btn-block">Masuk</button>
                </form>
                <div class="divider">atau</div>
                <button class="btn btn-outline btn-block" onclick="googleLogin()"><i class="fab fa-google"></i> Google</button>
                <p style="text-align:center; margin-top:1rem; font-size:0.75rem">Belum punya akun? <a onclick="showRegisterModal()" style="color:var(--primary); cursor:pointer">Daftar</a></p>
            </div>
        </div>
    </div>

    <div id="registerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Daftar</h3><span class="modal-close" onclick="closeModal('registerModal')">&times;</span></div>
            <div class="modal-body">
                <form id="registerForm">
                    <div class="form-group"><label>Nama</label><input type="text" id="registerName" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="registerEmail" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="registerPassword" required></div>
                    <div class="form-group">
                        <label>Tipe Akun</label>
                        <select id="registerRole"><option value="user">Pembeli</option><option value="business">Penjual</option></select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Daftar</button>
                </form>
            </div>
        </div>
    </div>

    <div id="becomeSellerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Daftar Jadi Penjual</h3><span class="modal-close" onclick="closeModal('becomeSellerModal')">&times;</span></div>
            <div class="modal-body">
                <form id="becomeSellerForm">
                    <div class="form-group"><label>Nama Lengkap</label><input type="text" id="sellerFullName" required></div>
                    <div class="form-group"><label>Nama Toko</label><input type="text" id="storeName" required></div>
                    <div class="form-group"><label>Alamat Toko</label><textarea id="storeAddress" rows="2" required></textarea></div>
                    <div class="form-group"><label>No. HP</label><input type="tel" id="storePhone" required></div>
                    <button type="submit" class="btn btn-warning btn-block">Daftar Jadi Penjual</button>
                </form>
            </div>
        </div>
    </div>

    <div id="addProductModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Tambah Produk</h3><span class="modal-close" onclick="closeModal('addProductModal')">&times;</span></div>
            <div class="modal-body">
                <form id="addProductForm">
                    <div class="form-group"><label>Nama Produk</label><input type="text" id="productName" required></div>
                    <div class="form-group"><label>Harga</label><input type="number" id="productPrice" required></div>
                    <div class="form-group"><label>Stok</label><input type="number" id="productStock" value="1" required></div>
                    <div class="form-group"><label>Varian (pisah koma)</label><input type="text" id="productVariants" placeholder="Merah, Biru, XL, L"></div>
                    <div class="form-group"><label>Deskripsi</label><textarea id="productDescription" rows="3"></textarea></div>
                    <div class="form-group"><label>URL Gambar</label><input type="url" id="productImage" placeholder="https://placehold.co/400x300"></div>
                    <button type="submit" class="btn btn-primary btn-block">Tambah</button>
                </form>
            </div>
        </div>
    </div>

    <div id="addressModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>Alamat Pengiriman</h3><span class="modal-close" onclick="closeModal('addressModal')">&times;</span></div>
            <div class="modal-body">
                <form id="addressForm">
                    <div class="form-group"><label>Alamat</label><textarea id="address" rows="2" required></textarea></div>
                    <div class="form-group"><label>Kota</label><input type="text" id="city" required></div>
                    <div class="form-group"><label>Kode Pos</label><input type="text" id="postalCode" required></div>
                    <div class="form-group"><label>No. HP</label><input type="tel" id="phone" required></div>
                    <button type="submit" class="btn btn-primary btn-block">Simpan</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content" style="max-width:700px;">
            <div class="modal-header"><h3>Detail Pesanan</h3><span class="modal-close" onclick="closeModal('checkoutModal')">&times;</span></div>
            <div class="modal-body" id="checkoutBody"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
            authDomain: "simplechat-85cd8.firebaseapp.com",
            projectId: "simplechat-85cd8",
            storageBucket: "simplechat-85cd8.firebasestorage.app",
            messagingSenderId: "244789873168",
            appId: "1:244789873168:web:4cba5481f689ab3103d895"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentUserData = null;
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        let ongkir = 15000;

        function showAlert(msg, type = 'success') {
            const el = document.createElement('div');
            el.className = `alert alert-${type}`;
            el.innerHTML = msg;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function showLoginModal() { document.getElementById('loginModal').style.display = 'flex'; }
        function showRegisterModal() { document.getElementById('registerModal').style.display = 'flex'; }
        function showBecomeSellerModal() { document.getElementById('becomeSellerModal').style.display = 'flex'; }
        function showAddressModal() { document.getElementById('addressModal').style.display = 'flex'; }

        function showAddProductModal() {
            if (!currentUser) { showAlert('Login dulu', 'error'); return; }
            if (currentUserData?.role !== 'business' && currentUserData?.role !== 'admin') {
                showBecomeSellerModal(); return;
            }
            document.getElementById('addProductModal').style.display = 'flex';
        }

        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                const userRef = db.collection('users').doc(result.user.uid);
                const userDoc = await userRef.get();
                if (!userDoc.exists) {
                    await userRef.set({ name: result.user.displayName, email: result.user.email, role: 'user', address: '', city: '', postalCode: '', phone: '' });
                }
                showAlert('Login berhasil', 'success');
                closeModal('loginModal');
            } catch (error) { showAlert(error.message, 'error'); }
        }

        document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            try {
                await auth.signInWithEmailAndPassword(
                    document.getElementById('loginEmail').value,
                    document.getElementById('loginPassword').value
                );
                showAlert('Login berhasil', 'success');
                closeModal('loginModal');
            } catch (error) { showAlert(error.message, 'error'); }
        });

        document.getElementById('registerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const role = document.getElementById('registerRole').value;
            try {
                const uc = await auth.createUserWithEmailAndPassword(email, password);
                await db.collection('users').doc(uc.user.uid).set({ name, email, role, address: '', city: '', postalCode: '', phone: '' });
                showAlert('Daftar berhasil!', 'success');
                closeModal('registerModal');
            } catch (error) { showAlert(error.message, 'error'); }
        });

        document.getElementById('becomeSellerForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                role: 'business',
                fullName: document.getElementById('sellerFullName').value,
                storeName: document.getElementById('storeName').value,
                storeAddress: document.getElementById('storeAddress').value,
                storePhone: document.getElementById('storePhone').value
            };
            await db.collection('users').doc(currentUser.uid).update(data);
            currentUserData = { ...currentUserData, ...data };
            showAlert('Selamat! Anda jadi penjual', 'success');
            closeModal('becomeSellerModal');
            updateNav();
            showProfile();
        });

        document.getElementById('addProductForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            const variants = document.getElementById('productVariants').value.split(',').map(v => v.trim()).filter(v => v);
            await db.collection('products').add({
                name: document.getElementById('productName').value,
                price: parseInt(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                variants: variants,
                description: document.getElementById('productDescription').value,
                imageUrl: document.getElementById('productImage').value || 'https://placehold.co/400x300',
                sellerId: currentUser.uid,
                sellerName: currentUserData?.storeName || currentUserData?.name,
                ratings: [],
                averageRating: 0,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'available'
            });
            showAlert('Produk ditambahkan', 'success');
            closeModal('addProductModal');
            document.getElementById('addProductForm').reset();
            showMyProducts();
        });

        document.getElementById('addressForm')?.addEventListener('submit', async (e) => {
            e.preventDefault();
            await db.collection('users').doc(currentUser.uid).update({
                address: document.getElementById('address').value,
                city: document.getElementById('city').value,
                postalCode: document.getElementById('postalCode').value,
                phone: document.getElementById('phone').value
            });
            showAlert('Alamat disimpan', 'success');
            closeModal('addressModal');
            showProfile();
        });

        // CART FUNCTIONS
        function addToCart(product) {
            if (!currentUser) { showAlert('Login dulu', 'error'); return; }
            const existing = cart.find(item => item.id === product.id);
            if (existing) {
                if (existing.quantity < product.stock) existing.quantity++;
                else { showAlert('Stok habis', 'error'); return; }
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            localStorage.setItem('cart', JSON.stringify(cart));
            showAlert(`${product.name} ditambahkan ke keranjang`, 'success');
            updateCartCount();
        }

        function updateCartCount() {
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            const cartBtn = document.getElementById('cartCount');
            if (cartBtn) cartBtn.textContent = count;
        }

        function showCart() {
            const content = document.getElementById('mainContent');
            if (cart.length === 0) {
                content.innerHTML = '<div class="empty-state"><i class="fas fa-shopping-cart"></i><p>Keranjang kosong</p><button class="btn btn-primary" onclick="showProducts()">Belanja</button></div>';
                return;
            }
            let total = 0;
            content.innerHTML = `<div style="margin-bottom:1rem"><h2>Keranjang Belanja</h2></div><div id="cartItems"></div><div class="cart-total"><span><strong>Total</strong></span><span style="font-size:1.25rem; font-weight:700; color:var(--primary)" id="cartTotal">0</span><button class="btn btn-success" onclick="checkoutCart()">Checkout</button></div>`;
            const container = document.getElementById('cartItems');
            cart.forEach((item, idx) => {
                total += item.price * item.quantity;
                container.innerHTML += `
                    <div class="cart-item">
                        <img src="${item.image}" class="cart-item-image" onerror="this.src='https://placehold.co/70x70'">
                        <div style="flex:1"><strong>${item.name}</strong><br>Rp ${item.price.toLocaleString()}</div>
                        <div class="cart-quantity">
                            <button onclick="updateCartQty(${idx}, -1)">-</button>
                            <span style="min-width:30px; text-align:center">${item.quantity}</span>
                            <button onclick="updateCartQty(${idx}, 1)">+</button>
                        </div>
                        <div style="font-weight:600; min-width:80px; text-align:right">Rp ${(item.price * item.quantity).toLocaleString()}</div>
                        <button class="btn btn-danger btn-sm" onclick="removeFromCart(${idx})">Hapus</button>
                    </div>`;
            });
            document.getElementById('cartTotal').innerText = total.toLocaleString();
        }

        function updateCartQty(idx, delta) {
            const newQty = cart[idx].quantity + delta;
            if (newQty < 1) cart.splice(idx, 1);
            else if (newQty <= cart[idx].stock) cart[idx].quantity = newQty;
            else { showAlert('Stok habis', 'error'); return; }
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showCart();
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showCart();
        }

        async function checkoutCart() {
            if (!currentUser) { showAlert('Login dulu', 'error'); return; }
            if (cart.length === 0) { showAlert('Keranjang kosong', 'error'); return; }
            
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const address = userDoc.data();
            if (!address.address) {
                showAddressModal();
                showAlert('Isi alamat dulu', 'info');
                return;
            }
            
            let subtotal = 0;
            for (const item of cart) {
                const productRef = db.collection('products').doc(item.id);
                const productDoc = await productRef.get();
                if (productDoc.exists && productDoc.data().stock < item.quantity) {
                    showAlert(`Stok ${item.name} habis`, 'error');
                    return;
                }
                subtotal += item.price * item.quantity;
            }
            
            const total = subtotal + ongkir;
            
            document.getElementById('checkoutBody').innerHTML = `
                <div style="margin-bottom:1rem; padding:1rem; background:var(--light); border-radius:0.75rem;">
                    <h4>Alamat Pengiriman</h4>
                    <p>${address.name}</p>
                    <p>${address.address}, ${address.city} - ${address.postalCode}</p>
                    <p>📞 ${address.phone}</p>
                </div>
                <div style="margin-bottom:1rem">
                    <h4>Produk yang dibeli</h4>
                    ${cart.map(item => `<div style="display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid var(--border);"><span>${item.name} x${item.quantity}</span><span>Rp ${(item.price * item.quantity).toLocaleString()}</span></div>`).join('')}
                </div>
                <div class="price-breakdown">
                    <div class="price-row"><span>Subtotal</span><span>Rp ${subtotal.toLocaleString()}</span></div>
                    <div class="price-row"><span>Ongkos Kirim</span><span>Rp ${ongkir.toLocaleString()}</span></div>
                    <div class="price-row total-row"><span>Total</span><span style="color:var(--primary); font-size:1.2rem;">Rp ${total.toLocaleString()}</span></div>
                </div>
                <div style="margin:1rem 0; background:#e0f2fe; padding:0.75rem; border-radius:0.5rem;"><i class="fas fa-credit-card"></i> Pembayaran: <strong>COD</strong></div>
                <button class="btn btn-success btn-block" onclick="confirmCartOrder()">Buat Pesanan</button>
            `;
            document.getElementById('checkoutModal').style.display = 'flex';
        }

        async function confirmCartOrder() {
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const address = userDoc.data();
            let subtotal = 0;
            
            for (const item of cart) {
                subtotal += item.price * item.quantity;
                const productRef = db.collection('products').doc(item.id);
                const productDoc = await productRef.get();
                await productRef.update({ stock: productDoc.data().stock - item.quantity });
                
                await db.collection('orders').add({
                    productId: item.id,
                    productName: item.name,
                    price: item.price,
                    quantity: item.quantity,
                    subtotal: item.price * item.quantity,
                    shippingCost: ongkir,
                    total: (item.price * item.quantity) + ongkir,
                    paymentMethod: 'COD',
                    buyerId: currentUser.uid,
                    buyerName: currentUserData?.name,
                    sellerId: item.sellerId,
                    sellerName: item.sellerName,
                    address: address.address,
                    city: address.city,
                    status: 'pending',
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
            
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showAlert('Pesanan berhasil dibuat!', 'success');
            closeModal('checkoutModal');
            showOrders();
        }

        // Product Detail
        let currentProduct = null;
        let selectedVariant = null;
        let selectedQuantity = 1;

        function showProductDetail(id) {
            db.collection('products').doc(id).get().then(doc => {
                if (doc.exists) {
                    currentProduct = { id: doc.id, ...doc.data() };
                    selectedVariant = currentProduct.variants?.[0] || null;
                    selectedQuantity = 1;
                    renderDetail();
                }
            });
        }

        function renderDetail() {
            const p = currentProduct;
            const rating = p.averageRating || 0;
            document.getElementById('mainContent').innerHTML = `
                <div class="product-detail">
                    <div class="detail-main">
                        <div class="detail-image"><img src="${p.imageUrl}" onerror="this.src='https://placehold.co/400x300'"></div>
                        <div class="detail-info">
                            <h1>${p.name}</h1>
                            <div class="rating">${renderStars(rating)} <span>(${p.ratings?.length || 0} ulasan)</span></div>
                            <div class="detail-price">Rp ${p.price.toLocaleString()}</div>
                            <div>Stok: ${p.stock}</div>
                            <div><i class="fas fa-store"></i> ${p.sellerName}</div>
                            ${p.variants?.length ? `
                            <div class="variant-section">
                                <div>Pilih Varian</div>
                                <div class="variant-options">
                                    ${p.variants.map(v => `<div class="variant-option ${selectedVariant === v ? 'selected' : ''}" onclick="selectVariant('${v}')">${v}</div>`).join('')}
                                </div>
                            </div>` : ''}
                            <div class="quantity-selector">
                                <button class="quantity-btn" onclick="changeQty(-1)">-</button>
                                <input type="number" class="quantity-input" id="qtyInput" value="${selectedQuantity}" min="1" max="${p.stock}" onchange="updateQty()">
                                <button class="quantity-btn" onclick="changeQty(1)">+</button>
                            </div>
                            <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                                <button class="btn btn-outline" style="flex:1" onclick='addToCart({id:"${p.id}",name:"${p.name}",price:${p.price},stock:${p.stock},sellerId:"${p.sellerId}",sellerName:"${p.sellerName}",image:"${p.imageUrl}"})'>🛒 Keranjang</button>
                                <button class="btn btn-primary" style="flex:1" onclick="openCheckoutModal()">Beli Sekarang</button>
                            </div>
                        </div>
                    </div>
                    <div class="reviews-section">
                        <h3>Ulasan Produk</h3>
                        ${p.ratings?.length ? p.ratings.map(r => `
                            <div class="review-card">
                                <div class="rating">${renderStars(r.rating)}</div>
                                <div><strong>${r.userName}</strong></div>
                                <div>${r.comment}</div>
                            </div>`).join('') : '<p>Belum ada ulasan</p>'}
                        ${currentUser && currentUser.uid !== p.sellerId ? `
                            <div style="margin-top:1rem">
                                <textarea id="reviewText" rows="2" placeholder="Tulis ulasan..." style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:0.5rem;"></textarea>
                                <select id="reviewRating" style="margin-top:0.5rem; padding:0.5rem;">
                                    <option value="5">★★★★★</option><option value="4">★★★★☆</option><option value="3">★★★☆☆</option>
                                    <option value="2">★★☆☆☆</option><option value="1">★☆☆☆☆</option>
                                </select>
                                <button class="btn btn-primary btn-sm" onclick="addReview('${p.id}')">Kirim Ulasan</button>
                            </div>` : ''}
                    </div>
                </div>`;
        }

        function renderStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) stars += `<i class="fas fa-star" style="color:${i <= rating ? '#fbbf24' : '#e2e8f0'}; font-size:0.75rem;"></i>`;
            return stars;
        }

        function selectVariant(v) { selectedVariant = v; renderDetail(); }
        function changeQty(d) { let n = selectedQuantity + d; if (n >= 1 && n <= currentProduct.stock) selectedQuantity = n; document.getElementById('qtyInput') && (document.getElementById('qtyInput').value = selectedQuantity); }
        function updateQty() { let v = parseInt(document.getElementById('qtyInput').value); if (v >= 1 && v <= currentProduct.stock) selectedQuantity = v; else selectedQuantity = currentProduct.stock; document.getElementById('qtyInput').value = selectedQuantity; }

        async function addReview(id) {
            const comment = document.getElementById('reviewText').value;
            const rating = parseInt(document.getElementById('reviewRating').value);
            if (!comment) { showAlert('Tulis ulasan dulu', 'error'); return; }
            const ref = db.collection('products').doc(id);
            const doc = await ref.get();
            const ratings = doc.data().ratings || [];
            ratings.push({ userId: currentUser.uid, userName: currentUserData?.name, rating, comment, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
            const avg = ratings.reduce((s, r) => s + r.rating, 0) / ratings.length;
            await ref.update({ ratings, averageRating: avg });
            showAlert('Ulasan terkirim!', 'success');
            showProductDetail(id);
        }

        async function openCheckoutModal() {
            if (!currentUser) { showAlert('Login dulu', 'error'); return; }
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const addr = userDoc.data();
            if (!addr.address) { showAddressModal(); showAlert('Isi alamat dulu', 'info'); return; }
            const subtotal = currentProduct.price * selectedQuantity;
            const total = subtotal + ongkir;
            document.getElementById('checkoutBody').innerHTML = `
                <div style="margin-bottom:1rem; padding:1rem; background:var(--light); border-radius:0.75rem;">
                    <h4>Alamat Pengiriman</h4>
                    <p>${addr.name}</p><p>${addr.address}, ${addr.city} - ${addr.postalCode}</p><p>📞 ${addr.phone}</p>
                </div>
                <div class="checkout-item">
                    <img src="${currentProduct.imageUrl}" class="checkout-item-image">
                    <div style="flex:1"><strong>${currentProduct.name}</strong><br>Varian: ${selectedVariant || '-'}<br>Jumlah: ${selectedQuantity}</div>
                    <div>Rp ${subtotal.toLocaleString()}</div>
                </div>
                <div class="price-breakdown">
                    <div class="price-row"><span>Harga Produk</span><span>Rp ${subtotal.toLocaleString()}</span></div>
                    <div class="price-row"><span>Ongkos Kirim</span><span>Rp ${ongkir.toLocaleString()}</span></div>
                    <div class="price-row total-row"><span>Total</span><span style="color:var(--primary); font-size:1.2rem;">Rp ${total.toLocaleString()}</span></div>
                </div>
                <div style="background:#e0f2fe; padding:0.75rem; border-radius:0.5rem;"><i class="fas fa-credit-card"></i> Pembayaran: <strong>COD</strong></div>
                <button class="btn btn-success btn-block" style="margin-top:1rem" onclick="confirmOrder()">Buat Pesanan</button>
            `;
            document.getElementById('checkoutModal').style.display = 'flex';
        }

        async function confirmOrder() {
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const addr = userDoc.data();
            const productRef = db.collection('products').doc(currentProduct.id);
            const productDoc = await productRef.get();
            if (productDoc.data().stock < selectedQuantity) { showAlert('Stok habis', 'error'); closeModal('checkoutModal'); return; }
            await productRef.update({ stock: productDoc.data().stock - selectedQuantity });
            await db.collection('orders').add({
                productId: currentProduct.id, productName: currentProduct.name, variant: selectedVariant,
                price: currentProduct.price, quantity: selectedQuantity, subtotal: currentProduct.price * selectedQuantity,
                shippingCost: ongkir, total: (currentProduct.price * selectedQuantity) + ongkir, paymentMethod: 'COD',
                buyerId: currentUser.uid, buyerName: currentUserData?.name, sellerId: currentProduct.sellerId,
                sellerName: currentProduct.sellerName, address: addr.address, city: addr.city,
                status: 'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            showAlert('Pesanan berhasil!', 'success');
            closeModal('checkoutModal');
            showOrders();
        }

        function searchProducts() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(card => {
                const title = card.querySelector('.product-title')?.innerText.toLowerCase() || '';
                card.style.display = title.includes(term) ? '' : 'none';
            });
        }

        function updateNav() {
            const nav = document.getElementById('navLinks');
            if (!currentUser) {
                nav.innerHTML = `<a onclick="showProducts()">Beranda</a><a onclick="showCart()">Keranjang (<span id="cartCount">0</span>)</a><button class="btn btn-outline btn-sm" onclick="showLoginModal()">Masuk</button><button class="btn btn-primary btn-sm" onclick="showRegisterModal()">Daftar</button>`;
                updateCartCount();
                return;
            }
            const role = currentUserData?.role;
            const roleText = role === 'admin' ? 'Admin' : role === 'business' ? 'Penjual' : 'Pembeli';
            const roleClass = role === 'admin' ? 'badge-admin' : role === 'business' ? 'badge-business' : 'badge-user';
            nav.innerHTML = `
                <a onclick="showProducts()">Beranda</a>
                <a onclick="showCart()">Keranjang (<span id="cartCount">0</span>)</a>
                ${role === 'business' || role === 'admin' ? '<a onclick="showMyProducts()">Produk Saya</a>' : ''}
                <a onclick="showOrders()">Pesanan</a>
                <a onclick="showProfile()">Profil</a>
                <span class="badge ${roleClass}">${roleText}</span>
                <button class="btn btn-danger btn-sm" onclick="logout()">Keluar</button>
            `;
            updateCartCount();
        }

        function showProducts() {
            const content = document.getElementById('mainContent');
            content.innerHTML = `<div style="margin-bottom:2rem"><h1>Temukan Produk Favoritmu</h1><p style="color:var(--gray)">Ribuan produk siap memenuhi kebutuhan Anda</p></div><div class="products-grid" id="productsGrid"><div class="loading">Memuat produk...</div></div>`;
            db.collection('products').where('status', '==', 'available').where('stock', '>', 0).orderBy('createdAt', 'desc').onSnapshot(snap => {
                const grid = document.getElementById('productsGrid');
                if (!grid) return;
                if (snap.empty) { grid.innerHTML = '<div class="empty-state"><p>Belum ada produk</p></div>'; return; }
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    const rating = p.averageRating || 0;
                    grid.innerHTML += `
                        <div class="product-card" onclick="showProductDetail('${doc.id}')">
                            <img src="${p.imageUrl}" class="product-image" onerror="this.src='https://placehold.co/400x300'">
                            <div class="product-info">
                                <div class="product-title">${p.name}</div>
                                <div class="rating">${renderStars(rating)}</div>
                                <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                            </div>
                        </div>`;
                });
            });
        }

        function showMyProducts() {
            if (!currentUser || (currentUserData?.role !== 'business' && currentUserData?.role !== 'admin')) {
                showAlert('Akses ditolak', 'error'); return;
            }
            const content = document.getElementById('mainContent');
            content.innerHTML = `<div style="display:flex; justify-content:space-between; margin-bottom:1rem"><h2>Produk Saya</h2><button class="btn btn-primary btn-sm" onclick="showAddProductModal()">+ Tambah</button></div><div class="products-grid" id="myProductsGrid"><div class="loading">Memuat...</div></div>`;
            db.collection('products').where('sellerId', '==', currentUser.uid).onSnapshot(snap => {
                const grid = document.getElementById('myProductsGrid');
                if (!grid) return;
                if (snap.empty) { grid.innerHTML = '<div class="empty-state"><p>Belum ada produk</p><button class="btn btn-primary btn-sm" onclick="showAddProductModal()">Tambah Produk</button></div>'; return; }
                grid.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    grid.innerHTML += `
                        <div class="product-card">
                            <img src="${p.imageUrl}" class="product-image">
                            <div class="product-info">
                                <div class="product-title">${p.name}</div>
                                <div class="product-price">Rp ${p.price.toLocaleString()}</div>
                                <div>Stok: ${p.stock}</div>
                                <button class="btn btn-danger btn-sm" style="width:100%; margin-top:0.5rem" onclick="deleteProduct('${doc.id}')">Hapus</button>
                            </div>
                        </div>`;
                });
            });
        }

        async function deleteProduct(id) {
            if (confirm('Hapus produk?')) { await db.collection('products').doc(id).delete(); showAlert('Produk dihapus', 'success'); showMyProducts(); }
        }

        function showOrders() {
            if (!currentUser) return;
            const content = document.getElementById('mainContent');
            content.innerHTML = `<h2 style="margin-bottom:1rem">Pesanan Saya</h2><div id="ordersList"><div class="loading">Memuat...</div></div>`;
            db.collection('orders').where('buyerId', '==', currentUser.uid).orderBy('createdAt', 'desc').onSnapshot(snap => {
                const list = document.getElementById('ordersList');
                if (!list) return;
                if (snap.empty) { list.innerHTML = '<div class="empty-state"><p>Belum ada pesanan</p></div>'; return; }
                list.innerHTML = '';
                snap.forEach(doc => {
                    const o = doc.data();
                    list.innerHTML += `<div style="background:white; border-radius:1rem; border:1px solid var(--border); padding:1rem; margin-bottom:1rem;">
                        <div style="display:flex; justify-content:space-between;"><strong>${o.productName}</strong><span class="badge badge-success">${o.status === 'pending' ? 'Diproses' : 'Selesai'}</span></div>
                        <div>${o.quantity} x Rp ${o.price.toLocaleString()}</div>
                        <div>Total: Rp ${o.total.toLocaleString()}</div>
                        <div style="font-size:0.75rem; color:var(--gray);">Metode: ${o.paymentMethod}</div>
                    </div>`;
                });
            });
        }

        async function showProfile() {
            if (!currentUser) return;
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const data = userDoc.data();
            const productsSnap = await db.collection('products').where('sellerId', '==', currentUser.uid).get();
            const ordersSnap = await db.collection('orders').where('buyerId', '==', currentUser.uid).get();
            let sellerCard = '';
            if (data.role !== 'business' && data.role !== 'admin') {
                sellerCard = `<div style="background:linear-gradient(135deg,#fef3c7,#fde68a); margin:1rem; padding:1rem; border-radius:0.75rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;"><div><strong>Jadi Penjual Sekarang!</strong><p style="font-size:0.75rem">Jual produk Anda sendiri</p></div><button class="btn btn-warning btn-sm" onclick="showBecomeSellerModal()">Daftar Jadi Penjual</button></div>`;
            }
            document.getElementById('mainContent').innerHTML = `
                <div style="background:white; border-radius:1rem; border:1px solid var(--border); overflow:hidden;">
                    <div style="padding:2rem; background:var(--light); display:flex; gap:2rem; flex-wrap:wrap;">
                        <div style="width:80px; height:80px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; color:white;">${data.name?.charAt(0).toUpperCase() || 'U'}</div>
                        <div><h2>${data.name}</h2><p>${data.email}</p><p><span class="badge ${data.role === 'admin' ? 'badge-admin' : data.role === 'business' ? 'badge-business' : 'badge-user'}">${data.role === 'admin' ? 'Admin' : data.role === 'business' ? 'Penjual' : 'Pembeli'}</span></p><button class="btn btn-outline btn-sm" onclick="showAddressModal()">Edit Alamat</button></div>
                    </div>
                    ${sellerCard}
                    <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; padding:1.5rem;">
                        <div style="text-align:center; padding:1rem; background:var(--light); border-radius:0.75rem;"><div style="font-size:1.5rem; font-weight:700; color:var(--primary);">${productsSnap.size}</div><div>Produk</div></div>
                        <div style="text-align:center; padding:1rem; background:var(--light); border-radius:0.75rem;"><div style="font-size:1.5rem; font-weight:700; color:var(--primary);">${ordersSnap.size}</div><div>Pesanan</div></div>
                    </div>
                    <div style="padding:1.5rem;"><h4>Alamat Pengiriman</h4><p>${data.address ? `${data.address}, ${data.city} - ${data.postalCode}` : 'Belum diisi'}</p><p>📞 ${data.phone || '-'}</p></div>
                </div>`;
        }

        async function logout() { await auth.signOut(); cart = []; localStorage.removeItem('cart'); showAlert('Keluar', 'success'); updateNav(); showProducts(); }

        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            if (user) {
                const doc = await db.collection('users').doc(user.uid).get();
                if (doc.exists) currentUserData = doc.data();
                else { currentUserData = { name: user.email?.split('@')[0] || 'User', email: user.email, role: 'user' }; await db.collection('users').doc(user.uid).set(currentUserData); }
            } else { currentUserData = null; }
            updateNav();
            showProducts();
        });
    </script>
</body>
</html>
