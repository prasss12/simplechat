<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>PinkChat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #fff;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            position: fixed;
        }

        /* ========== HALAMAN LOGIN ========== */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            background: white;
        }

        .login-card {
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        .login-card h2 {
            color: #ff6b9d;
            margin-bottom: 10px;
        }

        .login-card p {
            color: #aa8a96;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 15px;
        }

        .login-card button {
            width: 100%;
            padding: 14px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            margin-top: 15px;
            cursor: pointer;
        }

        .login-card .switch-btn {
            background: #ffe4ec;
            color: #ff6b9d;
            margin-top: 10px;
        }

        .error-msg {
            color: #ff6b9d;
            font-size: 12px;
            margin-top: 10px;
        }

        /* ========== HALAMAN UTAMA ========== */
        .main-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: white;
        }

        /* HEADER */
        .main-header {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #f0e0e6;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .profile-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .profile-text {
            flex: 1;
        }

        .profile-text h4 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .profile-text p {
            font-size: 11px;
            color: #ff6b9d;
        }

        .logout-icon {
            background: #ffe4ec;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 16px;
            cursor: pointer;
        }

        /* LIST KONTAK */
        .contact-list {
            flex: 1;
            overflow-y: auto;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .contact-item:active {
            background: #fff5f8;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .contact-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 15px;
        }

        .contact-phone {
            font-size: 11px;
            color: #aa8a96;
            margin-top: 3px;
        }

        /* TOMBOL BAWAH */
        .bottom-buttons {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #f0e0e6;
            background: white;
        }

        .bottom-buttons button {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        /* ========== HALAMAN CHAT ========== */
        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #fefafb;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 10;
        }

        .chat-header {
            background: white;
            padding: 12px 16px;
            border-bottom: 1px solid #f0e0e6;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #ff6b9d;
            cursor: pointer;
            width: 36px;
            height: 36px;
        }

        .chat-header-avatar {
            width: 40px;
            height: 40px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff6b9d;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h4 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .chat-header-info p {
            font-size: 11px;
            color: #ff99c8;
        }

        /* AREA PESAN */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .msg.sent {
            align-self: flex-end;
        }

        .msg.received {
            align-self: flex-start;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
        }

        .sent .msg-bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .msg-bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .msg-time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        /* INPUT PESAN */
        .chat-input {
            background: white;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #f0e0e6;
        }

        .chat-input input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .chat-input button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            width: 85%;
            max-width: 320px;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 14px;
        }

        .modal-box button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let USER = null;
    let ACTIVE_CHAT_ID = null;
    let ACTIVE_CHAT_NAME = null;
    let UNSUB_MSGS = null;
    
    function toast(msg) {
        let t = document.querySelector('.toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function escape(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    async function getUser(uid) {
        const s = await getDoc(doc(db, 'users', uid));
        return s.exists() ? { uid, ...s.data() } : null;
    }
    
    // ========== CHAT FUNCTIONS ==========
    async function getChatId(uid1, uid2) {
        const chats = collection(db, 'chats');
        const q1 = query(chats, where('participants', '==', [uid1, uid2]));
        const q2 = query(chats, where('participants', '==', [uid2, uid1]));
        let s = await getDocs(q1);
        if (s.empty) s = await getDocs(q2);
        if (!s.empty) return s.docs[0].id;
        
        const ref = await addDoc(chats, {
            type: 'private',
            participants: [uid1, uid2],
            createdAt: serverTimestamp()
        });
        return ref.id;
    }
    
    async function sendMessage(chatId, text) {
        if (!chatId || !text) return;
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
            senderId: USER.uid,
            text: text,
            timestamp: serverTimestamp()
        });
    }
    
    async function addContact(phone) {
        const q = query(collection(db, 'users'), where('phone', '==', phone));
        const s = await getDocs(q);
        if (s.empty) throw new Error('Nomor tidak terdaftar');
        const target = s.docs[0];
        if (target.id === USER.uid) throw new Error('Tidak bisa tambah sendiri');
        
        await updateDoc(doc(db, 'users', USER.uid), { contacts: arrayUnion(target.id) });
        await updateDoc(doc(db, 'users', target.id), { contacts: arrayUnion(USER.uid) });
        return true;
    }
    
    // ========== RENDER KONTAK ==========
    async function renderContacts() {
        const container = document.getElementById('contactList');
        if (!container) return;
        
        const u = await getUser(USER.uid);
        const kontak = u?.contacts || [];
        const items = [];
        
        for (let id of kontak) {
            const p = await getUser(id);
            if (p) items.push({ uid: id, name: p.fullName, phone: p.phone });
        }
        
        container.innerHTML = '';
        if (items.length === 0) {
            container.innerHTML = '<div class="empty">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        
        for (let item of items) {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.innerHTML = `
                <div class="contact-avatar">${escape(item.name.charAt(0).toUpperCase())}</div>
                <div>
                    <div class="contact-name">${escape(item.name)}</div>
                    <div class="contact-phone">${escape(item.phone)}</div>
                </div>
            `;
            div.onclick = () => openChat(item.uid, item.name);
            container.appendChild(div);
        }
    }
    
    // ========== BUKA CHAT ==========
    async function openChat(contactUid, contactName) {
        if (UNSUB_MSGS) UNSUB_MSGS();
        
        const chatId = await getChatId(USER.uid, contactUid);
        ACTIVE_CHAT_ID = chatId;
        ACTIVE_CHAT_NAME = contactName;
        
        document.getElementById('chatName').innerHTML = escape(contactName);
        document.getElementById('chatHeaderAvatar').innerHTML = contactName.charAt(0).toUpperCase();
        
        const msgContainer = document.getElementById('messagesContainer');
        msgContainer.innerHTML = '<div class="empty">Loading...</div>';
        
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        UNSUB_MSGS = onSnapshot(q, (snap) => {
            msgContainer.innerHTML = '';
            if (snap.empty) {
                msgContainer.innerHTML = '<div class="empty">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.senderId === USER.uid;
                const el = document.createElement('div');
                el.className = `msg ${isMe ? 'sent' : 'received'}`;
                const time = m.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                el.innerHTML = `<div class="msg-bubble">${escape(m.text)}</div><div class="msg-time">${time}</div>`;
                msgContainer.appendChild(el);
            });
            msgContainer.scrollTop = msgContainer.scrollHeight;
        });
        
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('chatScreen').style.display = 'flex';
    }
    
    async function sendCurrentMessage() {
        if (!ACTIVE_CHAT_ID) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        await sendMessage(ACTIVE_CHAT_ID, text);
        input.value = '';
        input.focus();
    }
    
    function closeChat() {
        if (UNSUB_MSGS) UNSUB_MSGS();
        ACTIVE_CHAT_ID = null;
        document.getElementById('mainScreen').style.display = 'flex';
        document.getElementById('chatScreen').style.display = 'none';
        renderContacts();
    }
    
    // ========== MODAL ==========
    function showAddContactModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Tambah Kontak</h3>
                <input type="tel" id="phoneInput" placeholder="Nomor HP">
                <button id="addBtn">Tambah</button>
                <button id="cancelBtn" style="background:#ffe4ec;color:#ff6b9d">Batal</button>
                <div id="errMsg" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('addBtn').onclick = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            try {
                await addContact(phone);
                toast('✅ Kontak ditambahkan');
                modal.remove();
                renderContacts();
            } catch(e) {
                document.getElementById('errMsg').innerText = e.message;
            }
        };
        document.getElementById('cancelBtn').onclick = () => modal.remove();
    }
    
    function showProfileModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <div style="width:70px;height:70px;background:#ff6b9d;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px auto;color:white;font-size:28px;font-weight:bold;">${USER.fullName?.charAt(0) || 'U'}</div>
                <h3>${escape(USER.fullName)}</h3>
                <p style="color:#ff6b9d;margin:5px 0;">${USER.phone}</p>
                <p style="color:#aa8a96;margin-top:10px;">${escape(USER.bio || 'Halo! Saya menggunakan PinkChat')}</p>
                <button id="closeBtn" style="background:#ffe4ec;color:#ff6b9d">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeBtn').onclick = () => modal.remove();
    }
    
    // ========== MAIN SCREEN ==========
    async function showMainScreen() {
        const app = document.getElementById('app');
        
        app.innerHTML = `
            <div id="mainScreen" class="main-screen">
                <div class="main-header">
                    <div class="profile-avatar" id="profileAvatar">${USER?.fullName?.charAt(0) || 'U'}</div>
                    <div class="profile-text">
                        <h4>${escape(USER?.fullName || 'User')}</h4>
                        <p>${USER?.phone || ''}</p>
                    </div>
                    <button class="logout-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="contact-list" id="contactList"></div>
                <div class="bottom-buttons">
                    <button id="addContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                    <button id="groupBtn" style="opacity:0.5" disabled><i class="fas fa-users"></i> Grup</button>
                </div>
            </div>
            
            <div id="chatScreen" class="chat-screen">
                <div class="chat-header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="chat-header-avatar" id="chatHeaderAvatar">P</div>
                    <div class="chat-header-info">
                        <h4 id="chatName">Chat</h4>
                        <p>Online</p>
                    </div>
                </div>
                <div class="messages-area" id="messagesContainer"></div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="Ketik pesan...">
                    <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        `;
        
        await renderContacts();
        
        document.getElementById('profileAvatar').onclick = showProfileModal;
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) await signOut(auth);
        };
        document.getElementById('addContactBtn').onclick = showAddContactModal;
        document.getElementById('backBtn').onclick = closeChat;
        document.getElementById('sendMsgBtn').onclick = sendCurrentMessage;
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCurrentMessage();
        });
    }
    
    // ========== LOGIN ==========
    function showLogin() {
        let isLogin = false;
        const app = document.getElementById('app');
        
        app.innerHTML = `
            <div class="login-screen">
                <div class="login-card">
                    <h2>PinkChat</h2>
                    <p>Chat real-time dengan teman</p>
                    <input type="text" id="nameInput" placeholder="Nama lengkap">
                    <input type="tel" id="phoneInput" placeholder="Nomor HP (812345678)">
                    <input type="password" id="passInput" placeholder="Password">
                    <button id="submitBtn">Daftar</button>
                    <button id="switchBtn" class="switch-btn">Sudah punya akun? Masuk</button>
                    <div id="errorMsg" class="error-msg"></div>
                </div>
            </div>
        `;
        
        const nameInput = document.getElementById('nameInput');
        const title = document.getElementById('title');
        const submit = document.getElementById('submitBtn');
        const switchBtn = document.getElementById('switchBtn');
        const errorDiv = document.getElementById('errorMsg');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                submit.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInput.style.display = 'none';
            } else {
                submit.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInput.style.display = 'block';
            }
        };
        
        submit.onclick = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            const pass = document.getElementById('passInput').value;
            
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                } else {
                    const name = document.getElementById('nameInput').value.trim();
                    if (!name) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const q = query(collection(db, 'users'), where('phone', '==', phone));
                    const s = await getDocs(q);
                    if (!s.empty) throw new Error('Nomor sudah terdaftar');
                    
                    const uc = await createUserWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                    await setDoc(doc(db, 'users', uc.user.uid), {
                        fullName: name,
                        phone: phone,
                        bio: 'Halo! Saya menggunakan PinkChat',
                        contacts: [],
                        createdAt: serverTimestamp()
                    });
                }
                errorDiv.innerText = '';
            } catch(e) {
                errorDiv.innerText = e.message;
            }
        };
    }
    
    // ========== AUTH ==========
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            USER = await getUser(u.uid);
            if (USER) {
                showMainScreen();
            } else {
                setTimeout(async () => {
                    USER = await getUser(u.uid);
                    if (USER) showMainScreen();
                    else showLogin();
                }, 1000);
            }
        } else {
            USER = null;
            showLogin();
        }
    });
    
    showLogin();
</script>
</body>
</html>
