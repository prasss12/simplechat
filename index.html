<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Real-Time Chat App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f0f2f5;
            --bg-sidebar: #111b21;
            --text-primary: #111b21;
            --text-secondary: #667781;
            --border-color: #e9edef;
            --accent-color: #25D366;
            --accent-hover: #20b859;
            --message-out: #dcf8c5;
            --message-in: #ffffff;
            --online: #25D366;
            --offline: #8696a0;
        }

        [data-theme="dark"] {
            --bg-primary: #111b21;
            --bg-secondary: #1e2a32;
            --bg-sidebar: #0a1217;
            --text-primary: #e9edef;
            --text-secondary: #8696a0;
            --border-color: #2a3942;
            --message-out: #005c4b;
            --message-in: #202c33;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--accent-color);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #075e54, #128c7e);
        }
        .login-card {
            background: var(--bg-primary);
            padding: 2rem;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header i { font-size: 3rem; color: var(--accent-color); }
        .input-group {
            position: relative;
            margin-bottom: 1rem;
        }
        .input-group i {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }
        .input-group input {
            width: 100%;
            padding: 12px 12px 12px 40px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 1rem;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-google {
            width: 100%;
            padding: 12px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .divider { text-align: center; margin: 1rem 0; color: var(--text-secondary); }
        .auth-switch { text-align: center; margin-top: 1rem; }
        .auth-switch a { color: var(--accent-color); cursor: pointer; }
        .hidden { display: none !important; }

        .app-container { display: flex; height: 100vh; }

        .sidebar {
            width: 100%;
            max-width: 400px;
            background: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }
        .sidebar-header {
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar {
            position: relative;
            width: 40px;
            height: 40px;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .online-indicator {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--bg-sidebar);
        }
        .online-indicator.online { background: var(--online); }
        .online-indicator.offline { background: var(--offline); }
        .icon-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-secondary);
            padding: 8px;
            border-radius: 50%;
        }
        .search-bar {
            padding: 10px;
            margin: 10px;
            background: var(--bg-secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .search-bar input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            color: var(--text-primary);
        }

        .bottom-nav {
            display: none;
            background: var(--bg-sidebar);
            padding: 0.5rem;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .nav-item {
            flex: 1;
            background: none;
            border: none;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
        }
        .nav-item.active { color: var(--accent-color); }

        .chats-list { flex: 1; overflow-y: auto; }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px;
            cursor: pointer;
            gap: 12px;
            border-bottom: 1px solid var(--border-color);
        }
        .chat-item:hover { background: var(--bg-secondary); }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; margin-bottom: 4px; }
        .chat-last-message { font-size: 0.85rem; color: var(--text-secondary); }
        .chat-meta { text-align: right; font-size: 0.75rem; color: var(--text-secondary); }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
        }
        .chat-header {
            padding: 1rem;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header-info { display: flex; align-items: center; gap: 12px; }
        .back-btn { display: none; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-primary); }
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        .messages-list { display: flex; flex-direction: column; gap: 8px; }
        .message {
            max-width: 70%;
            padding: 8px 12px;
            border-radius: 12px;
            position: relative;
        }
        .message-out {
            background: var(--message-out);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message-in {
            background: var(--message-in);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .reply-indicator {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            padding-left: 8px;
            border-left: 2px solid var(--accent-color);
        }

        .message-input-container {
            padding: 1rem;
            background: var(--bg-sidebar);
            display: flex;
            align-items: flex-end;
            gap: 8px;
            border-top: 1px solid var(--border-color);
        }
        .message-input-wrapper { flex: 1; position: relative; }
        #messageInput {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            font-size: 0.9rem;
        }
        .send-btn {
            background: var(--accent-color);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: white;
            cursor: pointer;
        }
        .reply-preview {
            background: var(--bg-primary);
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 3px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }

        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-primary);
            border-radius: 20px 20px 0 0;
            z-index: 1000;
            transform: translateY(100%);
            transition: transform 0.3s;
        }
        .bottom-sheet.show { transform: translateY(0); }
        .sheet-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 20px;
        }
        .sheet-options button {
            padding: 16px;
            background: var(--bg-secondary);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-primary);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal-content {
            background: var(--bg-primary);
            border-radius: 20px;
            padding: 20px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        .tab-content { flex: 1; overflow-y: auto; }
        .my-status { padding: 20px; text-align: center; }
        .status-upload { display: inline-block; text-align: center; cursor: pointer; }
        .status-upload i { font-size: 3rem; color: var(--accent-color); }
        .status-list { padding: 10px; }
        .status-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--border-color);
        }
        .profile-section { padding: 20px; text-align: center; }
        .profile-avatar {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
            cursor: pointer;
        }
        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .profile-avatar i {
            position: absolute;
            bottom: 0;
            right: 0;
            background: var(--accent-color);
            border-radius: 50%;
            padding: 8px;
            color: white;
        }
        .privacy-settings, .account-switch, .storage-info {
            padding: 20px;
            border-top: 1px solid var(--border-color);
        }
        .setting-item {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-item select {
            padding: 8px;
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .call-item {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
        }

        @media (min-width: 768px) {
            .bottom-nav { display: none; }
            .back-btn { display: none; }
            .tab-content { display: block !important; height: calc(100vh - 120px); overflow-y: auto; }
            #chatsList { display: block; }
        }

        @media (max-width: 767px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                width: 100%;
                height: 100%;
                z-index: 100;
                transition: left 0.3s;
                max-width: 100%;
            }
            .sidebar.show { left: 0; }
            .bottom-nav { display: flex; }
            .back-btn { display: block; }
            .chat-area {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: var(--bg-primary);
                z-index: 200;
                transform: translateX(100%);
                transition: transform 0.3s;
            }
            .chat-area.show { transform: translateX(0); }
            .message { max-width: 85%; }
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 9999;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            margin: 8px 0;
        }
        .progress-fill {
            height: 100%;
            background: var(--accent-color);
            transition: width 0.3s;
        }
        .document-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            background: var(--bg-secondary);
            border-radius: 8px;
            cursor: pointer;
        }
        #recordingTimer { font-size: 2rem; margin: 20px; }
    </style>
</head>
<body>
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <p>Loading...</p>
    </div>

    <!-- Login -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fab fa-whatsapp"></i>
                <h1>Real-Time Chat</h1>
                <p>Connect with friends instantly</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-primary">Login</button>
            </form>
            <div class="divider">or</div>
            <button id="googleLoginBtn" class="btn-google">
                <i class="fab fa-google"></i> Continue with Google
            </button>
            <p class="auth-switch">Don't have an account? <a href="#" id="showRegister">Register</a></p>
        </div>
        
        <div id="registerForm" class="login-card hidden">
            <div class="login-header">
                <i class="fab fa-whatsapp"></i>
                <h2>Create Account</h2>
            </div>
            <form id="registerFormElement">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="registerName" placeholder="Full Name" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="registerEmail" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="registerPassword" placeholder="Password (min 6 chars)" required>
                </div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
            <p class="auth-switch"><a href="#" id="showLogin">Back to Login</a></p>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="app-container hidden">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <div class="avatar">
                        <img id="userAvatarImg" src="" alt="Avatar">
                        <span class="online-indicator" id="userOnlineIndicator"></span>
                    </div>
                    <div class="user-details">
                        <h3 id="currentUserName">User Name</h3>
                        <p id="userStatus">Online</p>
                    </div>
                </div>
                <div class="sidebar-actions">
                    <button id="darkModeToggle" class="icon-btn"><i class="fas fa-moon"></i></button>
                    <button id="logoutBtn" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="globalSearch" placeholder="Search chats...">
            </div>
            <div class="bottom-nav">
                <button class="nav-item active" data-tab="chats"><i class="fas fa-comment"></i><span>Chats</span></button>
                <button class="nav-item" data-tab="status"><i class="fas fa-circle"></i><span>Status</span></button>
                <button class="nav-item" data-tab="calls"><i class="fas fa-phone"></i><span>Calls</span></button>
                <button class="nav-item" data-tab="you"><i class="fas fa-user"></i><span>You</span></button>
            </div>
            <div class="chats-list" id="chatsList"></div>
            <div id="statusTab" class="tab-content hidden">
                <div class="my-status"><div class="status-upload" onclick="openStatusUpload()"><i class="fas fa-plus-circle"></i><p>My Status</p></div></div>
                <div id="statusList" class="status-list"></div>
            </div>
            <div id="callsTab" class="tab-content hidden"><div class="calls-list" id="callsList"></div></div>
            <div id="youTab" class="tab-content hidden">
                <div class="profile-section">
                    <div class="profile-avatar" onclick="changeProfilePhoto()">
                        <img id="profileAvatarImg" src="" alt="Profile">
                        <i class="fas fa-camera"></i>
                    </div>
                    <div class="profile-info">
                        <input type="text" id="profileName" placeholder="Your Name">
                        <p id="profileEmail"></p>
                    </div>
                </div>
                <div class="privacy-settings">
                    <h3>Privacy Settings</h3>
                    <div class="setting-item"><label>Last Seen</label><select id="lastSeenPrivacy"><option value="everyone">Everyone</option><option value="contacts">Contacts</option><option value="nobody">Nobody</option></select></div>
                    <button class="btn-primary" onclick="createGroup()" style="margin-top:10px;">+ Create Group</button>
                </div>
                <div class="storage-info"><h3>Storage</h3><div id="storageUsage">Loading...</div></div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <div class="chat-header-info">
                    <button class="back-btn" id="backToChatsBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="avatar"><img id="chatAvatarImg" src="" alt="Avatar"></div>
                    <div class="chat-details"><h3 id="chatName">Select a chat</h3><p id="chatTyping" class="typing-indicator hidden">Typing...</p></div>
                </div>
                <div class="chat-actions">
                    <button id="callVideoBtn" class="icon-btn hidden"><i class="fas fa-video"></i></button>
                    <button id="callAudioBtn" class="icon-btn hidden"><i class="fas fa-phone"></i></button>
                </div>
            </div>
            <div class="messages-container" id="messagesContainer"><div id="messagesList" class="messages-list"></div></div>
            <div class="message-input-container">
                <button id="attachBtn" class="icon-btn"><i class="fas fa-paperclip"></i></button>
                <div class="message-input-wrapper">
                    <div id="replyPreview" class="reply-preview hidden"><span id="replyToText"></span><button onclick="cancelReply()">×</button></div>
                    <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
                </div>
                <button id="sendBtn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                <button id="recordVoiceBtn" class="icon-btn"><i class="fas fa-microphone"></i></button>
            </div>
        </div>
    </div>

    <div id="bottomSheet" class="bottom-sheet hidden">
        <div class="bottom-sheet-content">
            <div class="sheet-header" style="display:flex; justify-content:space-between; padding:15px;"><h3>Attach Media</h3><button onclick="closeBottomSheet()" style="background:none; border:none; font-size:24px;">×</button></div>
            <div class="sheet-options">
                <button onclick="uploadImage()"><i class="fas fa-image"></i> Image</button>
                <button onclick="uploadVideo()"><i class="fas fa-video"></i> Video</button>
                <button onclick="uploadDocument()"><i class="fas fa-file"></i> Document</button>
                <button onclick="takePhoto()"><i class="fas fa-camera"></i> Take Photo</button>
            </div>
        </div>
    </div>

    <div id="voiceRecorderModal" class="modal hidden">
        <div class="modal-content">
            <h3>Record Voice Note</h3>
            <div id="recordingTimer">00:00</div>
            <div class="recording-controls">
                <button id="startRecordBtn" class="btn-primary">Start</button>
                <button id="stopRecordBtn" class="btn-primary hidden">Stop</button>
            </div>
        </div>
    </div>

    <div id="statusViewModal" class="modal hidden">
        <div class="status-viewer" style="position:relative; width:100%; max-width:400px; height:80vh; background:#000; display:flex; align-items:center; justify-content:center;">
            <div id="statusMedia"></div>
            <button onclick="closeStatusView()" style="position:absolute; top:10px; right:10px; background:white; border:none; border-radius:50%; width:30px; height:30px;">×</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    
    <script>
        // ============================================
        // FIREBASE CONFIG - SUDAH DIISI DENGAN KREDENSIAL ANDA
        // ============================================
        const firebaseConfig = {
            apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
            authDomain: "simplechat-85cd8.firebaseapp.com",
            projectId: "simplechat-85cd8",
            storageBucket: "simplechat-85cd8.firebasestorage.app",
            messagingSenderId: "244789873168",
            appId: "1:244789873168:web:4cba5481f689ab3103d895",
            measurementId: "G-KR9MJP5QKM"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // Enable offline persistence
        db.enablePersistence({ synchronizeTabs: true }).catch(err => console.log("Persistence error:", err));

        // Helper Functions
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(date) {
            if (!date) return '';
            const now = new Date();
            const diff = now - date;
            if (diff < 86400000) return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            return date.toLocaleDateString();
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';

        function compressImage(file, maxSizeMB = 0.5, maxWidthOrHeight = 800) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width, height = img.height;
                        if (width > height && width > maxWidthOrHeight) {
                            height = (height * maxWidthOrHeight) / width;
                            width = maxWidthOrHeight;
                        } else if (height > maxWidthOrHeight) {
                            width = (width * maxWidthOrHeight) / height;
                            height = maxWidthOrHeight;
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        let quality = 0.7;
                        let dataUrl = canvas.toDataURL('image/jpeg', quality);
                        while (dataUrl.length > maxSizeMB * 1024 * 1024 && quality > 0.2) {
                            quality -= 0.1;
                            dataUrl = canvas.toDataURL('image/jpeg', quality);
                        }
                        resolve(dataUrl);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
            });
        }

        function blobToBase64(blob) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(blob);
            });
        }

        async function loadMessages(chatId) {
            const messagesList = document.getElementById('messagesList');
            if (!messagesList) return;
            const query = db.collection('messages')
                .where('chatId', '==', chatId)
                .orderBy('timestamp', 'desc')

            messagesUnsubscribe = query.onSnapshot((snapshot) => {
                messagesList.innerHTML = '';

        function displayMessage(message) {
            const messagesList = document.getElementById('messagesList');
            const isOutgoing = message.senderId === currentUser.uid;
            const div = document.createElement('div');
            div.className = `message ${isOutgoing ? 'message-out' : 'message-in'}`;
            
            let replyHtml = message.replyTo ? `<div class="reply-indicator">↩️ Replying to: ${escapeHtml(message.replyTo.content?.substring(0, 50))}</div>` : '';
            
            let mediaHtml = '';
            if (message.mediaBase64) {
                if (message.mediaType === 'image') mediaHtml = `<img src="${message.mediaBase64}" style="max-width:200px; border-radius:8px; cursor:pointer;">`;
                else if (message.mediaType === 'video') mediaHtml = `<video src="${message.mediaBase64}" controls style="max-width:200px; border-radius:8px;"></video>`;
                else if (message.mediaType === 'audio') mediaHtml = `<audio src="${message.mediaBase64}" controls></audio>`;
                else if (message.mediaType === 'document') mediaHtml = `<div class="document-item" onclick="downloadDoc('${message.mediaBase64}', '${message.mediaName}')"><i class="fas fa-file"></i> ${message.mediaName || 'Document'}</div>`;
            }
            
            div.innerHTML = `
                ${replyHtml}
                <div class="message-text">${formatMessageText(message.content || '')}</div>
                ${mediaHtml}
                <div class="message-time" style="font-size:11px; margin-top:4px;">${formatTime(message.timestamp?.toDate())}</div>
                <div style="display:flex; gap:8px; margin-top:4px;">
                    <button onclick="replyToMsg('${message.id}', '${escapeHtml(message.content || '')}')" style="background:none; border:none; cursor:pointer;">↩️</button>
                    ${isOutgoing ? `<button onclick="editMsg('${message.id}', '${escapeHtml(message.content || '')}')" style="background:none; border:none; cursor:pointer;">✏️</button>` : ''}
                    ${isOutgoing ? `<button onclick="deleteMsg('${message.id}')" style="background:none; border:none; cursor:pointer;">🗑️</button>` : ''}
                    <button onclick="copyMsg('${escapeHtml(message.content || '')}')" style="background:none; border:none; cursor:pointer;">📋</button>
                </div>
            `;
            messagesList.appendChild(div);
            
            if (message.viewOnce && !message.viewed && !isOutgoing) {
                setTimeout(async () => {
                    await db.collection('messages').doc(message.id).update({ viewed: true, mediaBase64: firebase.firestore.FieldValue.delete() });
                }, 5000);
            }
        }

        function formatMessageText(text) {
            if (!text) return '';
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
            text = text.replace(/_(.*?)_/g, '<em>$1</em>');
            return text;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const content = input.value.trim();
            if (!content && !currentMediaToSend) return;
            
            const message = {
                chatId: currentChatId,
                senderId: currentUser.uid,
                content: content,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                status: 'sent',
                replyTo: currentReplyTo
            };
            
            if (currentMediaToSend) {
                message.mediaBase64 = currentMediaToSend.base64;
                message.mediaType = currentMediaToSend.type;
                message.mediaName = currentMediaToSend.name;
                message.mediaSize = currentMediaToSend.size;
                if (currentMediaToSend.viewOnce) { message.viewOnce = true; message.viewed = false; }
            }
            
            await db.collection('messages').add(message);
            await db.collection('chats').doc(currentChatId).update({
                lastMessage: content || `[${currentMediaToSend?.type || 'Media'}]`,
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            input.value = '';
            currentReplyTo = null;
            currentMediaToSend = null;
            document.getElementById('replyPreview')?.classList.add('hidden');

        // Voice recording
        let mediaRecorder, audioChunks = [];
        document.getElementById('recordVoiceBtn')?.addEventListener('click', () => document.getElementById('voiceRecorderModal')?.classList.remove('hidden'));
        
        async function startRecording() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                if (blob.size > 500000) { alert('Voice note too long!'); return; }
                const base64 = await blobToBase64(blob);
                currentMediaToSend = { base64: base64, type: 'audio', size: blob.size };
                sendMessage();
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            let sec = 0;
            const timer = setInterval(() => {
                sec++;
                document.getElementById('recordingTimer').textContent = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
                if (sec >= 30) { clearInterval(timer); stopRecording(); }
            }, 1000);
            document.getElementById('startRecordBtn').classList.add('hidden');
            document.getElementById('stopRecordBtn').classList.remove('hidden');
            window.stopRecording = () => {
                clearInterval(timer);
                mediaRecorder.stop();
                document.getElementById('voiceRecorderModal').classList.add('hidden');
                document.getElementById('startRecordBtn').classList.remove('hidden');
                document.getElementById('stopRecordBtn').classList.add('hidden');
            };
        }

        async function viewStatus(userId, statuses) {
            let idx = 0;

            const mediaDiv = document.getElementById('statusMedia');
            function show(i) {
                const s = statuses[i];
                if (!s) { closeStatusView(); return; }
                if (s.userId !== currentUser.uid && !s.views.includes(currentUser.uid))
                    db.collection('status').doc(s.id).update({ views: firebase.firestore.FieldValue.arrayUnion(currentUser.uid) });
                if (s.mediaType === 'image') mediaDiv.innerHTML = `<img src="${s.mediaBase64}" style="max-width:100%; max-height:80vh;">`;
                else mediaDiv.innerHTML = `<video src="${s.mediaBase64}" controls autoplay style="max-width:100%; max-height:80vh;"></video>`;
            }
            show(idx);
            modal.classList.remove('hidden');
            modal.onclick = () => { idx++; if (idx < statuses.length) show(idx); else closeStatusView(); };

        async function updateStorageDisplay() {
            if (!currentUser) return;
            const chats = await db.collection('chats').where('participants', 'array-contains', currentUser.uid).get();
            let totalSize = 0, mediaCount = 0;
            for (const chat of chats.docs) {
                const msgs = await db.collection('messages').where('chatId', '==', chat.id).where('mediaSize', '!=', null).get();
                msgs.forEach(m => { totalSize += m.data().mediaSize || 0; mediaCount++; });
            }
            const storageDiv = document.getElementById('storageUsage');
            if (storageDiv) storageDiv.innerHTML = `
                <div>📦 Used: ${(totalSize/(1024*1024)).toFixed(2)} MB</div>
                <div class="progress-bar"><div class="progress-fill" style="width:${Math.min((totalSize/(1024*1024*100))*100,100)}%"></div></div>
                <div>📁 Files: ${mediaCount}</div>
                <button onclick="clearAllMedia()" class="btn-primary" style="margin-top:10px;">Clear All Media</button>
            `;
        }
        
        window.clearAllMedia = async function() {
            if (!confirm('Delete all media from all chats? This cannot be undone.')) return;
            const chats = await db.collection('chats').where('participants', 'array-contains', currentUser.uid).get();
            for (const chat of chats.docs) {
                const msgs = await db.collection('messages').where('chatId', '==', chat.id).where('mediaBase64', '!=', null).get();
                const batch = db.batch();
                msgs.forEach(m => batch.update(m.ref, { mediaBase64: firebase.firestore.FieldValue.delete(), mediaCleared: true }));
                await batch.commit();
            }
            showToast('All media cleared!');
            updateStorageDisplay();
        };
        
        setInterval(updateStorageDisplay, 60000);
        setTimeout(updateStorageDisplay, 2000);
        
        window.changeProfilePhoto = function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                showLoading(true);
                const compressed = await compressImage(file, 0.5, 200);
                // Store as base64 in Firestore (or use storage)
                await db.collection('users').doc(currentUser.uid).update({ photoURL: compressed });
                document.getElementById('userAvatarImg').src = compressed;
                document.getElementById('profileAvatarImg').src = compressed;
                showLoading(false);
                showToast('Profile photo updated!');
            };
            input.click();
        };
    </script>
</body>
</html>
