<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PinkChat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f8f0f4;
            height: 100vh;
            overflow: hidden;
        }

        /* LAYOUT UTAMA */
        .screen {
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            background: white;
        }

        /* HEADER */
        .header {
            padding: 16px;
            background: white;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .info {
            flex: 1;
        }

        .info h3 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .info p {
            font-size: 12px;
            color: #ff6b9d;
            margin-top: 2px;
        }

        .btn-icon {
            background: #ffe4ec;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 16px;
            cursor: pointer;
        }

        /* LIST CHAT */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .chat-item:active {
            background: #fff5f8;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .chat-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 15px;
        }

        .chat-phone {
            font-size: 11px;
            color: #aa8a96;
            margin-top: 3px;
        }

        /* TOMBOL AKSI */
        .actions {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ffe0e8;
            background: white;
        }

        .actions button {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
        }

        /* CHAT VIEW */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #fefafb;
        }

        .chat-view .header {
            background: white;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #ff6b9d;
            cursor: pointer;
            width: 36px;
            height: 36px;
        }

        /* MESSAGES */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        /* INPUT */
        .input-area {
            background: white;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ffe0e8;
        }

        .input-area input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        /* MODAL */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            width: 85%;
            max-width: 320px;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
        }

        .modal-box button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let USER = null;
    let CHAT_ID = null;
    let CHAT_NAME = null;
    let UNSUB = null;
    
    function toast(msg) {
        let t = document.querySelector('.toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function escape(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function getUser(uid) {
        const s = await getDoc(doc(db, 'users', uid));
        return s.exists() ? { uid, ...s.data() } : null;
    }
    
    // GET CHAT ID
    async function getChatId(uid1, uid2) {
        const chats = collection(db, 'chats');
        const q1 = query(chats, where('participants', '==', [uid1, uid2]));
        const q2 = query(chats, where('participants', '==', [uid2, uid1]));
        let s = await getDocs(q1);
        if (s.empty) s = await getDocs(q2);
        if (!s.empty) return s.docs[0].id;
        
        const ref = await addDoc(chats, {
            participants: [uid1, uid2],
            createdAt: serverTimestamp()
        });
        return ref.id;
    }
    
    // SEND MESSAGE
    async function sendMsg(chatId, text) {
        if (!chatId || !text) return;
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
            senderId: USER.uid,
            text: text,
            timestamp: serverTimestamp()
        });
    }
    
    // ADD CONTACT
    async function addContact(phone) {
        const q = query(collection(db, 'users'), where('phone', '==', phone));
        const s = await getDocs(q);
        if (s.empty) throw new Error('Nomor tidak terdaftar');
        const target = s.docs[0];
        if (target.id === USER.uid) throw new Error('Tidak bisa tambah sendiri');
        
        await updateDoc(doc(db, 'users', USER.uid), { contacts: arrayUnion(target.id) });
        await updateDoc(doc(db, 'users', target.id), { contacts: arrayUnion(USER.uid) });
        return true;
    }
    
    // RENDER KONTAK
    async function renderContacts() {
        const container = document.getElementById('chatList');
        if (!container) return;
        
        const u = await getUser(USER.uid);
        const kontak = u?.contacts || [];
        const items = [];
        
        for (let id of kontak) {
            const p = await getUser(id);
            if (p) items.push({ uid: id, name: p.fullName, phone: p.phone });
        }
        
        container.innerHTML = '';
        if (items.length === 0) {
            container.innerHTML = '<div class="empty">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        
        for (let item of items) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="chat-avatar">${escape(item.name.charAt(0).toUpperCase())}</div>
                <div>
                    <div class="chat-name">${escape(item.name)}</div>
                    <div class="chat-phone">${escape(item.phone)}</div>
                </div>
            `;
            div.onclick = () => openChat(item.uid, item.name);
            container.appendChild(div);
        }
    }
    
    // OPEN CHAT
    async function openChat(uid, name) {
        if (UNSUB) UNSUB();
        
        const chatId = await getChatId(USER.uid, uid);
        CHAT_ID = chatId;
        CHAT_NAME = name;
        
        document.getElementById('chatName').innerHTML = escape(name);
        document.getElementById('chatAvatar').innerHTML = name.charAt(0).toUpperCase();
        
        const msgDiv = document.getElementById('messagesDiv');
        msgDiv.innerHTML = '<div class="empty">Loading...</div>';
        
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        UNSUB = onSnapshot(q, (snap) => {
            msgDiv.innerHTML = '';
            if (snap.empty) {
                msgDiv.innerHTML = '<div class="empty">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.senderId === USER.uid;
                const el = document.createElement('div');
                el.className = `message ${isMe ? 'sent' : 'received'}`;
                const t = m.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                el.innerHTML = `<div class="bubble">${escape(m.text)}</div><div class="time">${t}</div>`;
                msgDiv.appendChild(el);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
        
        document.getElementById('mainScreen').style.display = 'none';
        document.getElementById('chatView').style.display = 'flex';
    }
    
    async function sendNow() {
        if (!CHAT_ID) return;
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        await sendMsg(CHAT_ID, text);
        input.value = '';
    }
    
    function closeChat() {
        if (UNSUB) UNSUB();
        CHAT_ID = null;
        document.getElementById('mainScreen').style.display = 'flex';
        document.getElementById('chatView').style.display = 'none';
        renderContacts();
    }
    
    // MODAL ADD CONTACT
    function showAddModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Tambah Kontak</h3>
                <input type="tel" id="phone" placeholder="Nomor HP">
                <button id="add">Tambah</button>
                <button id="cancel" style="background:#ffe4ec;color:#ff6b9d">Batal</button>
                <div id="err" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('add').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            try {
                await addContact(phone);
                toast('✅ Kontak ditambahkan');
                modal.remove();
                renderContacts();
            } catch(e) {
                document.getElementById('err').innerText = e.message;
            }
        };
        document.getElementById('cancel').onclick = () => modal.remove();
    }
    
    // SHOW PROFILE
    function showProfile() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <div style="width:70px;height:70px;background:#ff6b9d;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 15px auto;color:white;font-size:28px;font-weight:bold;">${USER.fullName?.charAt(0) || 'U'}</div>
                <h3>${escape(USER.fullName)}</h3>
                <p style="color:#ff6b9d;margin:5px 0;">${USER.phone}</p>
                <p style="color:#aa8a96;margin-top:10px;">${escape(USER.bio || 'Halo! Saya menggunakan PinkChat')}</p>
                <button id="close" style="background:#ffe4ec;color:#ff6b9d">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('close').onclick = () => modal.remove();
    }
    
    // MAIN APP
    async function mainApp() {
        const root = document.getElementById('root');
        
        root.innerHTML = `
            <div id="mainScreen" class="screen">
                <div class="header">
                    <div class="avatar" id="profileBtn">${USER?.fullName?.charAt(0) || 'U'}</div>
                    <div class="info">
                        <h3>${escape(USER?.fullName || 'User')}</h3>
                        <p>${USER?.phone || ''}</p>
                    </div>
                    <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                <div class="chat-list" id="chatList"></div>
                <div class="actions">
                    <button id="addContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                    <button id="groupBtn" disabled style="opacity:0.5"><i class="fas fa-users"></i> Grup</button>
                </div>
            </div>
            
            <div id="chatView" class="chat-view">
                <div class="header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="avatar" id="chatAvatar">P</div>
                    <div class="info">
                        <h3 id="chatName">Chat</h3>
                        <p>Online</p>
                    </div>
                </div>
                <div class="messages" id="messagesDiv"></div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="Ketik pesan...">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        `;
        
        await renderContacts();
        
        document.getElementById('profileBtn').onclick = showProfile;
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) await signOut(auth);
        };
        document.getElementById('addContactBtn').onclick = showAddModal;
        document.getElementById('backBtn').onclick = closeChat;
        document.getElementById('sendBtn').onclick = sendNow;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendNow();
        });
    }
    
    // LOGIN
    function loginPage() {
        let isLogin = false;
        const root = document.getElementById('root');
        
        root.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:white;padding:20px">
                <div style="width:100%;max-width:320px;text-align:center">
                    <h2 style="color:#ff6b9d;margin-bottom:10px">PinkChat</h2>
                    <p style="color:#aa8a96;margin-bottom:30px">Chat real-time dengan teman</p>
                    <input type="text" id="name" placeholder="Nama lengkap" style="width:100%;padding:14px;margin:8px 0;background:#fef0f4;border:none;border-radius:30px">
                    <input type="tel" id="phone" placeholder="Nomor HP (812345678)" style="width:100%;padding:14px;margin:8px 0;background:#fef0f4;border:none;border-radius:30px">
                    <input type="password" id="pass" placeholder="Password" style="width:100%;padding:14px;margin:8px 0;background:#fef0f4;border:none;border-radius:30px">
                    <button id="submit" style="width:100%;padding:14px;background:#ff6b9d;border:none;border-radius:30px;color:white;font-weight:bold;margin-top:15px">Daftar</button>
                    <button id="switch" style="width:100%;padding:14px;background:#ffe4ec;border:none;border-radius:30px;color:#ff6b9d;font-weight:bold;margin-top:10px">Sudah punya akun? Masuk</button>
                    <div id="error" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                </div>
            </div>
        `;
        
        const nameInput = document.getElementById('name');
        const submit = document.getElementById('submit');
        const switchBtn = document.getElementById('switch');
        const errorDiv = document.getElementById('error');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                submit.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInput.style.display = 'none';
            } else {
                submit.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInput.style.display = 'block';
            }
        };
        
        submit.onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('pass').value;
            
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                } else {
                    const name = document.getElementById('name').value.trim();
                    if (!name) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const q = query(collection(db, 'users'), where('phone', '==', phone));
                    const s = await getDocs(q);
                    if (!s.empty) throw new Error('Nomor sudah terdaftar');
                    
                    const uc = await createUserWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                    await setDoc(doc(db, 'users', uc.user.uid), {
                        fullName: name,
                        phone: phone,
                        bio: 'Halo! Saya menggunakan PinkChat',
                        contacts: [],
                        createdAt: serverTimestamp()
                    });
                }
                errorDiv.innerText = '';
            } catch(e) {
                errorDiv.innerText = e.message;
            }
        };
    }
    
    // AUTH STATE
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            USER = await getUser(u.uid);
            if (USER) {
                mainApp();
            } else {
                setTimeout(async () => {
                    USER = await getUser(u.uid);
                    if (USER) mainApp();
                    else loginPage();
                }, 1000);
            }
        } else {
            USER = null;
            loginPage();
        }
    });
    
    loginPage();
</script>
</body>
</html>
