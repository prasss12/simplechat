<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID THREAT BLACKSITE</title>

<style>
body{
    font-family:Consolas,monospace;
    background:#f5f5f5;
    margin:0;
    padding:20px;
    color:#222;
}

.container{
    max-width:1000px;
    margin:auto;
}

h1{
    margin-bottom:5px;
}

.subtitle{
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    margin-bottom:20px;
    font-family:inherit;
}

.file{
    background:#fff;
    border:1px solid #ddd;
    padding:12px;
    margin-bottom:8px;
    cursor:pointer;
}

.file:hover{
    background:#fafafa;
}

.status{
    font-size:12px;
    color:#666;
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    width:90%;
    max-width:700px;
    max-height:90vh;
    overflow:auto;
    padding:20px;
}

.modal img{
    width:100%;
    border:1px solid #ddd;
    margin:15px 0;
}

.close{
    float:right;
    cursor:pointer;
    font-size:22px;
}
</style>
</head>
<body>

<div class="container">

<h1>VOID THREAT BLACKSITE</h1>
<div class="subtitle">
Recovered Entity Database<br>
Archive Status: Partially Recovered
</div>

<input type="text" id="search" placeholder="Search files...">

<div id="files"></div>

</div>

<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">✖</span>

<h2 id="title"></h2>
<p id="threat"></p>

<img id="image" style="display:none;">

<p id="description"></p>

</div>
</div>

<script>

const files = [

{
id:"VTB-001",
name:"Forest Watcher",
type:"txt",
threat:"HIGH RISK",
image:"entities/vtb-001.jpg",
description:"Humanoid entity approximately 3 meters tall. Frequently observed standing motionless between trees."
},

{
id:"VTB-002",
name:"The Observer",
type:"txt",
threat:"HIGH RISK",
image:"entities/vtb-002.jpg",
description:"Unknown entity repeatedly discovered in photographs after they are taken."
},

{
id:"VTB-003",
name:"The Smiling Passenger",
type:"txt",
threat:"HIGH RISK",
image:"entities/vtb-003.jpg",
description:"Unknown passenger appearing inside buses and trains during late-night hours."
},

{
id:"VTB-004",
name:"Tunnel Walker",
type:"txt",
threat:"MODERATE",
image:"entities/vtb-004.jpg",
description:"Tall humanoid figure frequently recorded inside abandoned tunnels."
},

{
id:"VTB-005",
name:"Deepwater Titan",
type:"txt",
threat:"EXTREME",
image:"entities/vtb-005.jpg",
description:"Massive aquatic organism inhabiting deep water environments."
},

{
id:"VTB-006",
name:"Antlered Shadow",
type:"txt",
threat:"HIGH RISK",
image:"entities/vtb-006.jpg",
description:"Shadow-like humanoid entity with massive antlers."
},

{
id:"VTB-007",
name:"The Window Face",
type:"txt",
threat:"HIGH RISK",
image:"entities/vtb-007.jpg",
description:"Distorted human-like face frequently observed behind windows of abandoned structures."
},

{
id:"VTB-008",
name:"Iron Jaw",
type:"txt",
threat:"EXTREME",
image:"entities/vtb-008.jpg",
description:"Large predatory entity possessing a split jaw structure and extreme physical strength."
},

{
id:"VTB-009",
name:"Radio Man",
type:"txt",
threat:"MODERATE",
image:"entities/vtb-009.jpg",
description:"Humanoid entity associated with unexplained radio broadcasts."
},

{
id:"VTB-010",
name:"White Mask",
type:"txt",
threat:"HIGH RISK",
image:"entities/vtb-010.jpg",
description:"Tall humanoid entity possessing a completely white featureless face."
},

{
id:"VTB-011",
name:"Corrupted Archive",
type:"corrupted",
description:"FILE CORRUPTED\nRecovery Progress: 14%"
},

{
id:"VTB-012",
name:"Corrupted Archive",
type:"corrupted",
description:"FILE CORRUPTED\nRecovery Progress: 31%"
},

{
id:"VTB-013",
name:"Restricted File",
type:"restricted",
description:"ACCESS DENIED\nLEVEL-5 CLEARANCE REQUIRED"
},

{
id:"VTB-014",
name:"Missing Archive",
type:"missing",
description:"ARCHIVE NOT FOUND\nFILE REMOVED FROM DATABASE"
}

];

const filesContainer = document.getElementById("files");

function render(search=""){

filesContainer.innerHTML="";

files
.filter(file =>
(file.id + file.name)
.toLowerCase()
.includes(search.toLowerCase())
)
.forEach(file=>{

let icon="📄";

if(file.type==="corrupted") icon="⚠";
if(file.type==="restricted") icon="🔒";
if(file.type==="missing") icon="❌";

filesContainer.innerHTML += `
<div class="file" onclick="openFile('${file.id}')">
<b>${icon} ${file.id}.${file.type}</b>
<div class="status">${file.name}</div>
</div>
`;

});

}

render();

function openFile(id){

const file = files.find(f=>f.id===id);

document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=file.id+" - "+file.name;

document.getElementById("description").innerText=file.description;

if(file.image){

document.getElementById("image").style.display="block";
document.getElementById("image").src=file.image;

document.getElementById("threat").innerHTML=
"<b>Threat Level:</b> "+file.threat;

}else{

document.getElementById("image").style.display="none";
document.getElementById("threat").innerHTML="";

}

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

document.getElementById("search")
.addEventListener("input",e=>{
render(e.target.value);
});

</script>

</body>
</html>
