<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PinkChat - Real-time Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: #f8f0f4;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== LAYOUT UTAMA ========== */
        .screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: #ffffff;
        }

        /* HEADER */
        .header {
            background: white;
            padding: 16px 20px;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 17px;
            color: #2d2d2d;
        }

        .header-info p {
            font-size: 12px;
            color: #ff6b9d;
            margin-top: 3px;
        }

        .btn-icon {
            background: #ffe4ec;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 18px;
            cursor: pointer;
        }

        /* DAFTAR CHAT */
        .chat-list {
            flex: 1;
            overflow-y: auto;
            background: white;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .contact-item:active {
            background: #fff0f5;
        }

        .contact-avatar {
            width: 50px;
            height: 50px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .contact-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 16px;
        }

        .contact-phone {
            font-size: 12px;
            color: #aa8a96;
            margin-top: 4px;
        }

        /* TOMBOL AKSI */
        .action-buttons {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ffe0e8;
            flex-shrink: 0;
        }

        .action-btn {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* ========== CHAT VIEW (HALAMAN CHAT) ========== */
        .chat-screen {
            display: none;
            flex-direction: column;
            height: 100vh;
            background: #fefafb;
        }

        .chat-screen.active {
            display: flex;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .msg {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .msg.sent {
            align-self: flex-end;
        }

        .msg.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .msg-time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        .sent .msg-time {
            text-align: right;
            margin-right: 10px;
        }

        /* INPUT PESAN - PASTI ADA DI BAWAH */
        .input-wrapper {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ffe0e8;
            flex-shrink: 0;
        }

        .input-wrapper input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-wrapper button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .input-wrapper .icon-circle {
            width: 44px;
            height: 44px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ff6b9d;
            font-size: 18px;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #ff6b9d;
            cursor: pointer;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        /* MODAL LOGIN */
        .modal-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            width: 90%;
            max-width: 340px;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
        }

        .modal-card h3 {
            margin-bottom: 5px;
        }

        .modal-card p {
            color: #aa8a96;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 14px;
        }

        .modal-card button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895",
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let currentUser = null;
    let selectedUserId = null;
    let selectedUserName = null;
    let unsubMessages = null;
    
    function showToast(msg) {
        let toast = document.querySelector('.toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Ambil data user dari Firestore
    async function getUserData(uid) {
        const docSnap = await getDoc(doc(db, 'users', uid));
        if (docSnap.exists()) return { uid, ...docSnap.data() };
        return null;
    }
    
    // Render HALAMAN UTAMA (daftar chat)
    async function renderMainScreen() {
        const app = document.getElementById('app');
        
        app.innerHTML = `
            <div class="screen" id="mainScreen">
                <div class="header">
                    <div class="avatar" id="userAvatar">${currentUser?.fullName?.charAt(0) || 'U'}</div>
                    <div class="header-info">
                        <h2>${escapeHtml(currentUser?.fullName || 'User')}</h2>
                        <p><i class="fas fa-circle" style="font-size:8px"></i> ${currentUser?.phone || ''}</p>
                    </div>
                    <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                </div>
                
                <div class="chat-list" id="chatList">
                    <div class="empty-state">Loading...</div>
                </div>
                
                <div class="action-buttons">
                    <button class="action-btn" id="addContactAction"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                    <button class="action-btn" id="groupAction"><i class="fas fa-users"></i> Grup</button>
                </div>
            </div>
            
            <div class="chat-screen" id="chatScreen">
                <div class="header">
                    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                    <div class="avatar" id="chatAvatar">P</div>
                    <div class="header-info">
                        <h2 id="chatName">Pilih Chat</h2>
                        <p>Online</p>
                    </div>
                </div>
                
                <div class="messages" id="messagesList">
                    <div class="empty-state">Belum ada pesan</div>
                </div>
                
                <div class="input-wrapper">
                    <div class="icon-circle" id="emojiBtn"><i class="far fa-smile-wink"></i></div>
                    <div class="icon-circle" id="imageBtn"><i class="fas fa-paperclip"></i></div>
                    <input type="text" id="messageInput" placeholder="Ketik pesan...">
                    <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        `;
        
        // Load kontak
        await loadContacts();
        
        // Event listeners
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) await signOut(auth);
        };
        
        document.getElementById('addContactAction').onclick = () => {
            const phone = prompt('Masukkan nomor HP pengguna:', '');
            if (phone) addContact(phone);
        };
        
        document.getElementById('groupAction').onclick = () => {
            showToast('✨ Fitur grup akan segera hadir!');
        };
        
        document.getElementById('backBtn').onclick = () => {
            if (unsubMessages) unsubMessages();
            document.getElementById('chatScreen').classList.remove('active');
            selectedUserId = null;
        };
        
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('emojiBtn').onclick = () => {
            const inp = document.getElementById('messageInput');
            inp.value += '🌸';
            inp.focus();
        };
        
        document.getElementById('imageBtn').onclick = () => {
            if (!selectedUserId) {
                showToast('Pilih chat dulu');
                return;
            }
            document.getElementById('fileInput').click();
        };
        
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/') && selectedUserId) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const chatId = [currentUser.uid, selectedUserId].sort().join('_');
                    await addDoc(collection(db, 'chats', chatId, 'messages'), {
                        senderId: currentUser.uid,
                        text: '📷 Gambar',
                        type: 'image',
                        imageUrl: ev.target.result,
                        timestamp: serverTimestamp()
                    });
                    showToast('Gambar terkirim');
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        };
    }
    
    // Load daftar kontak
    async function loadContacts() {
        const container = document.getElementById('chatList');
        const contacts = currentUser?.contacts || [];
        
        if (contacts.length === 0) {
            container.innerHTML = '<div class="empty-state">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        
        container.innerHTML = '';
        for (let contactId of contacts) {
            const userSnap = await getDoc(doc(db, 'users', contactId));
            if (userSnap.exists()) {
                const user = userSnap.data();
                const div = document.createElement('div');
                div.className = 'contact-item';
                div.innerHTML = `
                    <div class="contact-avatar">${user.fullName?.charAt(0) || '?'}</div>
                    <div>
                        <div class="contact-name">${escapeHtml(user.fullName)}</div>
                        <div class="contact-phone">${user.phone}</div>
                    </div>
                `;
                div.onclick = () => openChat(contactId, user.fullName);
                container.appendChild(div);
            }
        }
    }
    
    // Buka chat
    async function openChat(userId, userName) {
        if (unsubMessages) unsubMessages();
        selectedUserId = userId;
        selectedUserName = userName;
        
        document.getElementById('chatName').innerHTML = escapeHtml(userName);
        document.getElementById('chatAvatar').innerHTML = userName.charAt(0).toUpperCase();
        
        const messagesDiv = document.getElementById('messagesList');
        messagesDiv.innerHTML = '<div class="empty-state">Memuat pesan...</div>';
        
        const chatId = [currentUser.uid, userId].sort().join('_');
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        
        unsubMessages = onSnapshot(q, (snap) => {
            messagesDiv.innerHTML = '';
            if (snap.empty) {
                messagesDiv.innerHTML = '<div class="empty-state">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            snap.forEach(docMsg => {
                const msg = docMsg.data();
                const isSent = msg.senderId === currentUser.uid;
                const msgDiv = document.createElement('div');
                msgDiv.className = `msg ${isSent ? 'sent' : 'received'}`;
                
                let content = '';
                if (msg.type === 'image' && msg.imageUrl) {
                    content = `<div class="bubble"><img src="${msg.imageUrl}" style="max-width:180px; border-radius:16px;"></div>`;
                } else {
                    content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
                }
                
                const time = msg.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                msgDiv.innerHTML = content + `<div class="msg-time">${time}</div>`;
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
        
        document.getElementById('chatScreen').classList.add('active');
    }
    
    // Kirim pesan
    async function sendMessage() {
        if (!selectedUserId) {
            showToast('Pilih chat dulu');
            return;
        }
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        const chatId = [currentUser.uid, selectedUserId].sort().join('_');
        await addDoc(collection(db, 'chats', chatId, 'messages'), {
            senderId: currentUser.uid,
            text: text,
            type: 'text',
            timestamp: serverTimestamp()
        });
        input.value = '';
    }
    
    // Tambah kontak (TWO-WAY)
    async function addContact(phone) {
        try {
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('phone', '==', phone));
            const snap = await getDocs(q);
            if (snap.empty) throw new Error('Nomor HP tidak terdaftar');
            
            const target = snap.docs[0];
            if (target.id === currentUser.uid) throw new Error('Tidak bisa menambah diri sendiri');
            
            // Two-way contact
            await updateDoc(doc(db, 'users', currentUser.uid), {
                contacts: arrayUnion(target.id)
            });
            await updateDoc(doc(db, 'users', target.id), {
                contacts: arrayUnion(currentUser.uid)
            });
            
            showToast('✅ Kontak berhasil ditambahkan');
            currentUser = await getUserData(currentUser.uid);
            await loadContacts();
        } catch(e) {
            alert(e.message);
        }
    }
    
    // TAMPILAN LOGIN
    function renderLoginScreen() {
        const app = document.getElementById('app');
        let isLogin = false;
        
        app.innerHTML = `
            <div class="modal-login" id="loginModal">
                <div class="modal-card">
                    <h3 id="modalTitle">Daftar Akun</h3>
                    <p>Buat akun baru dengan nomor HP</p>
                    <input type="text" id="nameInput" placeholder="Nama lengkap">
                    <input type="tel" id="phoneInput" placeholder="Nomor HP (812345678)">
                    <input type="password" id="passInput" placeholder="Password">
                    <button id="submitBtn">Daftar</button>
                    <button id="switchBtn" style="background:#ffe4ec;color:#ff6b9d">Sudah punya akun? Masuk</button>
                    <div id="errorMsg" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                </div>
            </div>
        `;
        
        const nameInput = document.getElementById('nameInput');
        const switchBtn = document.getElementById('switchBtn');
        const modalTitle = document.getElementById('modalTitle');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                modalTitle.innerText = 'Masuk Akun';
                submitBtn.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInput.style.display = 'none';
            } else {
                modalTitle.innerText = 'Daftar Akun';
                submitBtn.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInput.style.display = 'block';
            }
        };
        
        submitBtn.onclick = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('passInput').value;
            
            try {
                if (isLogin) {
                    const email = `${phone}@pinkchat.local`;
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const fullName = document.getElementById('nameInput').value.trim();
                    if (!fullName) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, where('phone', '==', phone));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw new Error('Nomor HP sudah terdaftar');
                    
                    const email = `${phone}@pinkchat.local`;
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, 'users', userCred.user.uid), {
                        fullName: fullName,
                        phone: phone,
                        contacts: [],
                        createdAt: serverTimestamp()
                    });
                }
                errorMsg.innerText = '';
            } catch(e) {
                errorMsg.innerText = e.message;
            }
        };
    }
    
    // MAIN AUTH LISTENER
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = await getUserData(user.uid);
            if (currentUser) {
                renderMainScreen();
            } else {
                // Tunggu sebentar
                setTimeout(async () => {
                    currentUser = await getUserData(user.uid);
                    if (currentUser) renderMainScreen();
                    else renderLoginScreen();
                }, 1000);
            }
        } else {
            currentUser = null;
            renderLoginScreen();
        }
    });
    
    renderLoginScreen();
</script>
</body>
</html>
