<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PinkChat - Simple Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5eef2;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: white;
        }

        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #ffe0e8;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fefafb;
            height: 100%;
        }

        .header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        .info {
            flex: 1;
            cursor: pointer;
        }

        .info h3 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .info p {
            font-size: 12px;
            color: #ff6b9d;
            margin-top: 3px;
        }

        .btn-icon {
            background: #ffe4ec;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 16px;
            cursor: pointer;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-item:hover {
            background: #fff5f8;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .chat-details {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 15px;
        }

        .chat-sub {
            font-size: 11px;
            color: #aa8a96;
            margin-top: 3px;
        }

        .group-badge {
            background: #ff99c8;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 12px;
            margin-left: 8px;
        }

        .actions {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ffe0e8;
            background: white;
        }

        .actions button {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 70%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        .sent .time {
            text-align: right;
            margin-right: 10px;
        }

        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ffe0e8;
        }

        .input-area input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .input-area .circle {
            width: 44px;
            height: 44px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ff6b9d;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            width: 90%;
            max-width: 380px;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-box h3 {
            margin-bottom: 5px;
        }

        .modal-box p {
            color: #aa8a96;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .modal-box input, .modal-box textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 14px;
        }

        .modal-box button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .contact-check-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .contact-check-item input {
            width: 20px;
            margin: 0;
        }

        .contact-check-item label {
            flex: 1;
            text-align: left;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                z-index: 100;
                width: 280px;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .sidebar.show {
                display: flex;
            }
            .menu-btn {
                display: flex !important;
            }
            .mobile-back {
                display: flex !important;
            }
        }

        @media (min-width: 769px) {
            .menu-btn, .mobile-back {
                display: none !important;
            }
        }

        .menu-btn, .mobile-back {
            background: none;
            border: none;
            font-size: 20px;
            color: #ff6b9d;
            cursor: pointer;
            margin-right: 8px;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895",
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let currentUser = null;
    let selectedChatId = null;
    let selectedChatName = null;
    let unsubscribeMessages = null;
    
    function showToast(msg) {
        let t = document.querySelector('.toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function getUserData(uid) {
        const snap = await getDoc(doc(db, 'users', uid));
        if (snap.exists()) return { uid, ...snap.data() };
        return null;
    }
    
    // ========== UPDATE PROFILE ==========
    async function updateProfile(fullName, bio) {
        await updateDoc(doc(db, 'users', currentUser.uid), { fullName, bio });
        currentUser = await getUserData(currentUser.uid);
        showToast('✅ Profil diperbarui');
        renderMainApp();
    }
    
    // ========== KONTAK ==========
    async function addContact(phone) {
        const q = query(collection(db, 'users'), where('phone', '==', phone));
        const snap = await getDocs(q);
        if (snap.empty) throw new Error('Nomor HP tidak terdaftar');
        const target = snap.docs[0];
        if (target.id === currentUser.uid) throw new Error('Tidak bisa menambah diri sendiri');
        
        await updateDoc(doc(db, 'users', currentUser.uid), { contacts: arrayUnion(target.id) });
        await updateDoc(doc(db, 'users', target.id), { contacts: arrayUnion(currentUser.uid) });
        return true;
    }
    
    async function removeContact(contactId) {
        await updateDoc(doc(db, 'users', currentUser.uid), { contacts: arrayRemove(contactId) });
        showToast('✅ Kontak dihapus');
        renderChatList();
    }
    
    // ========== GRUP ==========
    async function createGroup(groupName, memberIds) {
        if (memberIds.length === 0) throw new Error('Pilih minimal 1 anggota');
        const allMembers = [currentUser.uid, ...memberIds];
        const groupData = {
            type: 'group',
            name: groupName,
            participants: allMembers,
            createdBy: currentUser.uid,
            createdAt: serverTimestamp(),
            lastMessage: ''
        };
        const groupRef = await addDoc(collection(db, 'chats'), groupData);
        for (let uid of allMembers) {
            await updateDoc(doc(db, 'users', uid), { groups: arrayUnion(groupRef.id) });
        }
        return groupRef.id;
    }
    
    async function addMemberToGroup(groupId, newMemberId) {
        await updateDoc(doc(db, 'chats', groupId), { participants: arrayUnion(newMemberId) });
        await updateDoc(doc(db, 'users', newMemberId), { groups: arrayUnion(groupId) });
    }
    
    async function leaveGroup(groupId) {
        await updateDoc(doc(db, 'chats', groupId), { participants: arrayRemove(currentUser.uid) });
        await updateDoc(doc(db, 'users', currentUser.uid), { groups: arrayRemove(groupId) });
        if (selectedChatId === groupId) {
            selectedChatId = null;
            document.getElementById('chatTitle').innerHTML = 'PinkChat';
            document.getElementById('messagesList').innerHTML = '<div class="empty">Pilih chat untuk mulai mengobrol</div>';
        }
        showToast('👋 Keluar dari grup');
        renderChatList();
    }
    
    // ========== GET OR CREATE PRIVATE CHAT ==========
    async function getPrivateChatId(uid1, uid2) {
        const chatsRef = collection(db, 'chats');
        const q1 = query(chatsRef, where('participants', '==', [uid1, uid2]));
        const q2 = query(chatsRef, where('participants', '==', [uid2, uid1]));
        let snap = await getDocs(q1);
        if (snap.empty) snap = await getDocs(q2);
        if (!snap.empty) return snap.docs[0].id;
        
        const newChat = {
            type: 'private',
            participants: [uid1, uid2],
            createdAt: serverTimestamp(),
            lastMessage: ''
        };
        const ref = await addDoc(chatsRef, newChat);
        return ref.id;
    }
    
    // ========== SEND MESSAGE - FIXED ==========
    async function sendMessage(chatId, text) {
        if (!chatId || !text) return;
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        await addDoc(messagesRef, {
            senderId: currentUser.uid,
            text: text,
            timestamp: serverTimestamp()
        });
        await updateDoc(doc(db, 'chats', chatId), {
            lastMessage: text.substring(0, 50),
            lastMessageTime: serverTimestamp()
        });
    }
    
    // ========== RENDER CHAT LIST ==========
    async function renderChatList() {
        const container = document.getElementById('chatList');
        if (!container) return;
        
        const userData = await getUserData(currentUser.uid);
        const contacts = userData?.contacts || [];
        const groups = userData?.groups || [];
        let items = [];
        
        for (let cid of contacts) {
            const chatId = await getPrivateChatId(currentUser.uid, cid);
            const user = await getUserData(cid);
            if (user) {
                items.push({ id: chatId, type: 'private', name: user.fullName, subtitle: user.phone });
            }
        }
        
        for (let gid of groups) {
            const group = await getDoc(doc(db, 'chats', gid));
            if (group.exists()) {
                items.push({ id: gid, type: 'group', name: group.data().name, subtitle: `${group.data().participants?.length || 0} anggota` });
            }
        }
        
        container.innerHTML = '';
        if (items.length === 0) {
            container.innerHTML = '<div class="empty">Belum ada chat<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        
        for (let item of items) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="chat-avatar">${item.name.charAt(0).toUpperCase()}</div>
                <div class="chat-details">
                    <div class="chat-name">${escapeHtml(item.name)} ${item.type === 'group' ? '<span class="group-badge"><i class="fas fa-users"></i> Grup</span>' : ''}</div>
                    <div class="chat-sub">${escapeHtml(item.subtitle)}</div>
                </div>
            `;
            div.onclick = () => openChat(item.id, item.name, item.type);
            container.appendChild(div);
        }
    }
    
    // ========== OPEN CHAT ==========
    async function openChat(chatId, name, type) {
        if (unsubscribeMessages) unsubscribeMessages();
        selectedChatId = chatId;
        selectedChatName = name;
        
        document.getElementById('chatTitle').innerHTML = escapeHtml(name);
        document.getElementById('chatStatus').innerHTML = type === 'group' ? 'Grup' : 'Online';
        document.getElementById('chatAvatar').innerHTML = name.charAt(0).toUpperCase();
        
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('show');
        }
        
        const msgDiv = document.getElementById('messagesList');
        msgDiv.innerHTML = '<div class="empty">Memuat pesan...</div>';
        
        const q = query(collection(db, 'chats', chatId, 'messages'), orderBy('timestamp', 'asc'));
        unsubscribeMessages = onSnapshot(q, async (snap) => {
            msgDiv.innerHTML = '';
            if (snap.empty) {
                msgDiv.innerHTML = '<div class="empty">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            for (const docMsg of snap.docs) {
                const msg = docMsg.data();
                const isSent = msg.senderId === currentUser.uid;
                const el = document.createElement('div');
                el.className = `message ${isSent ? 'sent' : 'received'}`;
                
                let senderName = '';
                if (type === 'group' && !isSent) {
                    const sender = await getUserData(msg.senderId);
                    senderName = `<div style="font-size: 10px; color: #ff99c8; margin-bottom: 3px;">${escapeHtml(sender?.fullName || 'Anggota')}</div>`;
                }
                
                const time = msg.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || '';
                el.innerHTML = senderName + `<div class="bubble">${escapeHtml(msg.text)}</div><div class="time">${time}</div>`;
                msgDiv.appendChild(el);
            }
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
        
        renderChatList();
    }
    
    // ========== SEND CURRENT MESSAGE ==========
    async function sendCurrentMessage() {
        if (!selectedChatId) {
            showToast('Pilih chat dulu');
            return;
        }
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        try {
            await sendMessage(selectedChatId, text);
            input.value = '';
        } catch(e) {
            console.error(e);
            showToast('Gagal kirim pesan');
        }
    }
    
    // ========== SHOW PROFILE ==========
    function showMyProfile() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <div class="avatar" style="margin:0 auto 15px auto; width:80px; height:80px; font-size:32px;">${currentUser.fullName?.charAt(0) || 'U'}</div>
                <h3>Profil Saya</h3>
                <input type="text" id="editName" value="${escapeHtml(currentUser.fullName || '')}" placeholder="Nama">
                <textarea id="editBio" rows="3" placeholder="Bio">${escapeHtml(currentUser.bio || '')}</textarea>
                <button id="saveProfileBtn">Simpan</button>
                <button id="closeModal" class="secondary">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('saveProfileBtn').onclick = async () => {
            const newName = document.getElementById('editName').value.trim();
            const newBio = document.getElementById('editBio').value.trim();
            if (newName) await updateProfile(newName, newBio);
            modal.remove();
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }
    
    function showContactProfile(userId, userName, userPhone, userBio) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <div class="avatar" style="margin:0 auto 15px auto; width:80px; height:80px; font-size:32px;">${userName.charAt(0).toUpperCase()}</div>
                <h3>${escapeHtml(userName)}</h3>
                <p>${userPhone}</p>
                <p style="color:#aa8a96;">${escapeHtml(userBio || 'Halo! Saya menggunakan PinkChat')}</p>
                <button id="closeModal" class="secondary">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('closeModal').onclick = () => modal.remove();
    }
    
    function showGroupProfile(groupId, groupName, memberCount) {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <div class="avatar" style="margin:0 auto 15px auto; width:80px; height:80px; font-size:32px;">${groupName.charAt(0).toUpperCase()}</div>
                <h3>${escapeHtml(groupName)}</h3>
                <p>${memberCount} anggota</p>
                <button id="leaveGroupBtn" style="background:#ff4444;">Keluar dari Grup</button>
                <button id="closeModal" class="secondary">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('leaveGroupBtn').onclick = async () => {
            if (confirm('Yakin keluar dari grup ini?')) {
                await leaveGroup(groupId);
                modal.remove();
            }
        };
        document.getElementById('closeModal').onclick = () => modal.remove();
    }
    
    // ========== SHOW CREATE GROUP MODAL ==========
    async function showCreateGroupModal() {
        const userData = await getUserData(currentUser.uid);
        const contacts = userData?.contacts || [];
        if (contacts.length === 0) {
            showToast('Tambahkan kontak terlebih dahulu');
            return;
        }
        
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Buat Grup Baru</h3>
                <input type="text" id="groupNameInput" placeholder="Nama Grup">
                <p style="text-align:left; margin:10px 0 5px;">Pilih anggota:</p>
                <div id="membersList" style="max-height:200px; overflow-y:auto;"></div>
                <button id="createGroupBtn">Buat Grup</button>
                <button id="cancelBtn" class="secondary">Batal</button>
            </div>
        `;
        document.body.appendChild(modal);
        
        const container = document.getElementById('membersList');
        const selected = [];
        
        for (let cid of contacts) {
            const user = await getUserData(cid);
            if (user) {
                const div = document.createElement('div');
                div.className = 'contact-check-item';
                div.innerHTML = `<input type="checkbox" value="${cid}" id="chk_${cid}"><label for="chk_${cid}">${escapeHtml(user.fullName)} (${user.phone})</label>`;
                const chk = div.querySelector('input');
                chk.onchange = () => {
                    if (chk.checked) selected.push(cid);
                    else selected.splice(selected.indexOf(cid), 1);
                };
                container.appendChild(div);
            }
        }
        
        document.getElementById('createGroupBtn').onclick = async () => {
            const groupName = document.getElementById('groupNameInput').value.trim();
            if (!groupName) { showToast('Masukkan nama grup'); return; }
            if (selected.length === 0) { showToast('Pilih minimal 1 anggota'); return; }
            await createGroup(groupName, selected);
            showToast('🎉 Grup berhasil dibuat');
            modal.remove();
            renderChatList();
        };
        document.getElementById('cancelBtn').onclick = () => modal.remove();
    }
    
    // ========== SHOW ADD CONTACT MODAL ==========
    function showAddContactModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Tambah Kontak</h3>
                <input type="tel" id="contactPhone" placeholder="Nomor HP">
                <button id="addBtn">Tambah</button>
                <button id="cancelBtn" class="secondary">Batal</button>
                <div id="errorMsg" style="color:#ff6b9d; font-size:12px; margin-top:10px;"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('addBtn').onclick = async () => {
            const phone = document.getElementById('contactPhone').value.trim();
            try {
                await addContact(phone);
                showToast('✅ Kontak ditambahkan');
                modal.remove();
                renderChatList();
            } catch(e) {
                document.getElementById('errorMsg').innerText = e.message;
            }
        };
        document.getElementById('cancelBtn').onclick = () => modal.remove();
    }
    
    // ========== MAIN APP ==========
    async function renderMainApp() {
        const root = document.getElementById('app');
        
        root.innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="header">
                        <div class="avatar" id="profileBtn">${currentUser?.fullName?.charAt(0) || 'U'}</div>
                        <div class="info" id="profileInfoBtn">
                            <h3>${escapeHtml(currentUser?.fullName || 'User')}</h3>
                            <p>${currentUser?.phone || ''}</p>
                        </div>
                        <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                    <div class="chat-list" id="chatList"></div>
                    <div class="actions">
                        <button id="addContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                        <button id="createGroupBtn"><i class="fas fa-users"></i> Grup Baru</button>
                    </div>
                </div>
                
                <div class="chat-area">
                    <div class="header">
                        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                        <button class="mobile-back" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                        <div class="avatar" id="chatAvatarBtn">P</div>
                        <div class="info" id="chatInfoBtn">
                            <h3 id="chatTitle">PinkChat</h3>
                            <p id="chatStatus">Pilih percakapan</p>
                        </div>
                        <button class="btn-icon" id="infoBtn"><i class="fas fa-info-circle"></i></button>
                    </div>
                    <div class="messages" id="messagesList">
                        <div class="empty">Pilih chat untuk mulai mengobrol</div>
                    </div>
                    <div class="input-area">
                        <div class="circle" id="emojiBtn"><i class="far fa-smile-wink"></i></div>
                        <div class="circle" id="imageBtn"><i class="fas fa-paperclip"></i></div>
                        <input type="text" id="messageInput" placeholder="Ketik pesan...">
                        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        `;
        
        renderChatList();
        
        // Event listeners
        document.getElementById('profileBtn').onclick = showMyProfile;
        document.getElementById('profileInfoBtn').onclick = showMyProfile;
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) await signOut(auth);
        };
        document.getElementById('addContactBtn').onclick = showAddContactModal;
        document.getElementById('createGroupBtn').onclick = showCreateGroupModal;
        document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.add('show');
        document.getElementById('backBtn').onclick = () => {
            if (unsubscribeMessages) unsubscribeMessages();
            selectedChatId = null;
            document.getElementById('chatTitle').innerHTML = 'PinkChat';
            document.getElementById('chatStatus').innerHTML = 'Pilih percakapan';
            document.getElementById('messagesList').innerHTML = '<div class="empty">Pilih chat untuk mulai mengobrol</div>';
        };
        document.getElementById('sendBtn').onclick = sendCurrentMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendCurrentMessage();
        });
        document.getElementById('emojiBtn').onclick = () => {
            document.getElementById('messageInput').value += '🌸';
            document.getElementById('messageInput').focus();
        };
        
        // Chat header click for profile
        document.getElementById('chatAvatarBtn').onclick = async () => {
            if (!selectedChatId) return;
            const chat = await getDoc(doc(db, 'chats', selectedChatId));
            if (chat.exists() && chat.data().type === 'private') {
                const otherId = chat.data().participants.find(p => p !== currentUser.uid);
                const other = await getUserData(otherId);
                if (other) showContactProfile(otherId, other.fullName, other.phone, other.bio);
            } else if (chat.exists() && chat.data().type === 'group') {
                showGroupProfile(selectedChatId, chat.data().name, chat.data().participants?.length || 0);
            }
        };
        document.getElementById('chatInfoBtn').onclick = async () => {
            if (!selectedChatId) return;
            const chat = await getDoc(doc(db, 'chats', selectedChatId));
            if (chat.exists() && chat.data().type === 'private') {
                const otherId = chat.data().participants.find(p => p !== currentUser.uid);
                const other = await getUserData(otherId);
                if (other) showContactProfile(otherId, other.fullName, other.phone, other.bio);
            } else if (chat.exists() && chat.data().type === 'group') {
                showGroupProfile(selectedChatId, chat.data().name, chat.data().participants?.length || 0);
            }
        };
        document.getElementById('infoBtn').onclick = async () => {
            if (!selectedChatId) return;
            const chat = await getDoc(doc(db, 'chats', selectedChatId));
            if (chat.exists() && chat.data().type === 'private') {
                const otherId = chat.data().participants.find(p => p !== currentUser.uid);
                const other = await getUserData(otherId);
                if (other) showContactProfile(otherId, other.fullName, other.phone, other.bio);
            } else if (chat.exists() && chat.data().type === 'group') {
                showGroupProfile(selectedChatId, chat.data().name, chat.data().participants?.length || 0);
            }
        };
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuBtn');
            if (window.innerWidth <= 768 && sidebar.classList.contains('show')) {
                if (!sidebar.contains(e.target) && e.target !== menuBtn) {
                    sidebar.classList.remove('show');
                }
            }
        });
    }
    
    // ========== LOGIN/REGISTER ==========
    function renderLogin() {
        let isLogin = false;
        const root = document.getElementById('app');
        
        root.innerHTML = `
            <div class="modal" id="loginModal">
                <div class="modal-box">
                    <h3 id="title">Daftar Akun</h3>
                    <input type="text" id="nameInput" placeholder="Nama lengkap">
                    <input type="tel" id="phoneInput" placeholder="Nomor HP (812345678)">
                    <input type="password" id="passInput" placeholder="Password">
                    <button id="submitBtn">Daftar</button>
                    <button id="switchBtn" style="background:#ffe4ec;color:#ff6b9d">Sudah punya akun? Masuk</button>
                    <div id="errorMsg" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                </div>
            </div>
        `;
        
        const nameInput = document.getElementById('nameInput');
        const title = document.getElementById('title');
        const submitBtn = document.getElementById('submitBtn');
        const switchBtn = document.getElementById('switchBtn');
        const errorDiv = document.getElementById('errorMsg');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                title.innerText = 'Masuk Akun';
                submitBtn.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInput.style.display = 'none';
            } else {
                title.innerText = 'Daftar Akun';
                submitBtn.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInput.style.display = 'block';
            }
        };
        
        submitBtn.onclick = async () => {
            const phone = document.getElementById('phoneInput').value.trim();
            const password = document.getElementById('passInput').value;
            
            try {
                if (isLogin) {
                    const email = `${phone}@pinkchat.local`;
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    const fullName = document.getElementById('nameInput').value.trim();
                    if (!fullName) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const q = query(collection(db, 'users'), where('phone', '==', phone));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw new Error('Nomor HP sudah terdaftar');
                    
                    const email = `${phone}@pinkchat.local`;
                    const userCred = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, 'users', userCred.user.uid), {
                        fullName: fullName,
                        phone: phone,
                        bio: 'Halo! Saya menggunakan PinkChat',
                        contacts: [],
                        groups: [],
                        createdAt: serverTimestamp()
                    });
                }
                errorDiv.innerText = '';
            } catch(e) {
                errorDiv.innerText = e.message;
            }
        };
    }
    
    // ========== AUTH STATE ==========
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = await getUserData(user.uid);
            if (currentUser) {
                renderMainApp();
            } else {
                setTimeout(async () => {
                    currentUser = await getUserData(user.uid);
                    if (currentUser) renderMainApp();
                    else renderLogin();
                }, 1000);
            }
        } else {
            currentUser = null;
            renderLogin();
        }
    });
    
    renderLogin();
</script>
</body>
</html>
