<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>PinkChat - Chat Real-time</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
            authDomain: "simplechat-85cd8.firebaseapp.com",
            projectId: "simplechat-85cd8",
            storageBucket: "simplechat-85cd8.firebasestorage.app",
            messagingSenderId: "244789873168",
            appId: "1:244789873168:web:4cba5481f689ab3103d895",
            measurementId: "G-KR9MJP5QKM"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        window.db = db;
        window.auth = auth;
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #fdf2f5;
            height: 100vh;
            overflow: hidden;
        }

        /* Container utama */
        .app {
            display: flex;
            height: 100vh;
            width: 100%;
            background: white;
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #ffe4ec;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Main Chat */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            background: #fefafb;
        }

        /* Header */
        .chat-header {
            padding: 16px 20px;
            background: white;
            border-bottom: 1px solid #ffe4ec;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header-avatar {
            width: 45px;
            height: 45px;
            background: #ff6b9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            font-size: 16px;
            color: #2d2d2d;
        }

        .chat-header-info p {
            font-size: 11px;
            color: #ff99c8;
            margin-top: 3px;
        }

        /* Messages Container - BISA SCROLL */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* Bubble chat */
        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
            border-bottom-right-radius: 5px;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            border-bottom-left-radius: 5px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .message-time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 8px;
            margin-right: 8px;
        }

        .sent .message-time {
            text-align: right;
        }

        /* INPUT AREA - PASTI MUNCUL */
        .input-wrapper {
            background: white;
            padding: 12px 16px;
            border-top: 1px solid #ffe4ec;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .input-wrapper input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-wrapper button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ffe4ec;
            border: none;
            color: #ff6b9d;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Chat List Item */
        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid #ffe4ec;
        }

        .chat-item:hover {
            background: #fff5f8;
        }

        .chat-item.active {
            background: #ffeef3;
            border-left: 3px solid #ff6b9d;
        }

        .chat-avatar {
            width: 50px;
            height: 50px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #ff6b9d;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #2d2d2d;
        }

        .chat-lastmsg {
            font-size: 12px;
            color: #aa8a96;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        /* Sidebar Header */
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #ffe4ec;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .user-name {
            flex: 1;
        }

        .user-name h4 {
            color: #2d2d2d;
        }

        .user-name p {
            font-size: 11px;
            color: #ff6b9d;
        }

        .logout-icon {
            background: #ffe4ec;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: #ff6b9d;
        }

        .search-box {
            background: #fef0f4;
            border-radius: 25px;
            padding: 10px 15px;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            background: none;
            border: none;
            flex: 1;
            outline: none;
        }

        .action-buttons {
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ffe4ec;
        }

        .action-btn {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 10px;
            border-radius: 25px;
            color: #ff6b9d;
            font-weight: 500;
            cursor: pointer;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 350px;
            max-width: 90%;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                bottom: 0;
                z-index: 200;
                transition: left 0.3s;
                width: 280px;
            }
            .sidebar.open {
                left: 0;
            }
            .menu-btn {
                display: block !important;
            }
            .back-btn {
                display: block !important;
            }
        }

        @media (min-width: 769px) {
            .menu-btn, .back-btn {
                display: none;
            }
        }

        .menu-btn, .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #ff6b9d;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    const db = window.db;
    const auth = window.auth;
    
    let currentUser = null;
    let currentChatId = null;
    let currentChatName = null;
    let unsubscribeMessages = null;
    
    // Render app
    function renderApp() {
        const appDiv = document.getElementById('app');
        if (!currentUser) {
            appDiv.innerHTML = `
                <div class="modal" id="authModal" style="display:flex">
                    <div class="modal-content">
                        <h3 id="authTitle">Daftar Akun</h3>
                        <input type="text" id="fullName" placeholder="Nama lengkap">
                        <input type="tel" id="phone" placeholder="Nomor HP (812345678)">
                        <input type="password" id="password" placeholder="Password">
                        <button id="submitBtn">Daftar</button>
                        <button id="switchBtn" style="background:#ffe4ec;color:#ff6b9d;margin-top:8px">Sudah punya akun? Masuk</button>
                        <div id="authMsg" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                    </div>
                </div>
            `;
            attachAuthEvents();
            return;
        }
        
        // Main app UI
        appDiv.innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="sidebar-header">
                        <div class="user-info">
                            <div class="user-avatar" id="userAvatar">${currentUser.fullName?.charAt(0) || 'U'}</div>
                            <div class="user-name">
                                <h4 id="userFullName">${escapeHtml(currentUser.fullName || 'User')}</h4>
                                <p><i class="fas fa-circle" style="font-size:8px"></i> ${currentUser.phone}</p>
                            </div>
                            <button class="logout-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                        </div>
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchChat" placeholder="Cari chat...">
                        </div>
                    </div>
                    <div class="chat-list" id="chatList"></div>
                    <div class="action-buttons">
                        <button class="action-btn" id="newGroupBtn"><i class="fas fa-users"></i> Grup Baru</button>
                        <button class="action-btn" id="newContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                    </div>
                </div>
                
                <div class="chat-area">
                    <div class="chat-header">
                        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                        <div class="chat-header-avatar" id="chatAvatar">P</div>
                        <div class="chat-header-info">
                            <h3 id="chatTitle">PinkChat</h3>
                            <p id="chatStatus">Pilih percakapan</p>
                        </div>
                    </div>
                    <div class="messages" id="messages"></div>
                    <div class="input-wrapper">
                        <button class="icon-btn" id="emojiBtn"><i class="far fa-smile-wink"></i></button>
                        <button class="icon-btn" id="attachBtn"><i class="fas fa-paperclip"></i></button>
                        <input type="text" id="messageInput" placeholder="Ketik pesan...">
                        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        `;
        
        attachMainEvents();
        loadChats();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    // Auth events
    let isLogin = false;
    function attachAuthEvents() {
        const submitBtn = document.getElementById('submitBtn');
        const switchBtn = document.getElementById('switchBtn');
        const authTitle = document.getElementById('authTitle');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                authTitle.innerText = 'Masuk Akun';
                submitBtn.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                document.getElementById('fullName').style.display = 'none';
            } else {
                authTitle.innerText = 'Daftar Akun';
                submitBtn.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                document.getElementById('fullName').style.display = 'block';
            }
        };
        
        submitBtn.onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const pwd = document.getElementById('password').value;
            const msgDiv = document.getElementById('authMsg');
            
            try {
                if (isLogin) {
                    const email = `${phone}@pinkchat.local`;
                    await signInWithEmailAndPassword(auth, email, pwd);
                } else {
                    const fullName = document.getElementById('fullName').value.trim();
                    if (!fullName) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const usersRef = collection(db, 'users');
                    const q = query(usersRef, where('phone', '==', phone));
                    const snap = await getDocs(q);
                    if (!snap.empty) throw new Error('Nomor HP sudah terdaftar');
                    
                    const email = `${phone}@pinkchat.local`;
                    const userCred = await createUserWithEmailAndPassword(auth, email, pwd);
                    await setDoc(doc(db, 'users', userCred.user.uid), {
                        fullName: fullName,
                        phone: phone,
                        contacts: [],
                        groups: [],
                        createdAt: serverTimestamp()
                    });
                }
                msgDiv.innerText = '';
            } catch(e) {
                msgDiv.innerText = e.message;
            }
        };
    }
    
    async function loadChats() {
        if (!currentUser) return;
        
        const contacts = currentUser.contacts || [];
        const groups = currentUser.groups || [];
        const chatItems = [];
        
        for (let contactId of contacts) {
            const userSnap = await getDoc(doc(db, 'users', contactId));
            if (userSnap.exists()) {
                chatItems.push({
                    id: contactId,
                    type: 'contact',
                    name: userSnap.data().fullName,
                    phone: userSnap.data().phone
                });
            }
        }
        
        const container = document.getElementById('chatList');
        if (!container) return;
        
        container.innerHTML = '';
        if (chatItems.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:40px;color:#cc9aa8">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
        }
        
        for (let chat of chatItems) {
            const div = document.createElement('div');
            div.className = `chat-item ${currentChatId === chat.id ? 'active' : ''}`;
            div.innerHTML = `
                <div class="chat-avatar">${chat.name.charAt(0).toUpperCase()}</div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(chat.name)}</div>
                    <div class="chat-lastmsg">${chat.phone}</div>
                </div>
            `;
            div.onclick = () => openChat(chat.id, chat.name);
            container.appendChild(div);
        }
    }
    
    async function openChat(userId, userName) {
        if (unsubscribeMessages) unsubscribeMessages();
        currentChatId = userId;
        currentChatName = userName;
        
        document.getElementById('chatTitle').innerHTML = escapeHtml(userName);
        document.getElementById('chatAvatar').innerHTML = userName.charAt(0).toUpperCase();
        document.getElementById('chatStatus').innerHTML = 'Online';
        
        // Tutup sidebar di mobile
        if (window.innerWidth <= 768) {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        // Load messages
        const messagesDiv = document.getElementById('messages');
        messagesDiv.innerHTML = '<div style="text-align:center;padding:20px">Memuat...</div>';
        
        const chatId = [currentUser.uid, userId].sort().join('_');
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        const q = query(messagesRef, orderBy('timestamp', 'asc'));
        
        unsubscribeMessages = onSnapshot(q, (snap) => {
            messagesDiv.innerHTML = '';
            if (snap.empty) {
                messagesDiv.innerHTML = '<div style="text-align:center;padding:20px;color:#cc9aa8">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            snap.forEach(docMsg => {
                const msg = docMsg.data();
                const isSent = msg.senderId === currentUser.uid;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
                let content = '';
                if (msg.type === 'image' && msg.imageUrl) {
                    content = `<div class="bubble"><img src="${msg.imageUrl}" style="max-width:180px;border-radius:16px"></div>`;
                } else {
                    content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
                }
                const time = msg.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                msgDiv.innerHTML = content + `<div class="message-time">${time}</div>`;
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
        
        loadChats();
    }
    
    async function sendMessage() {
        if (!currentChatId) {
            showToast('Pilih chat terlebih dahulu');
            return;
        }
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        const chatId = [currentUser.uid, currentChatId].sort().join('_');
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        await addDoc(messagesRef, {
            senderId: currentUser.uid,
            text: text,
            type: 'text',
            timestamp: serverTimestamp()
        });
        input.value = '';
    }
    
    async function addContact() {
        const phone = prompt('Masukkan nomor HP pengguna yang ingin ditambahkan:', '');
        if (!phone) return;
        
        try {
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('phone', '==', phone));
            const snap = await getDocs(q);
            if (snap.empty) throw new Error('Nomor HP tidak terdaftar');
            const targetUser = snap.docs[0];
            if (targetUser.id === currentUser.uid) throw new Error('Tidak bisa menambah diri sendiri');
            
            // Two-way contact
            const userRef = doc(db, 'users', currentUser.uid);
            const targetRef = doc(db, 'users', targetUser.id);
            await updateDoc(userRef, { contacts: arrayUnion(targetUser.id) });
            await updateDoc(targetRef, { contacts: arrayUnion(currentUser.uid) });
            
            showToast('✅ Kontak berhasil ditambahkan');
            currentUser = await getUserData(currentUser.uid);
            loadChats();
        } catch(e) {
            alert(e.message);
        }
    }
    
    async function getUserData(uid) {
        const snap = await getDoc(doc(db, 'users', uid));
        if (snap.exists()) return { uid, ...snap.data() };
        return null;
    }
    
    function attachMainEvents() {
        // Send message
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Emoji
        document.getElementById('emojiBtn').onclick = () => {
            const input = document.getElementById('messageInput');
            input.value += '🌸';
            input.focus();
        };
        
        // Attach image
        document.getElementById('attachBtn').onclick = () => {
            if (!currentChatId) {
                showToast('Pilih chat dulu');
                return;
            }
            document.getElementById('fileInput').click();
        };
        
        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/') && currentChatId) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const chatId = [currentUser.uid, currentChatId].sort().join('_');
                    const messagesRef = collection(db, 'chats', chatId, 'messages');
                    await addDoc(messagesRef, {
                        senderId: currentUser.uid,
                        text: 'Gambar',
                        type: 'image',
                        imageUrl: ev.target.result,
                        timestamp: serverTimestamp()
                    });
                    showToast('📷 Gambar terkirim');
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        };
        
        // New contact
        document.getElementById('newContactBtn').onclick = addContact;
        
        // Logout
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin ingin keluar?')) {
                await signOut(auth);
            }
        };
        
        // Mobile menu
        const menuBtn = document.getElementById('menuBtn');
        const backBtn = document.getElementById('backBtn');
        const sidebar = document.getElementById('sidebar');
        
        if (menuBtn) {
            menuBtn.onclick = () => sidebar.classList.add('open');
        }
        if (backBtn) {
            backBtn.onclick = () => {
                if (unsubscribeMessages) unsubscribeMessages();
                currentChatId = null;
                document.getElementById('chatTitle').innerHTML = 'PinkChat';
                document.getElementById('chatAvatar').innerHTML = 'P';
                document.getElementById('chatStatus').innerHTML = 'Pilih percakapan';
                document.getElementById('messages').innerHTML = '<div style="text-align:center;padding:20px;color:#cc9aa8">Pilih chat untuk mulai mengobrol</div>';
            };
        }
        
        // Close sidebar on click outside
        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 && sidebar && sidebar.classList.contains('open')) {
                if (!sidebar.contains(e.target) && e.target !== menuBtn) {
                    sidebar.classList.remove('open');
                }
            }
        });
        
        // New group
        document.getElementById('newGroupBtn').onclick = () => {
            alert('Fitur grup akan segera hadir!');
        };
        
        // Search
        document.getElementById('searchChat').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const items = document.querySelectorAll('.chat-item');
            items.forEach(item => {
                const name = item.querySelector('.chat-name')?.innerText.toLowerCase() || '';
                if (name.includes(term)) item.style.display = 'flex';
                else item.style.display = 'none';
            });
        });
    }
    
    // Auth state listener
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = await getUserData(user.uid);
            if (currentUser) {
                renderApp();
            }
        } else {
            currentUser = null;
            renderApp();
        }
    });
    
    // Initial render
    renderApp();
</script>
</body>
</html>
