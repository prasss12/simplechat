<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Santara Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.4.0/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    /* style.css */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f0f0f;
      color: #ffffff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    #app {
      width: 100%;
      max-width: 480px;
      height: 100vh;
      max-height: 820px;
      background: #171717;
      border-radius: 32px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      backdrop-filter: blur(2px);
    }
    @media (max-width: 500px) {
      #app {
        max-height: 100vh;
        border-radius: 0;
        max-width: 100%;
      }
    }
    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      animation: fade 0.3s ease;
    }
    .screen.active {
      display: flex;
    }
    @keyframes fade {
      0% { opacity: 0; transform: scale(0.98); }
      100% { opacity: 1; transform: scale(1); }
    }
    .glass {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 40px;
      padding: 40px 28px;
      width: 90%;
      max-width: 360px;
      margin: auto;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    }
    #landingScreen {
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 30% 30%, #1f1f1f, #0a0a0a);
    }
    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .logo-icon {
      font-size: 36px;
      color: #8b5cf6;
    }
    .logo-text {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #ffffff 60%, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #aaa;
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 32px;
    }
    .btn-primary {
      background: #8b5cf6;
      border: none;
      padding: 14px 28px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 20px rgba(139, 92, 246, 0.3);
      width: 100%;
      letter-spacing: 0.3px;
    }
    .btn-primary:hover {
      transform: scale(1.02);
      background: #7c4ae6;
      box-shadow: 0 8px 28px rgba(139, 92, 246, 0.5);
    }
    .btn-primary:active { transform: scale(0.96); }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .loading-match {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .loading-match.hidden { display: none; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .searching-text {
      color: #ccc;
      font-size: 15px;
      font-weight: 500;
    }
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: #121212;
    }
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
      background: rgba(23,23,23,0.7);
      backdrop-filter: blur(12px);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }
    .status-dot.online { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    .status-label { font-size: 13px; font-weight: 500; color: #bbb; }
    .room-id-badge {
      background: rgba(139, 92, 246, 0.2);
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 11px;
      color: #b594ff;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    .header-actions {
      display: flex;
      gap: 8px;
    }
    .btn-ghost-sm {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 14px;
      border-radius: 30px;
      color: #ddd;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-ghost-sm:hover { background: rgba(255,255,255,0.05); }
    .btn-ghost-sm.danger { color: #f87171; border-color: rgba(248,113,113,0.2); }
    .btn-ghost-sm.danger:hover { background: rgba(248,113,113,0.1); }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 10px; }
    .empty-state {
      margin: auto;
      text-align: center;
      color: #555;
    }
    .empty-icon { font-size: 48px; display: block; margin-bottom: 8px; }
    .empty-state p { font-size: 15px; }
    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      animation: slideUp 0.2s ease;
      position: relative;
    }
    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .message.self {
      align-self: flex-end;
      background: #8b5cf6;
      color: white;
      border-bottom-right-radius: 4px;
    }
    .message.partner {
      align-self: flex-start;
      background: #262626;
      color: #f0f0f0;
      border-bottom-left-radius: 4px;
    }
    .message .timestamp {
      font-size: 9px;
      opacity: 0.5;
      margin-top: 6px;
      text-align: right;
      display: block;
    }
    .chat-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(23,23,23,0.7);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }
    #messageInput {
      flex: 1;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 12px 18px;
      border-radius: 40px;
      color: white;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }
    #messageInput:focus { border-color: #8b5cf6; background: rgba(255,255,255,0.08); }
    #messageInput::placeholder { color: #666; }
    .btn-send {
      background: #8b5cf6;
      border: none;
      width: 48px;
      height: 48px;
      border-radius: 40px;
      color: white;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: 0.2s;
      flex-shrink: 0;
    }
    .btn-send:hover { background: #7c4ae6; transform: scale(1.03); }
    .btn-send:active { transform: scale(0.92); }
    .toast-container {
      position: absolute;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
      z-index: 50;
      width: 90%;
    }
    .toast {
      background: rgba(30,30,30,0.9);
      backdrop-filter: blur(16px);
      padding: 12px 24px;
      border-radius: 60px;
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      font-weight: 500;
      color: #eee;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      pointer-events: auto;
      animation: toastIn 0.25s ease;
      width: 100%;
      text-align: center;
    }
    .toast.success { border-left: 4px solid #4ade80; }
    .toast.info { border-left: 4px solid #8b5cf6; }
    .toast.warn { border-left: 4px solid #fbbf24; }
    .toast.error { border-left: 4px solid #f87171; }
    @keyframes toastIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .toast.hide { animation: toastOut 0.2s ease forwards; }
    @keyframes toastOut {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(20px); }
    }
    @media (max-width: 460px) {
      .glass-card { padding: 30px 18px; }
      .logo-text { font-size: 24px; }
    }
  </style>
</head>
<body>

  <div id="app" class="dark-mode">
    <section id="landingScreen" class="screen active">
      <div class="glass-card landing-card">
        <div class="logo-wrapper">
          <span class="logo-icon">✦</span>
          <h1 class="logo-text">Santara Chat</h1>
        </div>
        <p class="subtitle">Chat anonymously with random people.</p>
        <button id="findPartnerBtn" class="btn-primary">Find Partner</button>
        <div id="loadingMatch" class="loading-match hidden">
          <div class="spinner"></div>
          <p class="searching-text">Searching for partner...</p>
        </div>
      </div>
    </section>

    <section id="chatScreen" class="screen">
      <div class="chat-container">
        <header class="chat-header glass">
          <div class="header-left">
            <div class="status-dot online"></div>
            <span class="status-label">Online</span>
            <span class="room-id-badge" id="roomIdBadge">#room</span>
          </div>
          <div class="header-actions">
            <button id="nextPartnerBtn" class="btn-ghost-sm">Next</button>
            <button id="leaveChatBtn" class="btn-ghost-sm danger">Leave</button>
          </div>
        </header>
        <div id="chatMessages" class="chat-messages">
          <div class="empty-state">
            <span class="empty-icon">💬</span>
            <p>No messages yet</p>
          </div>
        </div>
        <footer class="chat-footer glass">
          <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500" autocomplete="off" />
          <button id="sendMessageBtn" class="btn-send">➤</button>
        </footer>
      </div>
    </section>

    <div id="toastContainer" class="toast-container"></div>
  </div>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { 
      getFirestore, 
      collection, 
      doc, 
      addDoc, 
      setDoc, 
      deleteDoc, 
      getDocs, 
      query, 
      where, 
      limit, 
      onSnapshot, 
      Timestamp,
      orderBy,
      writeBatch,
      getDoc
    } from 'firebase/firestore';

    const firebaseConfig = {
      apiKey: "AIzaSyBaPk-rW8GwMOX52k0JLG_1vepSrnHJNsU",
      authDomain: "chatbot-d8c41.firebaseapp.com",
      projectId: "chatbot-d8c41",
      storageBucket: "chatbot-d8c41.firebasestorage.app",
      messagingSenderId: "971781392669",
      appId: "1:971781392669:web:0c38ef3fae226745bdf9f4",
      measurementId: "G-5WSVSYMTQP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // DOM
    const landingScreen = document.getElementById('landingScreen');
    const chatScreen = document.getElementById('chatScreen');
    const findBtn = document.getElementById('findPartnerBtn');
    const loadingMatch = document.getElementById('loadingMatch');
    const nextBtn = document.getElementById('nextPartnerBtn');
    const leaveBtn = document.getElementById('leaveChatBtn');
    const sendBtn = document.getElementById('sendMessageBtn');
    const messageInput = document.getElementById('messageInput');
    const chatMessages = document.getElementById('chatMessages');
    const roomIdBadge = document.getElementById('roomIdBadge');
    const toastContainer = document.getElementById('toastContainer');

    // User ID
    let userId = localStorage.getItem('santara_userId');
    if (!userId) {
      const r = Math.random().toString(36).substring(2, 8);
      userId = 'user_' + r;
      localStorage.setItem('santara_userId', userId);
    }

    let currentRoomId = null;
    let currentPartnerId = null;
    let isInRoom = false;
    let unsubscribeMessages = null;
    let waitingCheckInterval = null;
    let isSearching = false;

    function sanitize(str) {
      const el = document.createElement('div');
      el.textContent = str;
      return el.innerHTML;
    }

    function showToast(message, type = 'info', duration = 3000) {
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.textContent = message;
      toastContainer.appendChild(toast);
      setTimeout(() => {
        toast.classList.add('hide');
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    function switchScreen(screen) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      screen.classList.add('active');
    }

    function renderMessages(messages) {
      chatMessages.innerHTML = '';
      if (!messages || messages.length === 0) {
        chatMessages.innerHTML = `<div class="empty-state"><span class="empty-icon">💬</span><p>No messages yet</p></div>`;
        return;
      }
      messages.forEach(msg => {
        const div = document.createElement('div');
        div.className = `message ${msg.senderId === userId ? 'self' : 'partner'}`;
        const time = msg.createdAt?.toDate ? msg.createdAt.toDate() : new Date(msg.createdAt);
        div.innerHTML = `${sanitize(msg.text)}<span class="timestamp">${time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>`;
        chatMessages.appendChild(div);
      });
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    // Firestore functions
    async function createRoom(user1, user2) {
      const roomRef = doc(collection(db, 'rooms'));
      await setDoc(roomRef, {
        users: [user1, user2],
        createdAt: Timestamp.now()
      });
      return roomRef.id;
    }

    async function addMessage(roomId, senderId, text) {
      if (!text.trim()) return;
      const msgRef = collection(db, 'rooms', roomId, 'messages');
      await addDoc(msgRef, {
        text: text.trim(),
        senderId: senderId,
        createdAt: Timestamp.now()
      });
    }

    function listenMessages(roomId) {
      if (unsubscribeMessages) unsubscribeMessages();
      const q = query(collection(db, 'rooms', roomId, 'messages'), orderBy('createdAt', 'asc'));
      unsubscribeMessages = onSnapshot(q, (snap) => {
        const msgs = [];
        snap.forEach(doc => msgs.push({ id: doc.id, ...doc.data() }));
        renderMessages(msgs);
      }, (error) => {
        console.error('Listen error:', error);
        showToast('Connection error', 'error');
      });
    }

    async function removeFromWaiting(userId) {
      const q = query(collection(db, 'waitingUsers'), where('userId', '==', userId), limit(1));
      const snap = await getDocs(q);
      snap.forEach(async (d) => await deleteDoc(doc(db, 'waitingUsers', d.id)));
    }

    async function cleanupRoom(roomId) {
      if (!roomId) return;
      try {
        const msgs = await getDocs(collection(db, 'rooms', roomId, 'messages'));
        const batch = writeBatch(db);
        msgs.forEach(d => batch.delete(d.ref));
        await batch.commit();
        await deleteDoc(doc(db, 'rooms', roomId));
      } catch (e) { /* ignore */ }
    }

    // Matchmaking
    async function startMatchmaking() {
      if (isSearching) return;
      isSearching = true;
      findBtn.disabled = true;
      loadingMatch.classList.remove('hidden');
      showToast('Searching for partner...', 'info', 3000);

      try {
        // Cek waiting users
        const waitSnap = await getDocs(collection(db, 'waitingUsers'));
        let partnerId = null;
        let waitDocId = null;

        for (const doc of waitSnap.docs) {
          const data = doc.data();
          if (data.userId !== userId) {
            partnerId = data.userId;
            waitDocId = doc.id;
            break;
          }
        }

        if (partnerId && waitDocId) {
          await deleteDoc(doc(db, 'waitingUsers', waitDocId));
          const roomId = await createRoom(userId, partnerId);
          currentRoomId = roomId;
          currentPartnerId = partnerId;
          isInRoom = true;
          joinChatRoom(roomId);
          showToast('Partner Found! 🎉', 'success');
          isSearching = false;
          findBtn.disabled = false;
          loadingMatch.classList.add('hidden');
          return;
        }

        // Tidak ada partner -> add ke waiting
        await addDoc(collection(db, 'waitingUsers'), {
          userId: userId,
          createdAt: Timestamp.now()
        });

        // Polling
        let attempts = 0;
        const maxAttempts = 40;
        if (waitingCheckInterval) clearInterval(waitingCheckInterval);
        waitingCheckInterval = setInterval(async () => {
          attempts++;
          const snap2 = await getDocs(collection(db, 'waitingUsers'));
          let found = false;
          let partnerId2 = null;
          let waitDocId2 = null;
          for (const d of snap2.docs) {
            const data = d.data();
            if (data.userId !== userId) {
              found = true;
              partnerId2 = data.userId;
              waitDocId2 = d.id;
              break;
            }
          }
          if (found && waitDocId2) {
            clearInterval(waitingCheckInterval);
            waitingCheckInterval = null;
            await deleteDoc(doc(db, 'waitingUsers', waitDocId2));
            const roomId = await createRoom(userId, partnerId2);
            currentRoomId = roomId;
            currentPartnerId = partnerId2;
            isInRoom = true;
            joinChatRoom(roomId);
            showToast('Partner Found! 🎉', 'success');
            isSearching = false;
            findBtn.disabled = false;
            loadingMatch.classList.add('hidden');
          } else if (attempts >= maxAttempts) {
            clearInterval(waitingCheckInterval);
            waitingCheckInterval = null;
            showToast('Still searching...', 'info');
            isSearching = false;
            findBtn.disabled = false;
            loadingMatch.classList.add('hidden');
          }
        }, 2500);
      } catch (error) {
        console.error('Matchmaking error:', error);
        showToast('Error finding partner', 'error');
        isSearching = false;
        findBtn.disabled = false;
        loadingMatch.classList.add('hidden');
      }
    }

    function joinChatRoom(roomId) {
      if (unsubscribeMessages) unsubscribeMessages();
      switchScreen(chatScreen);
      roomIdBadge.textContent = '#' + roomId.slice(0, 6);
      listenMessages(roomId);
    }

    async function leaveRoom(goHome = true) {
      if (unsubscribeMessages) {
        unsubscribeMessages();
        unsubscribeMessages = null;
      }
      if (waitingCheckInterval) {
        clearInterval(waitingCheckInterval);
        waitingCheckInterval = null;
      }
      if (currentRoomId) {
        await cleanupRoom(currentRoomId);
        currentRoomId = null;
      }
      currentPartnerId = null;
      isInRoom = false;
      await removeFromWaiting(userId);
      if (goHome) {
        switchScreen(landingScreen);
        showToast('Left chat', 'warn');
      }
    }

    async function nextPartner() {
      if (!isInRoom) return;
      await leaveRoom(false);
      startMatchmaking();
    }

    // Event Listeners
    findBtn.addEventListener('click', startMatchmaking);

    sendBtn.addEventListener('click', async () => {
      const text = messageInput.value.trim();
      if (!text || !currentRoomId) {
        if (!text) showToast('Message cannot be empty', 'error');
        return;
      }
      if (text.length > 500) {
        showToast('Max 500 characters', 'error');
        return;
      }
      await addMessage(currentRoomId, userId, text);
      messageInput.value = '';
      messageInput.focus();
    });

    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendBtn.click();
    });

    nextBtn.addEventListener('click', nextPartner);

    leaveBtn.addEventListener('click', async () => {
      await leaveRoom(true);
    });

    // Initial cleanup
    window.addEventListener('load', async () => {
      await removeFromWaiting(userId);
    });

    window.addEventListener('beforeunload', async () => {
      if (currentRoomId) {
        await cleanupRoom(currentRoomId);
      }
      await removeFromWaiting(userId);
    });

    console.log('Santara Chat initialized, userId:', userId);
  </script>
</body>
</html>
