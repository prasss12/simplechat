<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>PinkChat - Fast Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f8f0f4;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .app {
            display: flex;
            height: 100%;
            width: 100%;
            background: white;
        }

        .sidebar {
            width: 320px;
            background: white;
            border-right: 1px solid #ffe0e8;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #fefafb;
            height: 100%;
            width: 100%;
        }

        .header {
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #ffe0e8;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #ff99c8, #ff6b9d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .info {
            flex: 1;
            cursor: pointer;
        }

        .info h3 {
            font-size: 15px;
            color: #2d2d2d;
        }

        .info p {
            font-size: 11px;
            color: #ff6b9d;
            margin-top: 2px;
        }

        .btn-icon {
            background: #ffe4ec;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 16px;
            cursor: pointer;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        .chat-item:active {
            background: #fff5f8;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .chat-details {
            flex: 1;
        }

        .chat-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 15px;
        }

        .chat-sub {
            font-size: 11px;
            color: #aa8a96;
            margin-top: 3px;
        }

        .actions {
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ffe0e8;
            background: white;
            flex-shrink: 0;
        }

        .actions button {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            -webkit-tap-highlight-color: transparent;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        .input-area {
            background: white;
            padding: 10px 12px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ffe0e8;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 16px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 16px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-box {
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 15px;
        }

        .modal-box button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
            font-size: 15px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 1100;
            white-space: nowrap;
        }

        /* MOBILE STYLES */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -100%;
                top: 0;
                bottom: 0;
                z-index: 200;
                width: 85%;
                max-width: 300px;
                transition: left 0.3s ease;
                box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            }
            .sidebar.open {
                left: 0;
            }
            .menu-btn {
                display: flex !important;
            }
            .back-btn {
                display: flex !important;
            }
            .header {
                padding: 10px 12px;
            }
            .avatar {
                width: 38px;
                height: 38px;
                font-size: 14px;
            }
            .btn-icon {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .input-area input {
                padding: 10px 14px;
                font-size: 14px;
            }
            .input-area button {
                width: 40px;
                height: 40px;
                font-size: 14px;
            }
            .messages {
                padding: 12px;
            }
            .bubble {
                padding: 8px 12px;
                font-size: 13px;
            }
        }

        @media (min-width: 769px) {
            .menu-btn, .back-btn {
                display: none !important;
            }
        }

        .menu-btn, .back-btn {
            background: none;
            border: none;
            font-size: 20px;
            color: #ff6b9d;
            cursor: pointer;
            margin-right: 8px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 150;
        }
        .overlay.active {
            display: block;
        }
    </style>
</head>
<body>
<div id="app"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895"
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let USER = null;
    let CHAT_ID = null;
    let CHAT_NAME = null;
    let UNSUB_MSG = null;
    let UNSUB_USER = null;
    
    function toast(msg) {
        let t = document.querySelector('.toast');
        if (t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }
    
    function escape(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }
    
    async function getUserData(uid) {
        const s = await getDoc(doc(db, 'users', uid));
        return s.exists() ? { uid, ...s.data() } : null;
    }
    
    // GET OR CREATE CHAT
    async function getChat(uid1, uid2) {
        const chats = collection(db, 'chats');
        const q1 = query(chats, where('participants', '==', [uid1, uid2]));
        const q2 = query(chats, where('participants', '==', [uid2, uid1]));
        let s = await getDocs(q1);
        if (s.empty) s = await getDocs(q2);
        if (!s.empty) return s.docs[0].id;
        
        const ref = await addDoc(chats, {
            type: 'private',
            participants: [uid1, uid2],
            createdAt: serverTimestamp()
        });
        return ref.id;
    }
    
    // SEND MESSAGE
    async function sendMsg(chat, text) {
        if (!chat || !text) return;
        const msgs = collection(db, 'chats', chat, 'messages');
        await addDoc(msgs, {
            senderId: USER.uid,
            text: text,
            timestamp: serverTimestamp()
        });
    }
    
    // ADD CONTACT
    async function addContact(phone) {
        const q = query(collection(db, 'users'), where('phone', '==', phone));
        const s = await getDocs(q);
        if (s.empty) throw new Error('Nomor tidak terdaftar');
        const target = s.docs[0];
        if (target.id === USER.uid) throw new Error('Tidak bisa tambah sendiri');
        
        await updateDoc(doc(db, 'users', USER.uid), { contacts: arrayUnion(target.id) });
        await updateDoc(doc(db, 'users', target.id), { contacts: arrayUnion(USER.uid) });
        return true;
    }
    
    // RENDER CHAT LIST
    async function renderChats() {
        const container = document.getElementById('chatList');
        if (!container) return;
        
        const u = await getUserData(USER.uid);
        const kontak = u?.contacts || [];
        const items = [];
        
        for (let id of kontak) {
            const chat = await getChat(USER.uid, id);
            const partner = await getUserData(id);
            if (partner) items.push({ chatId: chat, name: partner.fullName, phone: partner.phone });
        }
        
        container.innerHTML = '';
        if (items.length === 0) {
            container.innerHTML = '<div class="empty">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        
        for (let item of items) {
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="chat-avatar">${escape(item.name.charAt(0).toUpperCase())}</div>
                <div class="chat-details">
                    <div class="chat-name">${escape(item.name)}</div>
                    <div class="chat-sub">${escape(item.phone)}</div>
                </div>
            `;
            div.onclick = () => openChat(item.chatId, item.name);
            container.appendChild(div);
        }
    }
    
    // OPEN CHAT
    async function openChat(id, name) {
        if (UNSUB_MSG) UNSUB_MSG();
        CHAT_ID = id;
        CHAT_NAME = name;
        
        document.getElementById('chatTitle').innerHTML = escape(name);
        document.getElementById('chatStatus').innerHTML = 'Online';
        document.getElementById('chatAvatar').innerHTML = name.charAt(0).toUpperCase();
        
        // Close sidebar on mobile
        if (window.innerWidth <= 768) {
            closeSidebar();
        }
        
        const msgDiv = document.getElementById('messagesList');
        msgDiv.innerHTML = '<div class="empty">Loading...</div>';
        
        const q = query(collection(db, 'chats', id, 'messages'), orderBy('timestamp', 'asc'));
        UNSUB_MSG = onSnapshot(q, (snap) => {
            msgDiv.innerHTML = '';
            if (snap.empty) {
                msgDiv.innerHTML = '<div class="empty">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            snap.forEach(d => {
                const m = d.data();
                const isMe = m.senderId === USER.uid;
                const el = document.createElement('div');
                el.className = `message ${isMe ? 'sent' : 'received'}`;
                const t = m.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                el.innerHTML = `<div class="bubble">${escape(m.text)}</div><div class="time">${t}</div>`;
                msgDiv.appendChild(el);
            });
            msgDiv.scrollTop = msgDiv.scrollHeight;
        });
        
        renderChats();
    }
    
    // SEND
    async function send() {
        if (!CHAT_ID) {
            toast('Pilih chat dulu');
            return;
        }
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        await sendMsg(CHAT_ID, text);
        input.value = '';
        input.focus();
    }
    
    // SIDEBAR FUNCTIONS
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('active');
    }
    
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
    }
    
    // MODAL ADD CONTACT
    function showAddContact() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <h3>Tambah Kontak</h3>
                <input type="tel" id="phone" placeholder="Nomor HP">
                <button id="add">Tambah</button>
                <button id="cancel" style="background:#ffe4ec;color:#ff6b9d">Batal</button>
                <div id="err" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
            </div>
        `;
        document.body.appendChild(modal);
        
        document.getElementById('add').onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            try {
                await addContact(phone);
                toast('✅ Kontak ditambahkan');
                modal.remove();
                renderChats();
                closeSidebar();
            } catch(e) {
                document.getElementById('err').innerText = e.message;
            }
        };
        document.getElementById('cancel').onclick = () => modal.remove();
    }
    
    // SHOW PROFILE
    function showProfile() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-box">
                <div class="avatar" style="margin:0 auto 15px auto; width:80px; height:80px; font-size:32px;">${USER.fullName?.charAt(0) || 'U'}</div>
                <h3>${escape(USER.fullName)}</h3>
                <p>${USER.phone}</p>
                <p style="color:#aa8a96; margin-top:10px;">${escape(USER.bio || 'Halo! Saya menggunakan PinkChat')}</p>
                <button id="close" style="background:#ffe4ec;color:#ff6b9d">Tutup</button>
            </div>
        `;
        document.body.appendChild(modal);
        document.getElementById('close').onclick = () => modal.remove();
    }
    
    // MAIN APP
    async function renderMain() {
        const root = document.getElementById('app');
        
        root.innerHTML = `
            <div class="app">
                <div class="sidebar" id="sidebar">
                    <div class="header">
                        <div class="avatar" id="profileBtn">${USER?.fullName?.charAt(0) || 'U'}</div>
                        <div class="info" id="profileInfo">
                            <h3>${escape(USER?.fullName || 'User')}</h3>
                            <p>${USER?.phone || ''}</p>
                        </div>
                        <button class="btn-icon" id="logoutBtn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                    <div class="chat-list" id="chatList"></div>
                    <div class="actions">
                        <button id="addContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                        <button id="groupBtn" disabled style="opacity:0.5"><i class="fas fa-users"></i> Grup</button>
                    </div>
                </div>
                <div class="overlay" id="overlay"></div>
                
                <div class="chat-area">
                    <div class="header">
                        <button class="menu-btn" id="menuBtn"><i class="fas fa-bars"></i></button>
                        <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i></button>
                        <div class="avatar" id="chatAvatarBtn">P</div>
                        <div class="info" id="chatInfo">
                            <h3 id="chatTitle">PinkChat</h3>
                            <p id="chatStatus">Pilih percakapan</p>
                        </div>
                    </div>
                    <div class="messages" id="messagesList">
                        <div class="empty">Pilih chat untuk mulai mengobrol</div>
                    </div>
                    <div class="input-area">
                        <input type="text" id="messageInput" placeholder="Ketik pesan...">
                        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        `;
        
        await renderChats();
        
        // EVENT LISTENERS
        document.getElementById('profileBtn').onclick = showProfile;
        document.getElementById('profileInfo').onclick = showProfile;
        document.getElementById('logoutBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) await signOut(auth);
        };
        document.getElementById('addContactBtn').onclick = showAddContact;
        document.getElementById('menuBtn').onclick = openSidebar;
        document.getElementById('overlay').onclick = closeSidebar;
        document.getElementById('backBtn').onclick = () => {
            if (UNSUB_MSG) UNSUB_MSG();
            CHAT_ID = null;
            document.getElementById('chatTitle').innerHTML = 'PinkChat';
            document.getElementById('chatStatus').innerHTML = 'Pilih percakapan';
            document.getElementById('messagesList').innerHTML = '<div class="empty">Pilih chat untuk mulai mengobrol</div>';
        };
        document.getElementById('sendBtn').onclick = send;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') send();
        });
        
        // Chat header click untuk lihat profil kontak (optional)
        const showContactProfile = async () => {
            if (!CHAT_ID) return;
            const chatDoc = await getDoc(doc(db, 'chats', CHAT_ID));
            if (chatDoc.exists() && chatDoc.data().type === 'private') {
                const otherId = chatDoc.data().participants.find(p => p !== USER.uid);
                const other = await getUserData(otherId);
                if (other) {
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    modal.innerHTML = `
                        <div class="modal-box">
                            <div class="avatar" style="margin:0 auto 15px auto; width:80px; height:80px; font-size:32px;">${other.fullName?.charAt(0) || '?'}</div>
                            <h3>${escape(other.fullName)}</h3>
                            <p>${other.phone}</p>
                            <p style="color:#aa8a96; margin-top:10px;">${escape(other.bio || 'Halo! Saya menggunakan PinkChat')}</p>
                            <button id="close" style="background:#ffe4ec;color:#ff6b9d">Tutup</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    document.getElementById('close').onclick = () => modal.remove();
                }
            }
        };
        
        document.getElementById('chatAvatarBtn').onclick = showContactProfile;
        document.getElementById('chatInfo').onclick = showContactProfile;
    }
    
    // LOGIN PAGE
    function renderLogin() {
        let isLogin = false;
        const root = document.getElementById('app');
        
        root.innerHTML = `
            <div class="modal" id="loginModal">
                <div class="modal-box">
                    <h3 id="title">Daftar Akun</h3>
                    <input type="text" id="name" placeholder="Nama lengkap">
                    <input type="tel" id="phone" placeholder="Nomor HP (812345678)">
                    <input type="password" id="pass" placeholder="Password">
                    <button id="submit">Daftar</button>
                    <button id="switch" style="background:#ffe4ec;color:#ff6b9d">Sudah punya akun? Masuk</button>
                    <div id="error" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                </div>
            </div>
        `;
        
        const nameInp = document.getElementById('name');
        const title = document.getElementById('title');
        const submit = document.getElementById('submit');
        const switchBtn = document.getElementById('switch');
        const errorDiv = document.getElementById('error');
        
        switchBtn.onclick = () => {
            isLogin = !isLogin;
            if (isLogin) {
                title.innerText = 'Masuk Akun';
                submit.innerText = 'Masuk';
                switchBtn.innerText = 'Belum punya akun? Daftar';
                nameInp.style.display = 'none';
            } else {
                title.innerText = 'Daftar Akun';
                submit.innerText = 'Daftar';
                switchBtn.innerText = 'Sudah punya akun? Masuk';
                nameInp.style.display = 'block';
            }
        };
        
        submit.onclick = async () => {
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('pass').value;
            
            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                } else {
                    const name = document.getElementById('name').value.trim();
                    if (!name) throw new Error('Nama harus diisi');
                    if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                    
                    const q = query(collection(db, 'users'), where('phone', '==', phone));
                    const s = await getDocs(q);
                    if (!s.empty) throw new Error('Nomor sudah terdaftar');
                    
                    const uc = await createUserWithEmailAndPassword(auth, `${phone}@pinkchat.local`, pass);
                    await setDoc(doc(db, 'users', uc.user.uid), {
                        fullName: name,
                        phone: phone,
                        bio: 'Halo! Saya menggunakan PinkChat',
                        contacts: [],
                        createdAt: serverTimestamp()
                    });
                }
                errorDiv.innerText = '';
            } catch(e) {
                errorDiv.innerText = e.message;
            }
        };
    }
    
    // AUTH STATE
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            USER = await getUserData(u.uid);
            if (USER) {
                renderMain();
            } else {
                setTimeout(async () => {
                    USER = await getUserData(u.uid);
                    if (USER) renderMain();
                    else renderLogin();
                }, 1000);
            }
        } else {
            USER = null;
            renderLogin();
        }
    });
    
    renderLogin();
</script>
</body>
</html>
