<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>PinkChat - Simple Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #f5eef2;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* LAYOUT UTAMA - FLEX VERTIKAL */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #fefafb;
        }

        /* HEADER ATAS */
        .header {
            background: white;
            padding: 16px 20px;
            border-bottom: 1px solid #ffe4ec;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .header-avatar {
            width: 45px;
            height: 45px;
            background: #ff6b9d;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }

        .header-info {
            flex: 1;
        }

        .header-info h2 {
            font-size: 17px;
            color: #2d2d2d;
        }

        .header-info p {
            font-size: 12px;
            color: #ff99c8;
            margin-top: 3px;
        }

        .logout-btn {
            background: #ffe4ec;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            color: #ff6b9d;
            font-size: 18px;
            cursor: pointer;
        }

        /* LIST CHAT - BISA SCROLL */
        .chat-list-container {
            flex: 1;
            overflow-y: auto;
            background: white;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid #f0eef0;
            cursor: pointer;
        }

        .chat-item:active {
            background: #fff0f5;
        }

        .chat-avatar {
            width: 52px;
            height: 52px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #ff6b9d;
        }

        .chat-name {
            font-weight: 600;
            color: #2d2d2d;
            font-size: 16px;
        }

        .chat-phone {
            font-size: 12px;
            color: #aa8a96;
            margin-top: 4px;
        }

        /* TOMBOL AKSI BAWAH */
        .action-bar {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 12px;
            border-top: 1px solid #ffe4ec;
            flex-shrink: 0;
        }

        .action-btn {
            flex: 1;
            background: #ffe4ec;
            border: none;
            padding: 12px;
            border-radius: 30px;
            color: #ff6b9d;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* AREA CHAT (KETIK PESAN) */
        .chat-view {
            display: none;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #fefafb;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 10;
        }

        .chat-view.active {
            display: flex;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .sent .bubble {
            background: #ffd9e6;
            color: #2d2d2d;
        }

        .received .bubble {
            background: white;
            color: #2d2d2d;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .msg-time {
            font-size: 10px;
            color: #bb9aa6;
            margin-top: 4px;
            margin-left: 10px;
        }

        /* INPUT PESAN - PASTI MUNCUL DI BAWAH */
        .input-area {
            background: white;
            padding: 12px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            border-top: 1px solid #ffe4ec;
            flex-shrink: 0;
        }

        .input-area input {
            flex: 1;
            background: #fef0f4;
            border: none;
            padding: 12px 18px;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
        }

        .input-area button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #ff6b9d;
            color: white;
            font-size: 18px;
            cursor: pointer;
        }

        .input-area .icon-btn {
            width: 44px;
            height: 44px;
            background: #ffe4ec;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #ff6b9d;
            font-size: 18px;
        }

        /* Back button */
        .back-btn {
            background: none;
            border: none;
            font-size: 22px;
            color: #ff6b9d;
            cursor: pointer;
            margin-right: 5px;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: white;
            width: 90%;
            max-width: 350px;
            padding: 28px;
            border-radius: 28px;
            text-align: center;
        }

        .modal-card input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #fef0f4;
            border: none;
            border-radius: 30px;
            font-size: 14px;
        }

        .modal-card button {
            width: 100%;
            padding: 12px;
            background: #ff6b9d;
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2d2d;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 13px;
            z-index: 2000;
        }

        .empty-chat {
            text-align: center;
            padding: 40px;
            color: #cc9aa8;
        }
    </style>
</head>
<body>
<div id="root"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, addDoc, updateDoc, doc, onSnapshot, orderBy, serverTimestamp, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    
    const firebaseConfig = {
        apiKey: "AIzaSyDQSKfs6tZzVfpv0BKuM-9Zf00LQHvCGyk",
        authDomain: "simplechat-85cd8.firebaseapp.com",
        projectId: "simplechat-85cd8",
        storageBucket: "simplechat-85cd8.firebasestorage.app",
        messagingSenderId: "244789873168",
        appId: "1:244789873168:web:4cba5481f689ab3103d895",
    };
    
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let currentUserData = null;
    let currentChatUserId = null;
    let currentChatUserName = null;
    let unsubscribeMessages = null;
    
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Render MAIN APP
    function renderMainApp() {
        const root = document.getElementById('root');
        if (!currentUserData) {
            // TAMPILAN LOGIN/REGISTER
            root.innerHTML = `
                <div class="modal" id="authModal" style="display:flex">
                    <div class="modal-card">
                        <h3 id="modalTitle">Daftar Akun</h3>
                        <input type="text" id="regName" placeholder="Nama lengkap">
                        <input type="tel" id="regPhone" placeholder="Nomor HP (812345678)">
                        <input type="password" id="regPass" placeholder="Password">
                        <button id="submitAuth">Daftar</button>
                        <button id="switchAuth" style="background:#ffe4ec;color:#ff6b9d;margin-top:8px">Sudah punya akun? Masuk</button>
                        <div id="authError" style="color:#ff6b9d;font-size:12px;margin-top:10px"></div>
                    </div>
                </div>
            `;
            
            let isLogin = false;
            const modalTitle = document.getElementById('modalTitle');
            const nameInput = document.getElementById('regName');
            
            document.getElementById('switchAuth').onclick = () => {
                isLogin = !isLogin;
                if (isLogin) {
                    modalTitle.innerText = 'Masuk Akun';
                    document.getElementById('submitAuth').innerText = 'Masuk';
                    document.getElementById('switchAuth').innerText = 'Belum punya akun? Daftar';
                    nameInput.style.display = 'none';
                } else {
                    modalTitle.innerText = 'Daftar Akun';
                    document.getElementById('submitAuth').innerText = 'Daftar';
                    document.getElementById('switchAuth').innerText = 'Sudah punya akun? Masuk';
                    nameInput.style.display = 'block';
                }
            };
            
            document.getElementById('submitAuth').onclick = async () => {
                const phone = document.getElementById('regPhone').value.trim();
                const password = document.getElementById('regPass').value;
                const errorDiv = document.getElementById('authError');
                
                try {
                    if (isLogin) {
                        const email = `${phone}@pinkchat.local`;
                        await signInWithEmailAndPassword(auth, email, password);
                    } else {
                        const fullName = document.getElementById('regName').value.trim();
                        if (!fullName) throw new Error('Nama harus diisi');
                        if (!phone.match(/^[0-9]{5,14}$/)) throw new Error('Nomor HP 5-14 digit');
                        
                        const usersRef = collection(db, 'users');
                        const q = query(usersRef, where('phone', '==', phone));
                        const snap = await getDocs(q);
                        if (!snap.empty) throw new Error('Nomor HP sudah terdaftar');
                        
                        const email = `${phone}@pinkchat.local`;
                        const userCred = await createUserWithEmailAndPassword(auth, email, password);
                        await setDoc(doc(db, 'users', userCred.user.uid), {
                            fullName: fullName,
                            phone: phone,
                            contacts: [],
                            createdAt: serverTimestamp()
                        });
                    }
                    errorDiv.innerText = '';
                } catch(e) {
                    errorDiv.innerText = e.message;
                }
            };
            return;
        }
        
        // TAMPILAN UTAMA APP
        root.innerHTML = `
            <div class="app" id="mainApp">
                <!-- LIST CHAT VIEW -->
                <div id="listView" style="display:flex;flex-direction:column;height:100%">
                    <div class="header">
                        <div class="header-avatar" id="userAvatar">${currentUserData.fullName?.charAt(0) || 'U'}</div>
                        <div class="header-info">
                            <h2>${escapeHtml(currentUserData.fullName || 'User')}</h2>
                            <p><i class="fas fa-circle" style="font-size:8px"></i> ${currentUserData.phone}</p>
                        </div>
                        <button class="logout-btn" id="logoutMainBtn"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                    
                    <div class="chat-list-container" id="chatListContainer">
                        <div class="empty-chat">Loading kontak...</div>
                    </div>
                    
                    <div class="action-bar">
                        <button class="action-btn" id="addContactBtn"><i class="fas fa-user-plus"></i> Tambah Kontak</button>
                        <button class="action-btn" id="createGroupBtn"><i class="fas fa-users"></i> Buat Grup</button>
                    </div>
                </div>
                
                <!-- CHAT VIEW (untuk chatting) -->
                <div id="chatView" class="chat-view">
                    <div class="header">
                        <button class="back-btn" id="backToListBtn"><i class="fas fa-arrow-left"></i></button>
                        <div class="header-avatar" id="chatViewAvatar">P</div>
                        <div class="header-info">
                            <h2 id="chatViewName">Loading...</h2>
                            <p>Online</p>
                        </div>
                    </div>
                    
                    <div class="messages-area" id="messagesArea">
                        <div class="empty-chat">Loading pesan...</div>
                    </div>
                    
                    <div class="input-area">
                        <div class="icon-btn" id="emojiChatBtn"><i class="far fa-smile-wink"></i></div>
                        <div class="icon-btn" id="imageChatBtn"><i class="fas fa-paperclip"></i></div>
                        <input type="text" id="chatInput" placeholder="Ketik pesan...">
                        <button id="sendChatBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
            <input type="file" id="fileUploadInput" accept="image/*" style="display:none">
        `;
        
        // LOAD KONTAK
        loadContactsList();
        
        // EVENT LISTENERS
        document.getElementById('logoutMainBtn').onclick = async () => {
            if (confirm('Yakin keluar?')) {
                await signOut(auth);
            }
        };
        
        document.getElementById('addContactBtn').onclick = () => {
            const phone = prompt('Masukkan nomor HP pengguna yang ingin ditambahkan:', '');
            if (phone) addContact(phone);
        };
        
        document.getElementById('createGroupBtn').onclick = () => {
            showToast('🚀 Fitur grup akan segera hadir!');
        };
        
        document.getElementById('backToListBtn').onclick = () => {
            if (unsubscribeMessages) unsubscribeMessages();
            document.getElementById('chatView').classList.remove('active');
            currentChatUserId = null;
        };
        
        document.getElementById('sendChatBtn').onclick = sendMessage;
        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        document.getElementById('emojiChatBtn').onclick = () => {
            const input = document.getElementById('chatInput');
            input.value += '🌸';
            input.focus();
        };
        
        document.getElementById('imageChatBtn').onclick = () => {
            if (!currentChatUserId) {
                showToast('Pilih chat dulu');
                return;
            }
            document.getElementById('fileUploadInput').click();
        };
        
        document.getElementById('fileUploadInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/') && currentChatUserId) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const chatId = [currentUserData.uid, currentChatUserId].sort().join('_');
                    const messagesRef = collection(db, 'chats', chatId, 'messages');
                    await addDoc(messagesRef, {
                        senderId: currentUserData.uid,
                        text: 'Gambar',
                        type: 'image',
                        imageUrl: ev.target.result,
                        timestamp: serverTimestamp()
                    });
                    showToast('📷 Gambar terkirim');
                };
                reader.readAsDataURL(file);
            }
            e.target.value = '';
        };
    }
    
    async function loadContactsList() {
        const container = document.getElementById('chatListContainer');
        if (!container) return;
        
        const contacts = currentUserData.contacts || [];
        if (contacts.length === 0) {
            container.innerHTML = '<div class="empty-chat">Belum ada kontak<br>Tekan ➕ Tambah Kontak</div>';
            return;
        }
        
        container.innerHTML = '';
        for (let contactId of contacts) {
            const userSnap = await getDoc(doc(db, 'users', contactId));
            if (userSnap.exists()) {
                const user = userSnap.data();
                const div = document.createElement('div');
                div.className = 'chat-item';
                div.innerHTML = `
                    <div class="chat-avatar">${user.fullName?.charAt(0) || '?'}</div>
                    <div>
                        <div class="chat-name">${escapeHtml(user.fullName)}</div>
                        <div class="chat-phone">${user.phone}</div>
                    </div>
                `;
                div.onclick = () => openChat(contactId, user.fullName);
                container.appendChild(div);
            }
        }
    }
    
    async function openChat(userId, userName) {
        if (unsubscribeMessages) unsubscribeMessages();
        currentChatUserId = userId;
        currentChatUserName = userName;
        
        document.getElementById('chatViewName').innerHTML = escapeHtml(userName);
        document.getElementById('chatViewAvatar').innerHTML = userName.charAt(0).toUpperCase();
        
        const messagesDiv = document.getElementById('messagesArea');
        messagesDiv.innerHTML = '<div class="empty-chat">Memuat pesan...</div>';
        
        const chatId = [currentUserData.uid, userId].sort().join('_');
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        const q = query(messagesRef, orderBy('timestamp', 'asc'));
        
        unsubscribeMessages = onSnapshot(q, (snap) => {
            messagesDiv.innerHTML = '';
            if (snap.empty) {
                messagesDiv.innerHTML = '<div class="empty-chat">Belum ada pesan. Kirim pesan pertama!</div>';
            }
            snap.forEach(docMsg => {
                const msg = docMsg.data();
                const isSent = msg.senderId === currentUserData.uid;
                const msgDiv = document.createElement('div');
                msgDiv.className = `message ${isSent ? 'sent' : 'received'}`;
                
                let content = '';
                if (msg.type === 'image' && msg.imageUrl) {
                    content = `<div class="bubble"><img src="${msg.imageUrl}" style="max-width:180px; border-radius:16px;"></div>`;
                } else {
                    content = `<div class="bubble">${escapeHtml(msg.text)}</div>`;
                }
                
                const time = msg.timestamp?.toDate().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) || '';
                msgDiv.innerHTML = content + `<div class="msg-time">${time}</div>`;
                messagesDiv.appendChild(msgDiv);
            });
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });
        
        document.getElementById('chatView').classList.add('active');
    }
    
    async function sendMessage() {
        if (!currentChatUserId) {
            showToast('Pilih chat dulu');
            return;
        }
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        
        const chatId = [currentUserData.uid, currentChatUserId].sort().join('_');
        const messagesRef = collection(db, 'chats', chatId, 'messages');
        await addDoc(messagesRef, {
            senderId: currentUserData.uid,
            text: text,
            type: 'text',
            timestamp: serverTimestamp()
        });
        input.value = '';
    }
    
    async function addContact(phone) {
        try {
            const usersRef = collection(db, 'users');
            const q = query(usersRef, where('phone', '==', phone));
            const snap = await getDocs(q);
            if (snap.empty) throw new Error('Nomor HP tidak terdaftar');
            const targetUser = snap.docs[0];
            if (targetUser.id === currentUserData.uid) throw new Error('Tidak bisa menambah diri sendiri');
            
            // TWO-WAY CONTACT
            const userRef = doc(db, 'users', currentUserData.uid);
            const targetRef = doc(db, 'users', targetUser.id);
            await updateDoc(userRef, { contacts: arrayUnion(targetUser.id) });
            await updateDoc(targetRef, { contacts: arrayUnion(currentUserData.uid) });
            
            showToast('✅ Kontak berhasil ditambahkan');
            currentUserData = await getUserData(currentUserData.uid);
            loadContactsList();
        } catch(e) {
            alert(e.message);
        }
    }
    
    async function getUserData(uid) {
        const snap = await getDoc(doc(db, 'users', uid));
        if (snap.exists()) return { uid, ...snap.data() };
        return null;
    }
    
    // AUTH STATE
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUserData = await getUserData(user.uid);
            if (currentUserData) {
                renderMainApp();
            } else {
                // Tunggu data user tersedia
                setTimeout(async () => {
                    currentUserData = await getUserData(user.uid);
                    if (currentUserData) renderMainApp();
                }, 1000);
            }
        } else {
            currentUserData = null;
            renderMainApp();
        }
    });
    
    renderMainApp();
</script>
</body>
</html>
